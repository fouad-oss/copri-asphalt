        chk.disabled = true;
        try { await sbRpc("export_row_ack", { p_pin: user.pin, p_row_id: r.id, p_acked: chk.checked }); }
        catch { chk.checked = !chk.checked; }
        chk.disabled = false;
      });
      const t = el("span");
      t.innerHTML = `${r.payload.date} · ${r.payload.vendor} · <b>${pipeKD(r.payload.amount)}</b> · ${r.payload.commitmentRef || "—"} (${r.payload.refNo})`;
      row.appendChild(chk); row.appendChild(t);
      c.appendChild(row);
    });
    body.appendChild(c);
  });
}

// ════════════════════════════════════════════════════════
// ── WORK-ORDERS PORTAL (?wo) ──
// Reference desk for the contract work orders: which order covers
// which site (block or named street), segmented asphalt vs civil,
// with the ministry description. Reads rpc/ref_payload (work_orders
// table) — the exact source the forms' locked auto-fill uses, so
// what this portal shows is what the forms will pick.
// ════════════════════════════════════════════════════════
let _woRows = null;   // ref workOrders rows, fetched once per load

function woDiscKind(d) {
  d = String(d || "").toLowerCase();
  if (/both|كلا/.test(d)) return "both";
  if (/asphalt|أسفلت/.test(d)) return "asphalt";
  if (/civil|مدني/.test(d)) return "civil";
  return "";
}
function woDiscChip(d) {
  const kind = woDiscKind(d);
  const map = { asphalt: ["rgba(0,166,81,.12)", "var(--green-dark)", "أسفلت"],
                civil:   ["rgba(21,101,192,.12)", "#1565C0", "أعمال مدنية"],
                both:    ["rgba(111,66,193,.12)", "#6f42c1", "أسفلت + مدني"] };
  const [bg, fg, label] = map[kind] || ["var(--surface-2)", "var(--text-2)", d || "—"];
  const s = el("span", "plant-chip"); s.textContent = label;
  s.style.background = bg; s.style.color = fg;
  return s;
}
const woActive = (w) => !w.status || /جاري|active/i.test(w.status);
const WO_GENERAL = "عام — كل المواقع";
const WO_DISC_OPTS = [["أعمال أسفلت", "asphalt"], ["أعمال مدنية", "civil"], ["أسفلت + مدني", "both"]];

// Distinct locations still logged under the '*' placeholder ("no order
// issued yet") — grouped by block (street sub-numbers collapse into it)
// or by street name. Dispatch named-street rows keep the name in `block`.
async function woStarLocations(project) {
  const [dl, mr] = await Promise.all([
    sbGet(`dispatch_loads?select=site,block,street,loc_type&work_order=${sbEq("*")}&project=${sbEq(project)}&limit=1000`).catch(() => []),
    sbGet(`material_receipts?select=site,block,street&work_order=${sbEq("*")}&project=${sbEq(project)}&limit=1000`).catch(() => []),
  ]);
  const map = {};
  const add = (site, block, street, kind) => {
    const b = normSp(block), s = b ? "" : normSp(street);
    if (!site || (!b && !s)) return;
    const k = [site, b, s].join("|");
    const e = map[k] = map[k] || { site, block: b, street: s, disp: 0, mat: 0 };
    e[kind]++;
  };
  dl.forEach((r) => { const named = r.loc_type === "اسم الشارع"; add(r.site, named ? "" : r.block, named ? r.block : "", "disp"); });
  mr.forEach((r) => add(r.site, r.block, r.street, "mat"));
  return Object.values(map).sort((a, b) => (b.disp + b.mat) - (a.disp + a.mat));
}
const woCoverText = (w) => (w.block ? "قطعة " + w.block : w.street ? "شارع " + w.street : w.site ? "عام — كامل الموقع" : "عام — كل المواقع");

// All ACTIVE orders covering a location for a discipline — same matching
// rules as autoWorkOrder, but returns every hit (the forms pick the first),
// so double-covered blocks are visible here instead of silent.
function woMatches(rows, project, site, block, street, disc) {
  const b = normSp(block), st = normSp(street), siteKey = normSp(site);
  const discOK = (d) => {
    const k = woDiscKind(d);
    return !k || k === "both" || k === disc;
  };
  return rows.filter((w) => {
    if (!woActive(w)) return false;
    if (w.project && w.project !== project) return false;
    if (w.site && normSp(w.site) !== siteKey) return false;
    if (!discOK(w.discipline)) return false;
    const wb = normSp(w.block), ws = normSp(w.street);
    if (b && wb) return wb === b && (!st || !ws || ws === st);
    if (st && ws) return ws === st;
    return false;
  });
}

async function renderWoPortal() {
  const main = renderShell("أوامر العمل");
  if (_woRows) { _woPortalPage(main, _woRows); return; }
  const loading = el("div", "card");
  loading.innerHTML = `<div class="info-box">جارٍ تحميل أوامر العمل…</div>`;
  main.appendChild(loading);
  try {
    const ref = await sbGet("rpc/ref_payload");
    _woRows = (ref.workOrders || []).map((w) => ({ ...w, wo: String(w.wo) }));
  } catch (e) {
    loading.innerHTML = `<div class="error-msg" style="display:block">تعذّر تحميل أوامر العمل — تحقق من الاتصال</div>`;
    return;
  }
  loading.remove();
  _woPortalPage(main, _woRows);
}

function _woPortalPage(main, allRows) {
  const projects = [...new Set(allRows.map((w) => w.project).filter(Boolean))];
  let project = projects[0] || "";
  const bodyWrap = el("div");

  const h = el("h2");
  h.textContent = "دليل أوامر العمل — المواقع والأوصاف";
  h.style.cssText = "font-size:1.05rem;font-weight:800;margin:0 0 .6rem;color:var(--text-1)";
  main.appendChild(h);
  if (projects.length > 1) {
    const ps = select(projects, "اختر المشروع");
    ps.value = project; ps.style.marginBottom = ".8rem";
    ps.addEventListener("change", () => { if (ps.value) { project = ps.value; paint(); } });
    main.appendChild(ps);
  }
  main.appendChild(bodyWrap);

  function paint() {
    bodyWrap.innerHTML = "";
    const rows = allRows.filter((w) => !w.project || w.project === project)
      .slice().sort((a, b) => (parseInt(a.wo, 10) || 0) - (parseInt(b.wo, 10) || 0));
    const active = rows.filter(woActive);
    const sites = [...new Set(active.map((w) => w.site).filter(Boolean))];

    // ── Location → WO lookup (what the forms' auto-fill will pick) ──
    const lk = el("div", "card");
    lk.appendChild(sectionTitle("🔍 أي أمر عمل يغطي هذا الموقع؟"));
    const lkRow = el("div", "rep-row");
    const siteSel = select(sites, "الموقع");
    const blockIn = input("text", "القطعة", "numeric"); blockIn.style.maxWidth = "110px";
    const streetIn = input("text", "الشارع / اسم الشارع");
    lkRow.appendChild(siteSel); lkRow.appendChild(blockIn); lkRow.appendChild(streetIn);
    lk.appendChild(lkRow);
    const res = el("div", "wo-res");
    lk.appendChild(res);
    const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;");
    const refreshLookup = () => {
      const site = siteSel.value, b = blockIn.value.trim(), st = streetIn.value.trim();
      if (!site || (!b && !st)) { res.innerHTML = `<div class="field-hint">اختر الموقع ثم أدخل القطعة أو اسم الشارع</div>`; return; }
      const line = (label, disc) => {
        const hits = woMatches(rows, project, site, b, st, disc);
        if (!hits.length) return `<div class="wo-res-line"><b>${label}:</b> <span class="wo-res-none">لم يصدر أمر عمل بعد</span></div>`;
        const first = hits[0];
        let out = `<div class="wo-res-line"><b>${label}:</b> <span class="wo-badge">أمر ${esc(first.wo)}</span> ${esc(first.description || woCoverText(first))}</div>`;
        if (hits.length > 1) out += `<div class="wo-res-warn">⚠️ أوامر أخرى تغطي نفس الموقع: ${hits.slice(1).map((x) => "أمر " + esc(x.wo)).join("، ")} — النماذج تعتمد الأول تلقائياً</div>`;
        return out;
      };
      res.innerHTML = line("أعمال الأسفلت", "asphalt") + line("الأعمال المدنية", "civil");
    };
    siteSel.addEventListener("change", refreshLookup);
    blockIn.addEventListener("input", refreshLookup);
    streetIn.addEventListener("input", refreshLookup);
    refreshLookup();
    bodyWrap.appendChild(lk);

    // ── Add a new order (work_order_add RPC, migration 0008) ──
    const addCard = el("div", "card");
    const addBtn = el("button", "btn-secondary"); addBtn.type = "button";
    addBtn.textContent = "➕ إضافة أمر عمل جديد";
    addCard.appendChild(addBtn);
    const formWrap = el("div"); formWrap.style.display = "none"; formWrap.style.marginTop = ".7rem";
    addCard.appendChild(formWrap);
    let formBuilt = false;
    addBtn.addEventListener("click", () => {
      formWrap.style.display = formWrap.style.display === "none" ? "" : "none";
      if (!formBuilt) { formBuilt = true; buildAddForm(); }
    });
    bodyWrap.appendChild(addCard);

    function buildAddForm() {
      // Site options = the project's registered sites (same source as the
      // dispatch/materials forms), not just sites that already have orders.
      const ctx = _refProjectCtx(project);
      const appSites = (ctx && ctx.project.sites && ctx.project.sites.length) ? ctx.project.sites : sites;
      const { group: gWo, input: woIn } = fieldGroup("رقم أمر العمل", input("text", "مثال: 69", "numeric"), true);
      formWrap.appendChild(gWo);
      const { group: gDisc, input: discSel } = fieldGroup("نوع العمل", select(WO_DISC_OPTS.map((d) => d[0]), "اختر نوع العمل"), true);
      formWrap.appendChild(gDisc);
      const { group: gSite, input: aSiteSel } = fieldGroup("الموقع", select([...appSites, WO_GENERAL], "اختر الموقع"), true);
      formWrap.appendChild(gSite);
      const locRow = el("div", "rep-row");
      const aBlock = input("text", "القطعة", "numeric"); aBlock.style.maxWidth = "110px";
      const aStreet = input("text", "الشارع / اسم الشارع");
      locRow.appendChild(aBlock); locRow.appendChild(aStreet);
      formWrap.appendChild(locRow);
      const locHint = el("div", "field-hint");
      locHint.textContent = "أدخل القطعة أو اسم الشارع — أو اتركهما فارغين لأمر عام على كامل الموقع";
      formWrap.appendChild(locHint);
      const { group: gDesc, input: descIn } = fieldGroup("وصف أمر العمل", input("text", "مثال: بيان قطعة 3 - أعمال مدنية"), true);
      formWrap.appendChild(gDesc);

      // Locations already logged under '*' — one tap maps the new order to them.
      const starHead = el("div", "prog-day-head"); starHead.textContent = "⭐ مواقع مسجلة بدون أمر عمل ( * )";
      formWrap.appendChild(starHead);
      const starWrap = el("div", "wo-starwrap");
      starWrap.innerHTML = `<div class="field-hint">جارٍ التحميل…</div>`;
      formWrap.appendChild(starWrap);
      const mapRow = el("label", "wo-mapchk");
      const mapChk = input("checkbox", ""); mapChk.disabled = true;
      const mapTxt = el("span"); mapTxt.textContent = "ربط سجلات * المطابقة لهذا الموقع بالأمر الجديد";
      mapRow.appendChild(mapChk); mapRow.appendChild(mapTxt);
      formWrap.appendChild(mapRow);
      const refreshMapChk = () => {
        const ok = aSiteSel.value && aSiteSel.value !== WO_GENERAL && (aBlock.value.trim() || aStreet.value.trim());
        mapChk.disabled = !ok; if (!ok) mapChk.checked = false;
      };
      aSiteSel.addEventListener("change", refreshMapChk);
      aBlock.addEventListener("input", refreshMapChk);
      aStreet.addEventListener("input", refreshMapChk);
      woStarLocations(project).then((locs) => {
        starWrap.innerHTML = "";
        if (!locs.length) { starWrap.innerHTML = `<div class="field-hint">لا توجد سجلات على أمر * حالياً</div>`; return; }
        locs.forEach((L) => {
          const chip = el("button", "wo-starchip"); chip.type = "button";
          const counts = [L.disp ? `${_numFmt(L.disp)} أسفلت` : "", L.mat ? `${_numFmt(L.mat)} مواد` : ""].filter(Boolean).join(" · ");
          chip.textContent = `${L.site} — ${L.block ? "قطعة " + L.block : "شارع " + L.street} (${counts})`;
          chip.addEventListener("click", () => {
            aSiteSel.value = L.site; aBlock.value = L.block; aStreet.value = L.street;
            refreshMapChk(); if (!mapChk.disabled) mapChk.checked = true;
          });
          starWrap.appendChild(chip);
        });
      });

      const addErr = el("div", "error-msg"); addErr.style.display = "none"; formWrap.appendChild(addErr);
      const saveBtn = el("button", "btn-primary"); saveBtn.type = "button"; saveBtn.textContent = "حفظ أمر العمل";
      formWrap.appendChild(saveBtn);
      saveBtn.addEventListener("click", async () => {
        const disc = (WO_DISC_OPTS.find((d) => d[0] === discSel.value) || [])[1] || "";
        const general = aSiteSel.value === WO_GENERAL;
        const err = (m) => { addErr.textContent = m; addErr.style.display = "block"; };
        if (!woIn.value.trim()) return err("يرجى إدخال رقم أمر العمل");
        if (!disc) return err("يرجى اختيار نوع العمل");
        if (!aSiteSel.value) return err("يرجى اختيار الموقع");
        if (!descIn.value.trim()) return err("يرجى إدخال وصف أمر العمل");
        addErr.style.display = "none"; saveBtn.disabled = true; saveBtn.textContent = "جارٍ الحفظ…";
        try {
          const r = await sbRpc("work_order_add", {
            p_project: project, p_site: general ? "" : aSiteSel.value,
            p_block: general ? "" : aBlock.value.trim(), p_street: general ? "" : aStreet.value.trim(),
            p_discipline: disc, p_wo: woIn.value.trim(), p_description: descIn.value.trim(),
            p_map_star: !mapChk.disabled && mapChk.checked,
          });
          if (!r.success) {
            saveBtn.disabled = false; saveBtn.textContent = "حفظ أمر العمل";
            return err(r.error === "duplicate" ? "يوجد أمر مطابق مسجّل مسبقاً" : "تعذّر الحفظ: " + (r.error || ""));
          }
          const mapped = (r.mapped_dispatch || 0) + (r.mapped_materials || 0);
          alert(`تم حفظ أمر العمل ${woIn.value.trim()}` + (mapped ? ` — وربط ${mapped} سجل كان على أمر *` : ""));
          // Refresh the app reference (forms' auto-fill) + this portal.
          try { const fresh = await fetchReference(8000); if (fresh) applyReferenceData(fresh); } catch (e) {}
          _woRows = null; renderWoPortal();
        } catch (e) {
          saveBtn.disabled = false; saveBtn.textContent = "حفظ أمر العمل";
          err("تعذّر الحفظ — تحقق من الاتصال، وتأكد من تطبيق ترحيل 0008 على قاعدة البيانات");
        }
      });
    }

    // ── KPIs ──
    const nA = active.filter((w) => ["asphalt", "both"].includes(woDiscKind(w.discipline))).length;
    const nC = active.filter((w) => ["civil", "both"].includes(woDiscKind(w.discipline))).length;
    _dashKpis(bodyWrap, [
      ["أوامر جارية", _numFmt(active.length), "أمر عمل"],
      ["أعمال أسفلت", _numFmt(nA), "يشمل المشتركة"],
      ["أعمال مدنية", _numFmt(nC), "يشمل المشتركة"],
      ["مواقع مغطاة", _numFmt(sites.length), ""],
    ]);

    // ── The full mapping, searchable, grouped by site ──
    const listCard = el("div", "card");
    listCard.appendChild(sectionTitle("قائمة أوامر العمل"));
    const ctrls = el("div", "rep-row");
    const qIn = input("search", "بحث — رقم الأمر، القطعة، الشارع، الوصف…");
    ctrls.appendChild(qIn);
    listCard.appendChild(ctrls);
    const discBar = el("div", "history-tabs"); discBar.style.marginBottom = ".6rem";
    let discF = "all";
    [["all", "الكل"], ["asphalt", "أسفلت"], ["civil", "مدني"]].forEach(([k, label]) => {
      const btn = el("button", "history-tab" + (k === discF ? " active" : "")); btn.type = "button"; btn.textContent = label;
      btn.addEventListener("click", () => {
        discF = k;
        [...discBar.children].forEach((x) => x.classList.remove("active"));
        btn.classList.add("active"); paintList();
      });
      discBar.appendChild(btn);
    });
    listCard.appendChild(discBar);
    const groups = el("div");
    listCard.appendChild(groups);

    const woRow = (w) => {
      const r = el("div", "trip-row");
      const top = el("div", "trip-main");
      const badge = el("span", "wo-badge"); badge.textContent = "أمر " + w.wo;
      top.appendChild(badge);
      top.appendChild(woDiscChip(w.discipline));
      const cover = el("span", "wo-cover"); cover.textContent = woCoverText(w);
      top.appendChild(cover);
      if (!woActive(w)) top.appendChild(plantStatusChip(w.status));
      r.appendChild(top);
      if (w.description) { const d = el("div", "trip-sub"); d.textContent = w.description; r.appendChild(d); }
      return r;
    };
    const paintList = () => {
      groups.innerHTML = "";
      const q = normSp(qIn.value).toLowerCase();
      const match = (w) => {
        if (discF !== "all") { const k = woDiscKind(w.discipline); if (k !== discF && k !== "both") return false; }
        if (!q) return true;
        return [w.wo, w.site, w.block, w.street, w.description, woCoverText(w)]
          .some((f) => normSp(f).toLowerCase().includes(q));
      };
      const shown = rows.filter(match);
      if (!shown.length) { groups.innerHTML = `<div class="info-box">لا توجد أوامر مطابقة</div>`; return; }
      const bySite = {};
      shown.forEach((w) => { const k = w.site || "عام — بدون موقع محدد"; (bySite[k] = bySite[k] || []).push(w); });
      Object.keys(bySite).sort((a, b) => bySite[b].length - bySite[a].length).forEach((siteName) => {
        const hd = el("div", "prog-day-head");
        hd.textContent = `${siteName} (${_numFmt(bySite[siteName].length)})`;
        groups.appendChild(hd);
        bySite[siteName].forEach((w) => groups.appendChild(woRow(w)));
      });
    };
    qIn.addEventListener("input", paintList);
    paintList();
    bodyWrap.appendChild(listCard);
  }
  paint();
}

// ── Router — runs after the cached reference overlay ──
function runRouter() {
const _mparams = new URLSearchParams(window.location.search);
const millingReport = _mparams.get("millingReport");
const millingRole   = _mparams.get("millingRole");
const matRole       = _mparams.get("matRole");
const note = getNoteFromURL();

if (millingReport) {
  renderMillingReportView(millingReport);                 // public, no PIN
} else if (_mparams.has("printTest")) {
  renderPrintTest();                                      // printer calibration, no PIN, no DB write
} else if (_mparams.has("dash")) {
  // Standalone (no PIN) for now — a dedicated management PIN gate comes later,
  // driven by a new top-management reference file the user will create.
  const dv = _mparams.get("dash"), dp = _mparams.get("dp");
  renderDashboard(["plant", "exec", "project", "acct"].includes(dv) ? dv : null, dp || null);
} else if (_mparams.has("wo")) {
  renderWoPortal();                                       // WO mapping reference, no PIN
} else if (millingRole === "engineer") {
  const session = getEngineerSession();
  if (session) renderMillingEngineerHome(session.name);
  else renderPINScreen(name => renderMillingEngineerHome(name));
} else if (millingRole === "pm") {
  const pmSession = getPMSession();
  if (pmSession) renderMillingPMHome(pmSession.name);
  else renderMillingPMPINScreen(name => renderMillingPMHome(name));
} else if (millingRole === "marco") {
  const marcoSession = getMarcoSession();
  if (marcoSession) renderMillingMarcoHome(marcoSession.name);
  else renderMillingMarcoPINScreen(name => renderMillingMarcoHome(name));
} else if (_mparams.get("plantRole") === "manager") {
  const plantSession = getPlantSession();
  if (plantSession) renderPlantHome(plantSession.name);
  else renderPlantPINScreen(name => renderPlantHome(name));
} else if (_mparams.get("financeRole") === "manager") {
  const finSession = getFinanceSession();
  if (finSession) renderFinanceHome(finSession.name);
  else renderFinancePINScreen(name => renderFinanceHome(name));
} else if (_mparams.has("rf")) {
  const pipeSession = getPipeSession();
  if (pipeSession) renderPipeHome(pipeSession);
  else renderPipePINScreen(u => renderPipeHome(u));
} else if (matRole === "receiver") {
  const matSession = getMatSession();
  if (matSession) renderMaterialReceiverHome(matSession.name);
  else renderMaterialPINScreen(name => renderMaterialReceiverHome(name));
} else if (note) {
  const session = getEngineerSession();
  if (session) renderReceipt(note, session.name);
  else renderPINScreen(name => renderReceipt(note, name));
} else {
  const isEngineerRole = _mparams.get("role") === "engineer";
  if (isEngineerRole) {
    const session = getEngineerSession();
    if (session) renderEngineerHome(session.name);
    else renderPINScreen(name => renderEngineerHome(name));
  } else {
    const clerkSession = getClerkSession();
    if (clerkSession) renderCompanySelect();
    else renderClerkPINScreen(renderCompanySelect);
  }
}
}

// ── Boot: apply cached reference instantly, route, then refresh in background ──
try {
  const _cachedRef = JSON.parse(localStorage.getItem(REF_CACHE_KEY) || "null");
  if (_cachedRef) applyReferenceData(_cachedRef);
} catch (e) { /* keep baked defaults */ }
runRouter();

// Seamless reference updates — no 🔄 button needed.
// 1) On boot, check for changes and apply (covers "opened once, still stale").
syncReferenceIfChanged();

// 2) When the user returns to the tab (common — PWA left open all day), re-check.
document.addEventListener("visibilitychange", function () {
  if (document.visibilityState === "visible") syncReferenceIfChanged();
});

// 3) Gentle background poll while open + visible. Each tick runs only the cheap
//    version probe; the full pull fires solely on a real change. Skips while
//    hidden to save quota/battery.
setInterval(function () {
  if (document.visibilityState === "visible") syncReferenceIfChanged();
}, 60000);

</script>
</body>
</html>
