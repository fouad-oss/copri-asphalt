<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#EAEAE6"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="كوبري — أسفلت"/>
  <title>كوبري — تتبع شحنات الأسفلت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ═══════════════════════════════════════════════════════
       COPRI THEME — easy to customize
       Change values here to update the entire app
    ═══════════════════════════════════════════════════════ */
    :root {
      /* Brand colors */
      --green:        #00A651;
      --green-dark:   #007A3D;
      --green-light:  rgba(0, 166, 81, 0.10);
      --green-mid:    rgba(0, 166, 81, 0.20);

      /* Backgrounds */
      --bg:           #EAEAE6;
      --surface:      #FFFFFF;
      --surface-2:    #F4F4F0;
      --border:       #D8D8D2;
      --border-focus: #00A651;

      /* Text */
      --text-1:       #1A1A2E;
      --text-2:       #555560;
      --text-3:       #999999;

      /* Status colors */
      --red:          #D32F2F;
      --red-light:    rgba(211, 47, 47, 0.08);
      --amber:        #E65100;
      --amber-light:  rgba(230, 81, 0, 0.10);

      /* Layout */
      --radius:       8px;
      --radius-sm:    5px;
      --shadow-sm:    0 1px 4px rgba(0,0,0,0.08);
      --shadow:       0 2px 12px rgba(0,0,0,0.10);

      /* Typography */
      --font-ar:      'IBM Plex Sans Arabic', sans-serif;
      --font-label:   'Barlow Condensed', sans-serif;
    }

    /* ── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-ar);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ─────────────────────────────────────── */
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ────────────────────────────────────────── */
    .app-header {
      background: var(--surface);
      border-bottom: 3px solid var(--green);
      padding: .9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
      box-shadow: var(--shadow-sm);
    }
    .logo { display: flex; align-items: center; gap: .7rem; }
    .logo-mark {
      width: 40px; height: 40px;
      background: var(--green);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 26px; height: 26px; }
    .logo-text { display: flex; flex-direction: column; gap: 1px; }
    .logo-en {
      font-family: var(--font-label);
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .logo-ar {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1;
    }
    .header-badge {
      font-family: var(--font-label);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--green);
      background: var(--green-light);
      padding: .25rem .6rem;
      border-radius: 3px;
      border: 1px solid var(--green-mid);
    }

    /* ── MAIN ──────────────────────────────────────────── */
    .app-main { flex: 1; padding: 1.1rem 1rem; display: flex; flex-direction: column; gap: .9rem; }

    /* ── FOOTER ────────────────────────────────────────── */
    .app-footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .68rem;
      color: var(--text-3);
      padding: .75rem;
    }

    /* ── SECTION TITLE ─────────────────────────────────── */
    .section-title {
      font-family: var(--font-label);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: .4rem;
      padding-bottom: .55rem;
      border-bottom: 1px solid var(--border);
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 0; height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-right: 7px solid var(--green);
    }

    /* ── CARD ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
      box-shadow: var(--shadow-sm);
    }

    /* ── FIELDS ────────────────────────────────────────── */
    .field-group { display: flex; flex-direction: column; gap: .35rem; }
    .field-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }

    label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: .01em;
    }
    .req { color: var(--red); }

    input, select, textarea {
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font-family: var(--font-ar);
      font-size: .92rem;
      padding: .6rem .8rem;
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
      direction: rtl;
      outline: none;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--border-focus);
      background: #fff;
      box-shadow: 0 0 0 3px var(--green-light);
    }
    input::placeholder, textarea::placeholder { color: var(--text-3); font-size: .83rem; }
    select option { background: #fff; }
    textarea { resize: vertical; min-height: 64px; line-height: 1.5; }

    /* ── HINT TEXT ─────────────────────────────────────── */
    .field-hint { font-size: .72rem; color: var(--text-3); margin-top: .15rem; }

    /* ── BUTTONS ───────────────────────────────────────── */
    .btn-primary {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-ar);
      font-size: .95rem;
      font-weight: 700;
      padding: .85rem 1.25rem;
      cursor: pointer;
      width: 100%;
      transition: background .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .btn-danger {
      background: var(--red) !important;
    }
    .btn-danger:hover { background: #b71c1c !important; }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-ar);
      font-size: .88rem;
      font-weight: 500;
      padding: .75rem 1.25rem;
      cursor: pointer;
      width: 100%;
      margin-top: .4rem;
    }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); }

    /* ── DECISION BUTTONS ──────────────────────────────── */
    .decision-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }
    .decision-btn {
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text-2);
      font-family: var(--font-ar);
      font-size: .95rem;
      font-weight: 700;
      padding: .85rem;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .decision-btn.accept:hover, .decision-btn.accept.active {
      border-color: var(--green); background: var(--green-light); color: var(--green);
    }
    .decision-btn.reject:hover, .decision-btn.reject.active {
      border-color: var(--red); background: var(--red-light); color: var(--red);
    }

    /* ── RECEIPT SUMMARY ───────────────────────────────── */
    .receipt-summary {
      background: var(--surface);
      border: 2px solid var(--green);
      border-radius: var(--radius);
      padding: 1.1rem;
      box-shadow: var(--shadow-sm);
    }
    .summary-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: .5rem;
      font-size: .86rem;
      padding: .3rem 0;
      border-bottom: 1px solid var(--border);
    }
    .field-row:last-child { border-bottom: none; }
    .field-label { color: var(--text-2); flex-shrink: 0; }
    .field-value { color: var(--text-1); font-weight: 600; }

    /* ── BADGES ────────────────────────────────────────── */
    .badge {
      font-family: var(--font-label);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: 3px;
    }
    .badge-transit  { background: var(--amber-light);  color: var(--amber);    border: 1px solid rgba(230,81,0,.2);  }
    .badge-accepted { background: var(--green-light);  color: var(--green);    border: 1px solid var(--green-mid);   }
    .badge-rejected { background: var(--red-light);    color: var(--red);      border: 1px solid rgba(211,47,47,.2); }

    /* ── TEMP DELTA ────────────────────────────────────── */
    .temp-delta {
      font-size: .75rem;
      font-weight: 600;
      padding: .3rem .6rem;
      border-radius: var(--radius-sm);
      margin-top: .2rem;
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .delta-ok   { background: var(--green-light); color: var(--green); }
    .delta-warn { background: var(--red-light);   color: var(--red);   }

    /* ── WEIGHT DELTA ──────────────────────────────────── */
    .weight-delta {
      font-size: .75rem;
      font-weight: 600;
      padding: .3rem .6rem;
      border-radius: var(--radius-sm);
      margin-top: .2rem;
    }
    .weight-ok   { background: var(--green-light); color: var(--green); }
    .weight-warn { background: var(--amber-light); color: var(--amber); }
    .weight-err  { background: var(--red-light);   color: var(--red);   }

    /* ── SUCCESS / SCREENS ─────────────────────────────── */
    .success-screen {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 2.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: .7rem;
      box-shadow: var(--shadow-sm);
    }
    .success-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }
    .success-icon.ok       { background: var(--green-light); color: var(--green); border: 2px solid var(--green); }
    .success-icon.rejected { background: var(--red-light);   color: var(--red);   border: 2px solid var(--red);   }
    .success-screen h2 { font-size: 1.15rem; font-weight: 700; color: var(--text-1); }
    .success-screen p  { font-size: .88rem; color: var(--text-2); }
    .success-note      { color: var(--green) !important; font-weight: 600; }

    /* ── RECEIPT LINK BOX ──────────────────────────────── */
    .link-box {
      background: var(--surface-2);
      border: 1.5px solid var(--green);
      border-radius: var(--radius-sm);
      padding: .75rem .9rem;
      font-size: .78rem;
      color: var(--text-2);
      word-break: break-all;
      line-height: 1.6;
      width: 100%;
      text-align: right;
    }
    .link-box-label {
      font-family: var(--font-label);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--green);
      display: block;
      margin-bottom: .3rem;
    }

    /* ── LOADING ───────────────────────────────────────── */
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      padding: 3rem 1rem; color: var(--text-2);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR ─────────────────────────────────────────── */
    /* ── PROJECT SELECTION ─────────────────────────────────── */
    .project-btn {
      background: var(--surface-2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      cursor: pointer;
      width: 100%;
      text-align: right;
      transition: all .15s;
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }
    .project-btn:hover {
      border-color: var(--green);
      background: var(--green-light);
    }
    .project-btn-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-1);
    }
    .project-btn-contract {
      font-family: var(--font-label);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--green);
    }
    .project-banner {
      background: var(--green);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .5rem;
    }
    .project-banner-name {
      font-size: .9rem;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }
    .project-banner-contract {
      font-family: var(--font-label);
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: rgba(255,255,255,0.8);
    }
    .project-banner-change {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      color: #fff;
      font-family: var(--font-ar);
      font-size: .75rem;
      font-weight: 600;
      padding: .25rem .6rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .project-banner-change:hover { background: rgba(255,255,255,0.3); }

    .error-msg {
      background: var(--red-light);
      border: 1px solid rgba(211,47,47,.25);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: .82rem;
      font-weight: 500;
      padding: .6rem .8rem;
      text-align: center;
    }

    /* ── INFO BOX ──────────────────────────────────────── */
    .info-box {
      background: var(--green-light);
      border: 1px solid var(--green-mid);
      border-radius: var(--radius-sm);
      padding: .6rem .85rem;
      font-size: .8rem;
      color: var(--green-dark);
      font-weight: 500;
    }

    /* ── DIVIDER ───────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: .25rem 0; }

    /* ── PIN / LOGIN SCREEN ────────────────────────────── */
    .pin-screen {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 2rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }
    .pin-screen svg { display: block; margin: 0 auto .25rem; }
    .pin-screen h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-1);
      text-align: center;
    }
    .pin-screen p {
      font-size: .85rem;
      color: var(--text-2);
      text-align: center;
      margin-bottom: .4rem;
    }
    .pin-input {
      text-align: center;
      letter-spacing: .5em;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .pin-attempts {
      font-size: .78rem;
      font-weight: 600;
      color: var(--red);
      background: var(--red-light);
      border: 1px solid rgba(211,47,47,.2);
      border-radius: var(--radius-sm);
      padding: .5rem .75rem;
      text-align: center;
    }

    /* ── ENGINEER NAV BAR ──────────────────────────────── */
    .nav-bar {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      font-family: var(--font-ar);
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-2);
      padding: .6rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .15rem;
    }
    .nav-btn.active { color: var(--green); }
    .nav-btn:hover { color: var(--green); }
    .nav-icon { font-size: 1.15rem; }

    /* ── ENGINEER LOG — TABS & CARDS ───────────────────── */
    .history-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      margin-bottom: .8rem;
    }
    .history-tab {
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-ar);
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-2);
      padding: .6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .history-tab.active {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-inline-start: 4px solid var(--green);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: .9rem 1rem;
      margin-bottom: .7rem;
    }
    .history-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .5rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }
    .history-card-note {
      font-weight: 700;
      font-size: .92rem;
      color: var(--text-1);
    }
    .history-card-time {
      font-family: var(--font-label);
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-3);
    }
    .history-card-body {
      font-size: .82rem;
      color: var(--text-2);
      line-height: 1.7;
    }
    .history-empty {
      text-align: center;
      color: var(--text-3);
      font-size: .85rem;
      padding: 2rem 1rem;
    }

    /* ── MOBILE ────────────────────────────────────────── */
    @media (hover: none) { input, select, textarea { font-size: 16px; } }
    @supports (padding: max(0px)) {
      .app-header { padding-top: max(.9rem, env(safe-area-inset-top)); }
      .app-footer { padding-bottom: max(.75rem, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ════════════════════════════════════════════════════════
// CONFIG — update these values, nothing else needs to change
// ════════════════════════════════════════════════════════
const CONFIG = {
  // Your deployed Google Apps Script URL
  scriptUrl: "https://script.google.com/macros/s/AKfycbwzPgQXVCufP89qDsqzw48TrMsXoadzfMfswkwGeqqa1bx-SAUkcLKPlA6ugweJkQymEQ/exec",

  // Project info shown in header & footer
  projectName:    "كوبري — أسفلت",
  projectNameEn:  "COPRI ASPHALT",
  footerText:     "شركة كوبري للمشاريع الإنشائية",

  // Dropdown options — add/remove as needed
  mixTypes: [
    "Type I (60/70)",
    "Type II (60/70)",
    "Type III (60/70)",
    "Type I AS",
    "Type II AS",
    "Type III AS",
    "Type I PMB",
    "Type II PMB",
    "Type III PMB",
    "Tack Coat",
    "Prime Coat",
    "Cold Mix",
  ],
  // ── Companies → projects → engineers ───────────────────────────────
  // The clerk first picks a COMPANY, then one of its PROJECTS.
  //   isCopri:true  → full flow: dispatch → site-engineer receipt.
  //   isCopri:false → ENDS AT THE PLANT: we only record the dispatch.
  //                   No engineer notification and no receipt step.
  //
  // engineers: per-project list. { name, pin, phone }
  //   phone = country code + number, digits only (no +, no spaces, no
  //   leading 0). Kuwait example: "96598765432". Leave "" until known.
  companies: {
    "كوبري": {
      isCopri: true,
      projects: {
        "كوبري — صيانة حولي": {
          contract:         "ق ص / ط ش / 9",
          sites:            ["بيان", "مشرف", "سلوى", "أخرى"],
          locationType:     "block_street",
          allowNamedStreet: true,   // main streets can be entered by name
          engineers: [
            { name: "أحمد عبد العزيز", pin: "8798", phone: "96551334626" },
            { name: "أحمد بدوي",       pin: "8255", phone: "96566911641" },
            { name: "إيهاب حسن",       pin: "5686", phone: "96550571838" },
            { name: "فؤاد الزغبي",     pin: "7764", phone: "96566767764" },
          ],
        },
        "كوبري — الطرق السريعة": {
          contract:     "هـ ص / ط / 9",

// Flattened, de-duplicated engineer list across all projects — used by the
// engineer login (receipt + ?role=engineer) where the project isn't known yet.
function allEngineers() {
  const seen = {}, out = [];
  Object.values(CONFIG.companies).forEach(c =>
    Object.values(c.projects).forEach(p =>
      (p.engineers || []).forEach(e => { if (!seen[e.name]) { seen[e.name] = 1; out.push(e); } })
    )
  );
  return out;
}
function findEngineer(name) { return allEngineers().find(e => e.name === name) || null; }

function getNoteFromURL() {

function timestamp() {
  const d = new Date();
  const toEN = s => s.replace(/[٠-٩]/g, c => String.fromCharCode(c.charCodeAt(0)-1584));
  return toEN(d.toLocaleString("ar-KW", {
    timeZone: "Asia/Kuwait",
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit",
  }));
}
function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
function input(type, placeholder, inputmode) {
  const i = el("input");
  i.type = type; i.placeholder = placeholder || "";
  if (inputmode) i.inputMode = inputmode;
  return i;
}
function select(options, placeholder) {
  const s = el("select");
  const def = el("option"); def.value = ""; def.textContent = placeholder; s.appendChild(def);
  options.forEach(o => { const op = el("option"); op.value = op.textContent = o; s.appendChild(op); });
  return s;
}
function textarea(placeholder, rows) {
  const t = el("textarea");
  t.placeholder = placeholder || ""; t.rows = rows || 2;

}
function fieldGroup(labelText, inputEl, required, hint) {
  const g = el("div", "field-group");
  const l = el("label"); l.textContent = labelText;
  if (required) { const r = el("span", "req"); r.textContent = " *"; l.appendChild(r); }
  g.appendChild(l);
  g.appendChild(inputEl);
  if (hint) { const h = el("div", "field-hint"); h.textContent = hint; g.appendChild(h); }
  return { group: g, input: inputEl };
}

async function postToScript(payload) {
  await fetch(CONFIG.scriptUrl, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
}
// Human-readable location string from a dispatch row/data object, aware of
// the three location types: block+street, km range, and named street.
function locDisplay(d) {
  if (d.locationType === "km_range") {
    if (!d.block && !d.street) return "";
    return `كم ${d.block || "?"} — ${d.street || "?"}`;
  }
  if (d.locationType === "named") return d.block || "";   // name stored in block
  // block_street
  const parts = [];
  if (d.block)  parts.push(`ق ${d.block}`);
  if (d.street) parts.push(`ش ${d.street}`);
  return parts.join(" / ");
}
// Digits-only phone for tel:/wa.me links (strips +, spaces, dashes).
function cleanPhone(p) { return String(p || "").replace(/[^\d]/g, ""); }
// Kuwait numbers are stored full (965 + local). The UI shows a fixed +965
// prefix, so the input holds only the local digits.
function localFromFull(full) { const d = cleanPhone(full); return d.indexOf("965") === 0 ? d.slice(3) : d; }
function phoneToFull(local)   { const d = cleanPhone(local); if (!d) return ""; return d.indexOf("965") === 0 ? d : "965" + d; }

// Auto load count — asks the backend for the next load number at this exact
// location (project + site + block + street) within the current shift
// (resets at noon Kuwait). Returns the next number, or null on failure.
async function fetchNextLoad(projectName, site, block, street) {
  try {
    const u = `${CONFIG.scriptUrl}?nextLoad=1` +
      `&project=${encodeURIComponent(projectName || "")}` +
      `&site=${encodeURIComponent(site || "")}` +
      `&block=${encodeURIComponent(block || "")}` +
      `&street=${encodeURIComponent(street || "")}`;
    const r = await fetch(u);
    const j = await r.json();
    return (typeof j.next === "number") ? j.next : null;
  } catch { return null; }
}

  );
}

// Open the print-ready delivery note in a new window, inject the dispatch
// data + QR, and trigger the browser print dialog.
function printDeliveryNote(data, receiptLink) {
  const w = window.open("", "_blank", "width=900,height=650");
  if (!w) { alert("يرجى السماح بالنوافذ المنبثقة لطباعة السند"); return; }
  w.document.write(TEMPLATE_HTML);
  w.document.close();

  const inject = () => {
    const d = w.document;
    const set = (id, val) => { const node = d.getElementById(id); if (node) node.textContent = val; };
    set("note-number", data.noteNumber);
    set("footer-note", data.noteNumber);
    set("load-number", data.loadNumber ? String(data.loadNumber) : "—");
    set("org-line", data.project);
    set("contract-display", data.contract ? `رقم العقد: ${data.contract}` : "");
    set("work-order", data.workOrder);
    set("plant", data.plant);
    set("truck", data.truckNumber);
    set("driver", data.driverName);
    set("mix-type", data.mixType);
    set("temp", `${data.tempDispatch}°م`);
    set("net-weight", data.weight);
    set("site", data.site);

    // Location label/value depends on the project's location type
    if (data.locationType === "km_range") {
      set("block-label", "من الكيلومتر"); set("block", data.block);
      set("street-label", "إلى الكيلومتر"); set("street", data.street);
    } else if (data.locationType === "named") {
      set("block-label", "اسم الشارع / الموقع"); set("block", data.block);
      set("street-label", ""); set("street", "");
    } else {
      set("block-label", "القطعة"); set("block", data.block);
      set("street-label", "الشارع"); set("street", data.street);
    }

    set("clerk-name", data.clerkName);
    set("remarks", data.remarks || "");

    const now = new Date();
    const toEN = s => s.replace(/[٠-٩]/g, c => String.fromCharCode(c.charCodeAt(0) - 1584));
    set("date", toEN(now.toLocaleDateString("ar-KW", { timeZone: "Asia/Kuwait" })));
    set("time", toEN(now.toLocaleTimeString("ar-KW", { timeZone: "Asia/Kuwait", hour: "2-digit", minute: "2-digit" })));

    try {
      const base = (receiptLink || window.location.href).split("?")[0];
      if (typeof w.generateQR === "function") w.generateQR(data.noteNumber, base);
    } catch (e) { /* QR is best-effort */ }

    setTimeout(() => { try { w.focus(); w.print(); } catch (e) {} }, 600);
  };

  if (w.document.readyState === "complete") inject();
  else w.onload = inject;
}

    btn.innerHTML = `
      <div class="project-btn-name">${name}</div>
      <div class="project-btn-contract">${company.isCopri ? "كوبري — تسليم بالموقع" : "تسجيل بالمصنع فقط"} · ${projCount} مشروع</div>
    `;
    btn.addEventListener("click", () => renderProjectSelect(name, company));
    card.appendChild(btn);
  });

  main.appendChild(card);
}

// Step 2 — pick the PROJECT within the chosen company.
function renderProjectSelect(companyName, company) {
  const main = renderShell("اختيار المشروع");

  const card = el("div", "card");
  card.appendChild(sectionTitle(`${companyName} — اختر المشروع`));

  const info = el("div", "info-box");
  info.textContent = "يرجى تحديد المشروع قبل إدخال بيانات الشحنة";
  card.appendChild(info);

  Object.entries(company.projects).forEach(([name, proj]) => {
    const btn = el("button", "project-btn");
    btn.innerHTML = `
      <div class="project-btn-name">${name}</div>
      <div class="project-btn-contract">${proj.contract || ""}</div>
    `;
    btn.addEventListener("click", () =>
      renderDispatch({ companyName, company, projectName: name, project: proj })
    );
    card.appendChild(btn);
  });

  const back = el("button", "btn-ghost"); back.textContent = "← تغيير الشركة";
  back.addEventListener("click", renderCompanySelect);
  card.appendChild(back);

  main.appendChild(card);
}

function renderDispatch(ctx) {
  const { companyName, company, projectName, project } = ctx;
  const isCopri = !!company.isCopri;
  const submitLabel = isCopri ? "إرسال وإخطار المهندس &nbsp;🚛" : "تسجيل الشحنة &nbsp;🚛";
  const main = renderShell("إرسال شحنة");

  // Company + project banner
  const banner = el("div", "project-banner");
  banner.innerHTML = `
    <div class="project-banner-name">${projectName}</div>
    <div class="project-banner-contract">${companyName}${project.contract ? " · " + project.contract : ""}</div>
    <button class="project-banner-change" id="changeProjectBtn">تغيير</button>
  `;
  main.appendChild(banner);
  document.getElementById("changeProjectBtn").addEventListener("click", renderCompanySelect);

  // If "other" project — show free text fields for project name and contract
  let otherProjectInput = null, otherContractInput = null;
  if (project.isOther) {
    const otherCard = el("div", "card");
    otherCard.style.marginBottom = ".5rem";
    otherCard.appendChild(sectionTitle("تفاصيل المشروع"));
    const { group: gOP, input: opInput } = fieldGroup(
      "اسم المشروع", input("text", "أدخل اسم المشروع"), true
    );
    const { group: gOC, input: ocInput } = fieldGroup(
      "رقم العقد", input("text", "أدخل رقم العقد"), false
    );
    otherCard.appendChild(gOP);
    otherCard.appendChild(gOC);
    main.appendChild(otherCard);
    otherProjectInput  = opInput;
    otherContractInput = ocInput;
  }

  const card = el("div", "card");

  // Section: Shipment data
  card.appendChild(sectionTitle("بيانات الشحنة"));

  const { group: g1, input: noteInput } = fieldGroup(
    "رقم سند التسليم", input("text", "مثال: 125407", "numeric"), true, "من الكتاب الكربوني الحالي"
  );
  card.appendChild(g1);

  const { group: gPlant, input: plantInput } = fieldGroup(
    "رقم المصنع", select(CONFIG.plants, "اختر المصنع"), true
  );
  card.appendChild(gPlant);

  const { group: gWO, input: woInput } = fieldGroup(
    "رقم أمر العمل", input("text", "مثال: 29", "numeric"), true
  );
  card.appendChild(gWO);

  const { group: gNaqel, input: naqelInput } = fieldGroup(
    "الناقل", select(CONFIG.naqelOptions, "اختر الناقل"), true
  );
  card.appendChild(gNaqel);

  // ── Driver section — rebuilt when الناقل changes ──────────────────
  // The driver (quick-pick for Copri) comes first and auto-fills the phone
  // and plate; all stay editable. Phone has a fixed +965 prefix, so the
  // clerk types only the local digits. External contractor = free text.
  const driverWrap = el("div", "field-group"); driverWrap.style.gap = ".9rem";
  let getDriver = () => ({ name: "", phone: "", truck: "" });
  function buildDriver() {
    driverWrap.innerHTML = "";
    const copri = naqelInput.value === "كوبري";

    // 1) Driver name — the field that populates phone + plate
    const { group: gName, input: nameI } = fieldGroup("اسم السائق", input("text", "الاسم الكامل"), true);
    let pickSel = null;
    if (copri && CONFIG.copriDrivers.length) {
      const { group: gPick, input: ps } = fieldGroup(
        "اختر سائق كوبري", select(CONFIG.copriDrivers.map(d => d.name), "اختر من القائمة"), false,
        "يملأ الاسم والهاتف ورقم الشاحنة تلقائياً — يمكن تعديلها"
      );
      pickSel = ps;
      driverWrap.appendChild(gPick);
    }
    driverWrap.appendChild(gName);

    // 2) Phone — fixed +965 prefix, local digits only
    const gPhone = el("div", "field-group");
    const lblP = el("label"); lblP.textContent = "هاتف السائق"; gPhone.appendChild(lblP);
    const phoneRow = el("div"); phoneRow.style.display = "flex"; phoneRow.style.gap = ".4rem";
    phoneRow.style.direction = "ltr"; phoneRow.style.alignItems = "stretch";
    const prefix = el("div"); prefix.textContent = "+965";
    prefix.style.cssText = "display:flex;align-items:center;padding:0 .8rem;background:var(--surface-2);" +
      "border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-2);font-weight:700;white-space:nowrap;";
    const phoneI = input("tel", "XXXXXXXX", "tel"); phoneI.maxLength = 8;
    phoneI.style.direction = "ltr"; phoneI.style.textAlign = "left";
    phoneRow.appendChild(prefix); phoneRow.appendChild(phoneI);
    gPhone.appendChild(phoneRow);
    const hintP = el("div", "field-hint"); hintP.textContent = "٨ أرقام محلية بدون 965 — للتواصل من سجل المهندس";
    gPhone.appendChild(hintP);
    driverWrap.appendChild(gPhone);

    // 3) Plate number
    const { group: gTruck, input: truckI } = fieldGroup("رقم الشاحنة", input("text", "رقم اللوحة"), true);
    driverWrap.appendChild(gTruck);

    if (pickSel) {
      pickSel.addEventListener("change", () => {
        const d = CONFIG.copriDrivers.find(x => x.name === pickSel.value);
        if (d) { nameI.value = d.name; phoneI.value = localFromFull(d.phone); truckI.value = d.truck || ""; }
      });
    }

    getDriver = () => ({
      name:  nameI.value.trim(),
      phone: phoneToFull(phoneI.value),
      truck: truckI.value.trim(),
    });
  }
  naqelInput.addEventListener("change", buildDriver);
  buildDriver();
  card.appendChild(driverWrap);

  const { group: g4, input: mixInput } = fieldGroup(
    "نوع الخلطة", select(CONFIG.mixTypes, "اختر النوع"), true
  );
  card.appendChild(g4);

  const row3 = el("div", "field-row-2");
  const { group: g5, input: weightInput } = fieldGroup("الوزن (طن)", input("number", "33.00", "decimal"), true);
  weightInput.step = "0.01";
  const { group: g6, input: tempInput } = fieldGroup("الحرارة عند الإرسال °م", input("number", "150", "numeric"), true);
  row3.appendChild(g5); row3.appendChild(g6);
  card.appendChild(row3);

  // Site: required dropdown for Copri; optional free text (no suggestions) otherwise
  let siteInput;
  if (isCopri) {
    const { group: g7, input: sIn } = fieldGroup(
      "الموقع المستلم", select(project.sites || [], "اختر الموقع"), true
    );
    siteInput = sIn; card.appendChild(g7);
  } else {
    const { group: g7, input: sIn } = fieldGroup(
      "الموقع المستلم", input("text", "اختياري"), false
    );
    siteInput = sIn; card.appendChild(g7);
  }

  // ── Location section ──────────────────────────────────────────────
  // km_range  → from/to kilometre.
  // block_street → block + street, with an optional "named street" toggle
  //                for main streets that have no block/street number.
  let getLocation = () => ({ block: "", street: "", locationType: project.locationType });
  let locContainer = null;   // element that holds the location inputs (for change events)

  if (project.locationType === "km_range") {
    const row4 = el("div", "field-row-2");
    const { group: gFrom, input: kmFrom } = fieldGroup("من الكيلومتر", input("text", "مثال: 12.5", "decimal"), true);
    const { group: gTo,   input: kmTo }   = fieldGroup("إلى الكيلومتر", input("text", "مثال: 14.0", "decimal"), true);
    row4.appendChild(gFrom); row4.appendChild(gTo);
    card.appendChild(row4);
    locContainer = row4;
    getLocation = () => ({ block: kmFrom.value.trim(), street: kmTo.value.trim(), locationType: "km_range" });
  } else {
    let locMode = "blocks"; // "blocks" | "named"
    const locWrap = el("div");
    locContainer = locWrap;

    // Toggle (only for projects that allow named main streets)
    if (project.allowNamedStreet) {
      const lbl = el("label"); lbl.textContent = "نوع العنوان"; lbl.style.marginBottom = ".35rem"; lbl.style.display = "block";
      const toggle = el("div", "history-tabs"); toggle.style.marginBottom = "0";
      const tBlocks = el("button", "history-tab active"); tBlocks.type = "button"; tBlocks.textContent = "قطعة وشارع";
      const tNamed  = el("button", "history-tab");        tNamed.type  = "button"; tNamed.textContent  = "اسم الشارع";
      toggle.appendChild(tBlocks); toggle.appendChild(tNamed);
      card.appendChild(lbl); card.appendChild(toggle);
      tBlocks.addEventListener("click", () => {
        if (locMode === "blocks") return;
        locMode = "blocks"; tBlocks.classList.add("active"); tNamed.classList.remove("active"); buildLoc();
      });
      tNamed.addEventListener("click", () => {
        if (locMode === "named") return;
        locMode = "named"; tNamed.classList.add("active"); tBlocks.classList.remove("active"); buildLoc();
      });
    }

    function buildLoc() {
      locWrap.innerHTML = "";
      if (locMode === "named") {
        const { group: gName, input: nameI } = fieldGroup(
          "اسم الشارع / الموقع", input("text", "مثال: شارع بيروت"), true
        );
        locWrap.appendChild(gName);
        getLocation = () => ({ block: nameI.value.trim(), street: "", locationType: "named" });
      } else {
        const row4 = el("div", "field-row-2");
        const { group: gBlock,  input: bInput } = fieldGroup("القطعة", input("text", "رقم القطعة", "numeric"), true);
        const { group: gStreet, input: sInput } = fieldGroup("الشارع", input("text", "رقم الشارع", "numeric"), true);
        row4.appendChild(gBlock); row4.appendChild(gStreet);
        locWrap.appendChild(row4);
        getLocation = () => ({ block: bInput.value.trim(), street: sInput.value.trim(), locationType: "block_street" });
      }
    }
    buildLoc();
    card.appendChild(locWrap);
  }

  // ── Auto load number for this exact location (live preview) ────────
  // Counts loads to project+site+block+street since the last noon shift.
  const loadBox = el("div", "info-box");
  loadBox.style.fontWeight = "700";
  loadBox.textContent = "رقم الحمولة لهذا الموقع: —";
  card.appendChild(loadBox);

  let liveLoad = null;
  let loadReqSeq = 0;
  async function refreshLoadNumber() {
    const loc = getLocation();
    if (!loc.block) { liveLoad = null; loadBox.textContent = "رقم الحمولة لهذا الموقع: —"; return; }
    const seq = ++loadReqSeq;
    loadBox.textContent = "رقم الحمولة لهذا الموقع: جارٍ الحساب…";
    const n = await fetchNextLoad(projectName, siteInput.value, loc.block, loc.street);
    if (seq !== loadReqSeq) return;   // a newer request superseded this one
    liveLoad = n;
    loadBox.textContent = n
      ? `رقم الحمولة لهذا الموقع: ${n}  ·  منذ ظهر اليوم`
      : "رقم الحمولة لهذا الموقع: —";
  }
  siteInput.addEventListener("change", refreshLoadNumber);
  if (locContainer) locContainer.addEventListener("change", refreshLoadNumber);

  // Engineer to notify — Copri only (other companies end at the plant)
  let notifyInput = null;
  if (isCopri) {
    const engineers = project.engineers || [];
    const { group: gNotify, input: nInput } = fieldGroup(
      "إخطار المهندس", select(engineers.map(e => e.name), "اختر المهندس"), true,
      "سيظهر زر إرسال رابط الاستلام له عبر WhatsApp بعد الإرسال"
    );
    card.appendChild(gNotify);
    notifyInput = nInput;
    if (!engineers.length) {
      const noEng = el("div", "info-box");
      noEng.textContent = "لا يوجد مهندسون مُسجّلون لهذا المشروع بعد — يرجى إضافتهم في الإعدادات.";
      card.appendChild(noEng);
    }
  }

  // Section: Clerk signature
  card.appendChild(sectionTitle("توقيع المشرف"));

  const { group: g8, input: clerkInput } = fieldGroup(
    "اسم المشرف / الكاتب",
    CONFIG.clerks.length ? select(CONFIG.clerks.map(c => c.name), "اختر اسمك") : input("text", "الاسم الكامل"),
    true
  );
  const clerkSession = getClerkSession();
  if (clerkSession) { clerkInput.value = clerkSession.name; clerkInput.disabled = true; }
  card.appendChild(g8);

  const { group: g9, input: remarksInput } = fieldGroup(
    "ملاحظات", textarea("أي ملاحظات على الشحنة..."), false
  );
  card.appendChild(g9);

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none";
  card.appendChild(errDiv);

  const btn = el("button", "btn-primary"); btn.type = "button";
  btn.innerHTML = submitLabel;
  card.appendChild(btn);

  main.appendChild(card);

  // Submit handler
  btn.addEventListener("click", async () => {
    const driver = getDriver();
    const loc    = getLocation();
    const data = {
      company:      companyName,
      project:      project.isOther ? (otherProjectInput ? otherProjectInput.value.trim() : projectName) : projectName,
      contract:     project.isOther ? (otherContractInput ? otherContractInput.value.trim() : "") : project.contract,
      workOrder:    woInput.value.trim(),
      noteNumber:   noteInput.value.trim(),
      plant:        plantInput.value,
      truckNumber:  driver.truck,
      naqel:        naqelInput.value,
      driverName:   driver.name,
      driverPhone:  cleanPhone(driver.phone),
      mixType:      mixInput.value,
      weight:       weightInput.value,
      tempDispatch: tempInput.value,
      site:         siteInput.value,
      block:        loc.block,
      street:       loc.street,
      locationType: loc.locationType,
      clerkName:    clerkInput.value,
      notifyEngineer: notifyInput ? notifyInput.value : "",
      remarks:      remarksInput.value.trim(),
    };
    // street is not required in km_range "from only"? both required; in named mode only block (the name) is required.
    const required = ["workOrder","noteNumber","plant","truckNumber","naqel","driverName","mixType","weight","tempDispatch","block","clerkName"];
    if (data.locationType !== "named") required.push("street");
    if (isCopri) required.push("site", "notifyEngineer");
    if (project.isOther && otherProjectInput && !otherProjectInput.value.trim()) {
      errDiv.textContent = "يرجى إدخال اسم المشروع"; errDiv.style.display = "block"; return;
    }
    if (required.some(k => !data[k])) {
      errDiv.textContent = "يرجى تعبئة جميع الحقول المطلوبة";
      errDiv.style.display = "block"; return;
    }
    errDiv.style.display = "none";
    btn.disabled = true; btn.textContent = "جارٍ التحقق...";

    // Prevent duplicate delivery-note numbers — block if this note already exists
    try {
      const dupRes  = await fetch(`${CONFIG.scriptUrl}?note=${encodeURIComponent(data.noteNumber)}`);
      const dupJson = await dupRes.json();
      if (dupJson.found) {
        btn.disabled = false; btn.innerHTML = submitLabel;
        errDiv.textContent = `رقم السند ${data.noteNumber} مُستخدم مسبقاً — تأكد من الرقم`;
        errDiv.style.display = "block";
        return;
      }
    } catch { /* network issue checking — allow dispatch rather than block work */ }

    // Authoritative load number for this exact location, fetched right before
    // writing so it reflects the latest count (resets at noon Kuwait).
    const authLoad = await fetchNextLoad(data.project, data.site, data.block, data.street);
    data.loadNumber = (authLoad != null) ? authLoad : (liveLoad != null ? liveLoad : "");

    btn.textContent = "جارٍ الإرسال...";
    try {
      await postToScript({ type: "dispatch", ...data, timestamp: timestamp() });
      const receiptLink = `${window.location.href.split("?")[0]}?note=${encodeURIComponent(data.noteNumber)}`;
      renderDispatchSuccess(ctx, data, receiptLink);
    } catch {
      btn.disabled = false; btn.innerHTML = submitLabel;
      errDiv.textContent = "حدث خطأ، يرجى المحاولة مجدداً";
      errDiv.style.display = "block";
    }
  });
}

function renderDispatchSuccess(ctx, data, receiptLink) {
  const isCopri = !!ctx.company.isCopri;
  const main = document.getElementById("main-content");
  main.innerHTML = "";

  const s = el("div", "success-screen");
  const icon = el("div", "success-icon ok"); icon.textContent = "✓"; s.appendChild(icon);
  const h = el("h2"); h.textContent = isCopri ? "تم الإرسال بنجاح" : "تم تسجيل الشحنة"; s.appendChild(h);
  const p1 = el("p"); p1.innerHTML = `<strong>${data.company}</strong> — ${data.project}`; s.appendChild(p1);
  const p2b = el("p"); p2b.innerHTML = `أمر العمل: <strong>${data.workOrder}</strong> — رقم السند: <strong>${data.noteNumber}</strong>`; s.appendChild(p2b);
  const loc = locDisplay(data);
  const p2c = el("p"); p2c.textContent = `${data.plant} — ${data.site}${loc ? " / " + loc : ""}`; s.appendChild(p2c);
  if (data.loadNumber) {
    const pLoad = el("p", "success-note");
    pLoad.textContent = `🔢 رقم الحمولة لهذا الموقع: ${data.loadNumber}`;
    s.appendChild(pLoad);
  }

  // Copri only: site-engineer receipt link + WhatsApp notification.
  if (isCopri) {
    const lb = el("div", "link-box");
    const lbl = el("span", "link-box-label"); lbl.textContent = "🔗 رابط الاستلام — أرسله للمهندس على WhatsApp";
    lb.appendChild(lbl);
    lb.appendChild(document.createTextNode(receiptLink));
    s.appendChild(lb);

    const notifyEng = findEngineer(data.notifyEngineer);
    if (notifyEng && notifyEng.phone) {
      const waBtn = el("button", "btn-primary"); waBtn.style.marginTop = ".75rem";
      waBtn.style.background = "#25D366";
      waBtn.innerHTML = `إرسال إلى ${notifyEng.name} عبر WhatsApp &nbsp;💬`;
      waBtn.addEventListener("click", () => {
        window.open(`https://wa.me/${notifyEng.phone}?text=${whatsappMessage(data, receiptLink)}`, "_blank");
      });
      s.appendChild(waBtn);
    } else if (data.notifyEngineer) {
      const noPhone = el("div", "info-box"); noPhone.style.marginTop = ".75rem";
      noPhone.textContent = `لا يوجد رقم WhatsApp للمهندس ${data.notifyEngineer} — انسخ الرابط وأرسله يدوياً، أو أضف الرقم في الإعدادات.`;
      s.appendChild(noPhone);
    }

    const copyBtn = el("button", "btn-primary"); copyBtn.style.marginTop = ".75rem";
    copyBtn.style.background = "var(--text-2)";
    copyBtn.textContent = "نسخ الرابط 📋";
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(receiptLink);
      copyBtn.textContent = "تم النسخ ✓";
    });
    s.appendChild(copyBtn);
  } else {
    const done = el("p", "success-note"); done.textContent = "تم التسجيل بالمصنع — لا حاجة لإرسال للموقع."; s.appendChild(done);
  }

  const newBtn = el("button", "btn-ghost"); newBtn.textContent = "إرسال شحنة جديدة";
  newBtn.addEventListener("click", () => renderDispatch(ctx));
  s.appendChild(newBtn);

  const projBtn = el("button", "btn-ghost"); projBtn.textContent = "تغيير الشركة / المشروع";
  projBtn.addEventListener("click", renderCompanySelect);
  s.appendChild(projBtn);

  const logoutBtn = el("button", "btn-ghost"); logoutBtn.textContent = "تسجيل الخروج";
  logoutBtn.style.color = "var(--text-3)";
  logoutBtn.addEventListener("click", () => { clearClerkSession(); renderClerkPINScreen(renderCompanySelect); });
  s.appendChild(logoutBtn);

  main.appendChild(s);
}

// ════════════════════════════════════════════════════════
// RECEIPT FORM — filled by site engineer
// ════════════════════════════════════════════════════════
async function renderReceipt(noteNumber, preAuthName) {
  const main = renderShell("استلام شحنة");

  // Loading
  const loading = el("div", "loading-screen");
  loading.innerHTML = `<div class="spinner"></div><p>جارٍ تحميل بيانات الشحنة...</p>`;
  main.appendChild(loading);

  // Fetch dispatch data
  let dispatch = null;
  try {
    const res = await fetch(`${CONFIG.scriptUrl}?note=${encodeURIComponent(noteNumber)}`);
    const json = await res.json();
    if (json.found) dispatch = json.row;
  } catch { /* network error — show what we have */ }

  main.innerHTML = "";

  // ── One-time link check — block if already receipted ──────────────────
  if (dispatch) {
    try {
      const statusRes  = await fetch(`${CONFIG.scriptUrl}?checkReceipt=${encodeURIComponent(noteNumber)}`);
      const statusJson = await statusRes.json();
      if (statusJson.alreadyReceived) {
        const s = el("div", "success-screen");
        const icon = el("div", "success-icon ok"); icon.textContent = "✓"; s.appendChild(icon);
        const h = el("h2"); h.textContent = "تم استلام هذه الشحنة مسبقاً"; s.appendChild(h);
        const p1 = el("p"); p1.textContent = `رقم السند: ${noteNumber}`; s.appendChild(p1);
        const p2 = el("p"); p2.textContent = `تم التأكيد بواسطة: ${statusJson.engineer}`; s.appendChild(p2);
        const p3 = el("p"); p3.textContent = `في: ${statusJson.timestamp}`; s.appendChild(p3);
        main.appendChild(s);
        return;
      }
    } catch { /* network issue — allow to proceed */ }
  }

  // ── Summary card ──────────────────────────────────────
  const summary = el("div", "receipt-summary");
  const sh = el("div", "summary-header");
  const sl = el("div", "section-title"); sl.style.border="none"; sl.style.paddingBottom="0"; sl.textContent = "بيانات الشحنة الواردة";
  sh.appendChild(sl);
  sh.appendChild(badge("في الطريق", "badge-transit"));
  summary.appendChild(sh);

  if (dispatch) {
    const rows = [
      ["المشروع",                dispatch.project || "—"],
      ["رقم العقد",              dispatch.contract || "—"],
      ["رقم أمر العمل",          dispatch.workOrder || "—"],
      ["رقم السند",              dispatch.noteNumber],
      ["رقم الحمولة لهذا الموقع", dispatch.loadNumber || "—"],
      ["المصنع",                 dispatch.plant],
      ["رقم الشاحنة",            dispatch.truckNumber],
      ["الناقل",                 dispatch.naqel || "—"],
      ["السائق",                 dispatch.driverName],
      ["نوع الخلطة",             dispatch.mixType],
      ["الوزن المرسل",           `${dispatch.weight} طن`],
      ["الحرارة عند الإرسال",    `${dispatch.tempDispatch}°م`],
      ["الموقع",                 dispatch.site],
    ];
    if (dispatch.locationType === "km_range") {
      rows.push(["من الكيلومتر", dispatch.block || "—"]);
      rows.push(["إلى الكيلومتر", dispatch.street || "—"]);
    } else if (dispatch.locationType === "named") {
      rows.push(["اسم الشارع / الموقع", dispatch.block || "—"]);
    } else {
      rows.push(["القطعة", dispatch.block || "—"]);
      rows.push(["الشارع", dispatch.street || "—"]);
    }
    rows.push(["وقت المغادرة", dispatch.timestamp]);
    rows.forEach(([l, v]) => summary.appendChild(fieldRow(l, v)));
  } else {
    summary.appendChild(fieldRow("رقم السند", noteNumber));
    const warn = el("div", "info-box"); warn.style.marginTop=".5rem";
    warn.textContent = "لم يتم العثور على بيانات الإرسال لهذا السند. تأكد من الرقم وأعد المحاولة.";
    summary.appendChild(warn);
  }

  // Contact the driver directly (call / WhatsApp) if a number was recorded
  if (dispatch && dispatch.driverPhone) {
    const contact = driverContactRow(dispatch.driverName, dispatch.driverPhone);
    contact.style.marginTop = ".6rem";
    summary.appendChild(contact);
  }
  main.appendChild(summary);

  // ── Receipt form ──────────────────────────────────────
  const card = el("div", "card");
  card.appendChild(sectionTitle("تأكيد الاستلام"));

  // Engineer name
  const engList = allEngineers();
  const { group: g1, input: engInput } = fieldGroup(
    "اسم المهندس",
    engList.length ? select(engList.map(e => e.name), "اختر اسمك") : input("text", "الاسم الكامل"),
    true
  );
  if (preAuthName) { engInput.value = preAuthName; engInput.disabled = true; }
  card.appendChild(g1);

  const { group: gWOr, input: woReceiptInput } = fieldGroup(
    "رقم أمر العمل", input("text", "مثال: 29", "numeric"), true,
    dispatch ? `أمر العمل المرسل: ${dispatch.workOrder || "—"}` : ""
  );
  if (dispatch && dispatch.workOrder) woReceiptInput.value = dispatch.workOrder;
  card.appendChild(gWOr);

  // Arrival weight is no longer entered by the engineer — it defaults to the
  // dispatched weight (recorded at the plant scale). See submit handler below.

  // Temperature at arrival
  const row = el("div", "field-row-2");
  const { group: g3, input: tempArrInput } = fieldGroup(
    "الحرارة عند الوصول °م", input("number", "أدخل القراءة", "numeric"), true
  );
  const tempDeltaDiv = el("div", "temp-delta"); tempDeltaDiv.style.display = "none";
  g3.appendChild(tempDeltaDiv);
  row.appendChild(g3);
  card.appendChild(row);

  tempArrInput.addEventListener("input", () => {
    if (!dispatch || !tempArrInput.value) { tempDeltaDiv.style.display = "none"; return; }
    const diff = Math.abs(Number(tempArrInput.value) - Number(dispatch.tempDispatch));
    tempDeltaDiv.style.display = "block";
    tempDeltaDiv.className = `temp-delta ${diff > CONFIG.tempDropWarning ? "delta-warn" : "delta-ok"}`;
    tempDeltaDiv.textContent = `فرق الحرارة: ${diff}°م ${diff > CONFIG.tempDropWarning ? "⚠ كبير" : "✓"}`;
  });

  // Decision
  const decGroup = el("div", "field-group");
  const decLabel = el("label"); decLabel.innerHTML = 'قرار الاستلام <span class="req">*</span>';
  const decBtns = el("div", "decision-buttons");
  const acceptBtn = el("button", "decision-btn accept"); acceptBtn.type = "button"; acceptBtn.innerHTML = "✓&nbsp; قبول";
  const rejectBtn = el("button", "decision-btn reject"); rejectBtn.type = "button"; rejectBtn.innerHTML = "✗&nbsp; رفض";
  decBtns.appendChild(acceptBtn); decBtns.appendChild(rejectBtn);
  decGroup.appendChild(decLabel); decGroup.appendChild(decBtns);
  card.appendChild(decGroup);

  let decision = "";

  const { group: reasonGroupEl, input: reasonInput } = fieldGroup(
    "سبب الرفض", select(CONFIG.rejectionReasons, "اختر السبب"), true
  );
  reasonGroupEl.style.display = "none";
  card.appendChild(reasonGroupEl);

  const { group: remarksGroup, input: remarksInput } = fieldGroup(
    "ملاحظات", textarea("أي ملاحظات..."), false
  );
  remarksGroup.style.display = "none";
  card.appendChild(remarksGroup);

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none";
  card.appendChild(errDiv);

  const submitBtn = el("button", "btn-primary"); submitBtn.type = "button";
  submitBtn.textContent = "تأكيد الاستلام والتوقيع";
  card.appendChild(submitBtn);

  main.appendChild(card);

  acceptBtn.addEventListener("click", () => {
    decision = "مقبول";
    acceptBtn.classList.add("active"); rejectBtn.classList.remove("active");
    reasonGroupEl.style.display = "none"; remarksGroup.style.display = "flex";
    submitBtn.className = "btn-primary"; submitBtn.textContent = "تأكيد الاستلام والتوقيع";
  });
  rejectBtn.addEventListener("click", () => {
    decision = "مرفوض";
    rejectBtn.classList.add("active"); acceptBtn.classList.remove("active");
    reasonGroupEl.style.display = "flex"; remarksGroup.style.display = "none";
    submitBtn.className = "btn-primary btn-danger"; submitBtn.textContent = "تسجيل الرفض";
  });

  submitBtn.addEventListener("click", async () => {
    if (!engInput.value) { errDiv.textContent = "يرجى اختيار اسم المهندس"; errDiv.style.display = "block"; return; }
    if (!tempArrInput.value) { errDiv.textContent = "يرجى إدخال الحرارة عند الوصول"; errDiv.style.display = "block"; return; }
    if (!decision) { errDiv.textContent = "يرجى اختيار قبول أو رفض"; errDiv.style.display = "block"; return; }
    if (decision === "مرفوض" && !reasonInput.value) { errDiv.textContent = "يرجى اختيار سبب الرفض"; errDiv.style.display = "block"; return; }
    errDiv.style.display = "none";
    submitBtn.disabled = true; submitBtn.textContent = "جارٍ التسجيل...";

    try {
      await postToScript({
        type:          "receipt",
        noteNumber,
        engineerName:  engInput.value,
        workOrder:     woReceiptInput.value.trim(),
        decision,
        weightArrival: dispatch ? dispatch.weight : "",
        tempArrival:   tempArrInput.value,
        remarks:       decision === "مرفوض" ? reasonInput.value : remarksInput.value,
        timestamp:     timestamp(),
      });
      renderReceiptSuccess(noteNumber, decision, preAuthName);
    } catch {
      submitBtn.disabled = false;
      errDiv.textContent = "حدث خطأ، يرجى المحاولة مجدداً";
      errDiv.style.display = "block";
    }
  });
}

function renderReceiptSuccess(noteNumber, decision, engName) {
  const main = document.getElementById("main-content");
  main.innerHTML = "";

  const s = el("div", "success-screen");
  const accepted = decision === "مقبول";
  const icon = el("div", `success-icon ${accepted ? "ok" : "rejected"}`);
  icon.textContent = accepted ? "✓" : "✗"; s.appendChild(icon);
  const h = el("h2"); h.textContent = accepted ? "تم قبول الشحنة" : "تم تسجيل الرفض"; s.appendChild(h);
  const p1 = el("p"); p1.textContent = `رقم السند: ${noteNumber}`; s.appendChild(p1);
  const p2 = el("p", "success-note"); p2.textContent = `تم تسجيل توقيعك — ${timestamp()}`; s.appendChild(p2);

  // Quick access to engineer log
  if (engName) {
    const logBtn = el("button", "btn-primary");
    logBtn.style.marginTop = ".9rem";
    logBtn.textContent = "عرض سجلاتي 📋";
    logBtn.addEventListener("click", () => renderEngineerHome(engName));
    s.appendChild(logBtn);
  }

  main.appendChild(s);
}

// ════════════════════════════════════════════════════════
// SESSION MANAGEMENT — PIN auth for engineers and clerks
// ════════════════════════════════════════════════════════
function getEngineerSession() {
  try { return JSON.parse(sessionStorage.getItem("eng_session") || "null"); } catch { return null; }
}
function setEngineerSession(name) {
  sessionStorage.setItem("eng_session", JSON.stringify({ name, ts: Date.now() }));
}
function clearEngineerSession() {
  sessionStorage.removeItem("eng_session");
}
function getClerkSession() {
  try { return JSON.parse(sessionStorage.getItem("clerk_session") || "null"); } catch { return null; }
}
function setClerkSession(name) {
  sessionStorage.setItem("clerk_session", JSON.stringify({ name, ts: Date.now() }));
}
function clearClerkSession() {
  sessionStorage.removeItem("clerk_session");
}

// ── Clerk PIN screen ──────────────────────────────────
function renderClerkPINScreen(onSuccess) {
  const main = renderShell("تسجيل دخول الكاتب");
  main.innerHTML = "";

  const screen = el("div", "pin-screen");
  const logo = el("div"); logo.innerHTML = `<svg width="48" height="48" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#00A651"/><path d="M6 22 L16 10 L26 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 22 L16 14 L22 22" fill="white" opacity="0.3"/><rect x="4" y="22" width="24" height="3" rx="1.5" fill="white"/></svg>`;
  screen.appendChild(logo);

  const h = el("h2"); h.textContent = "تسجيل الدخول — المصنع"; screen.appendChild(h);
  const p = el("p"); p.textContent = "اختر اسمك وأدخل الرمز السري للمتابعة"; screen.appendChild(p);

  const { group: gName, input: nameInput } = fieldGroup(
    "الاسم", select(CONFIG.clerks.map(c => c.name), "اختر اسمك"), true
  );
  screen.appendChild(gName);

  const pinWrap = el("div", "field-group");
  const pinLabel = el("label"); pinLabel.innerHTML = 'الرمز السري <span class="req">*</span>';
  const pinInput = input("password", "••••", "numeric");
  pinInput.className += " pin-input";
  pinInput.maxLength = 4;
  pinWrap.appendChild(pinLabel);
  pinWrap.appendChild(pinInput);
  screen.appendChild(pinWrap);

  const attemptsDiv = el("div", "pin-attempts"); attemptsDiv.style.display = "none";
  screen.appendChild(attemptsDiv);

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none";
  screen.appendChild(errDiv);

  const btn = el("button", "btn-primary"); btn.type = "button";
  btn.textContent = "دخول"; btn.style.width = "100%";
  screen.appendChild(btn);

  main.appendChild(screen);

  let attempts = 0;
  btn.addEventListener("click", () => {
    const name = nameInput.value;
    const pin  = pinInput.value.trim();
    if (!name) { errDiv.textContent = "يرجى اختيار اسمك"; errDiv.style.display = "block"; return; }
    if (!pin)  { errDiv.textContent = "يرجى إدخال الرمز السري"; errDiv.style.display = "block"; return; }
    const clerk = CONFIG.clerks.find(c => c.name === name);
    if (clerk && clerk.pin === pin) {
      setClerkSession(name);
      onSuccess(name);
    } else {
      attempts++;
      errDiv.textContent = "رمز سري خاطئ";
      errDiv.style.display = "block";
      pinInput.value = "";
      if (attempts >= 3) {
        attemptsDiv.textContent = `محاولات فاشلة: ${attempts} — الرجاء التواصل مع المشرف`;
        attemptsDiv.style.display = "block";
      }
    }
  });
  pinInput.addEventListener("keydown", e => { if (e.key === "Enter") btn.click(); });
}

// ── Engineer home — receipts + pending ────────────────
async function renderEngineerHome(engName) {
  const main = renderShell("بوابة المهندس");
  main.innerHTML = "";

  // Nav bar
  const nav = el("div", "nav-bar");
  const btnHistory = el("button", "nav-btn active");
  btnHistory.innerHTML = `<span class="nav-icon">📋</span><span>سجلاتي</span>`;
  const btnLogout = el("button", "nav-btn");
  btnLogout.innerHTML = `<span class="nav-icon">🚪</span><span>خروج</span>`;
  nav.appendChild(btnHistory);
  nav.appendChild(btnLogout);

  btnLogout.addEventListener("click", () => {
    clearEngineerSession();
    renderPINScreen(name => renderEngineerHome(name));
  });

  // Content area
  const content = el("div"); content.style.flex = "1"; content.style.overflow = "auto";
  main.appendChild(content);
  main.parentElement.insertBefore(nav, main.nextSibling);

  // Loading
  const loading = el("div", "loading-screen");
  loading.innerHTML = `<div class="spinner"></div><p>جارٍ تحميل البيانات...</p>`;
  content.appendChild(loading);

  // Fetch all data for this engineer — filter today client-side
  let receipts = [], pendingDispatches = [];
  try {
    const res  = await fetch(`${CONFIG.scriptUrl}?engineer=${encodeURIComponent(engName)}`);
    const json = await res.json();
    const allReceipts = json.receipts || [];
    const allPending  = json.pending  || [];

    // Filter to today (Kuwait time) using ISO timestamps from Apps Script
    const nowKW   = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Kuwait" }));
    const todayY  = nowKW.getFullYear();
    const todayM  = nowKW.getMonth();
    const todayD  = nowKW.getDate();

    function isToday(isoStr) {
      if (!isoStr) return false;
      try {
        const d = new Date(isoStr);
        const kw = new Date(d.toLocaleString("en-US", { timeZone: "Asia/Kuwait" }));
        return kw.getFullYear() === todayY && kw.getMonth() === todayM && kw.getDate() === todayD;
      } catch { return false; }
    }

    receipts         = allReceipts.filter(r => isToday(r.timestamp));
    pendingDispatches = allPending.filter(p => isToday(p.isoTimestamp));
  } catch(err) {
    console.error("Engineer fetch error:", err);
    receipts = [];
    pendingDispatches = [];
  }

  content.innerHTML = "";

  // Engineer greeting
  const greeting = el("div", "info-box");
  greeting.style.marginBottom = ".75rem";
  greeting.innerHTML = `مرحباً <strong>${engName}</strong> — ${(()=>{
        const d = new Date();
        const parts = new Intl.DateTimeFormat("ar-KW", {timeZone:"Asia/Kuwait", weekday:"long", year:"numeric", month:"long", day:"numeric"}).formatToParts(d);
        const toEN = s => s.replace(/[٠-٩]/g, c => String.fromCharCode(c.charCodeAt(0)-1584));
        return parts.map(p => toEN(p.value)).join("");
      })()}`;
  content.appendChild(greeting);

  // Tabs
  const tabs = el("div", "history-tabs");
  const tabReceipts = el("button", "history-tab active");
  tabReceipts.innerHTML = `✓ المستلَم <span style="background:var(--green);color:#fff;border-radius:10px;padding:.1rem .4rem;font-size:.7rem;margin-right:.3rem">${receipts.length}</span>`;
  const tabPending = el("button", "history-tab");
  tabPending.innerHTML = `⏳ في الطريق <span style="background:var(--amber);color:#fff;border-radius:10px;padding:.1rem .4rem;font-size:.7rem;margin-right:.3rem">${pendingDispatches.length}</span>`;
  tabs.appendChild(tabReceipts);
  tabs.appendChild(tabPending);
  content.appendChild(tabs);

  const listArea = el("div");
  content.appendChild(listArea);

  function showReceipts() {
    tabReceipts.className = "history-tab active";
    tabPending.className  = "history-tab";
    listArea.innerHTML = "";
    if (!receipts.length) {
      const empty = el("div", "history-empty");
      empty.textContent = "لا توجد شحنات مستلَمة اليوم";
      listArea.appendChild(empty);
      return;
    }
    receipts.forEach(r => {
      const card = el("div", "history-card");
      const hdr = el("div", "history-card-header");
      const note = el("div", "history-card-note"); note.textContent = `سند رقم ${r.noteNumber}`;
      const time = el("div", "history-card-time");
      try {
        const d = new Date(r.timestamp);
        const toEN = s => s.replace(/[٠-٩]/g, c => String.fromCharCode(c.charCodeAt(0)-1584));
        time.textContent = toEN(d.toLocaleTimeString("ar-KW", { timeZone:"Asia/Kuwait", hour:"2-digit", minute:"2-digit" }));
      } catch { time.textContent = r.timestamp; }
      hdr.appendChild(note); hdr.appendChild(time);
      const body = el("div", "history-card-body");
      body.innerHTML = `
        <strong>المشروع:</strong> ${r.project || "—"}<br>
        <strong>أمر العمل:</strong> ${r.workOrder || "—"}<br>
        <strong>الخلطة:</strong> ${r.mixType || "—"}<br>
        <strong>وزن مرسل:</strong> ${r.weightDispatched || "—"} طن &nbsp;|&nbsp; <strong>وزن مستلم:</strong> ${r.weightArrival || "—"} طن<br>
        <strong>القرار:</strong> <span style="color:${r.decision==='مقبول'?'var(--green)':'var(--red)'}; font-weight:700">${r.decision}</span>
        ${r.remarks ? `<br><strong>ملاحظات:</strong> ${r.remarks}` : ""}
      `;
      card.appendChild(hdr);
      card.appendChild(body);
      listArea.appendChild(card);
    });
  }

  function showPending() {
    tabPending.className  = "history-tab active";
    tabReceipts.className = "history-tab";
    listArea.innerHTML = "";
    if (!pendingDispatches.length) {
      const empty = el("div", "history-empty");
      empty.textContent = "لا توجد شحنات في الطريق حالياً";
      listArea.appendChild(empty);
      return;
    }
    pendingDispatches.forEach(d => {
      const card = el("div", "history-card");
      card.style.borderColor = "var(--amber)";
      const hdr = el("div", "history-card-header");
      const note = el("div", "history-card-note"); note.textContent = `سند رقم ${d.noteNumber}`;
      const badge = el("span", "badge badge-transit"); badge.textContent = "في الطريق";
      hdr.appendChild(note); hdr.appendChild(badge);
      const body = el("div", "history-card-body");
      body.innerHTML = `
        <strong>المشروع:</strong> ${d.project || "—"}<br>
        <strong>أمر العمل:</strong> ${d.workOrder || "—"}<br>
        <strong>المصنع:</strong> ${d.plant || "—"} &nbsp;|&nbsp; <strong>الناقل:</strong> ${d.naqel || "—"}<br>
        <strong>السائق:</strong> ${d.driverName || "—"}<br>
        <strong>الخلطة:</strong> ${d.mixType || "—"} &nbsp;|&nbsp; <strong>الوزن:</strong> ${d.weight || "—"} طن<br>
        <strong>الحرارة:</strong> ${d.tempDispatch || "—"}°م &nbsp;|&nbsp; <strong>الموقع:</strong> ${d.site || "—"}
      `;
      card.appendChild(hdr);
      card.appendChild(body);

      // Contact the driver directly, if a number was recorded
      if (d.driverPhone) {
        const contact = driverContactRow(d.driverName, d.driverPhone);
        contact.style.marginTop = ".6rem";
        card.appendChild(contact);
      }

      // Receipt button
      const receiptBtn = el("button", "btn-primary");
      receiptBtn.textContent = "تأكيد الاستلام →";
      receiptBtn.style.marginTop = ".6rem";
      receiptBtn.style.fontSize = ".85rem";
      receiptBtn.style.padding = ".6rem 1rem";
      receiptBtn.addEventListener("click", () => {
        window.location.href = `${window.location.href.split("?")[0]}?note=${encodeURIComponent(d.noteNumber)}`;
      });
      card.appendChild(receiptBtn);
      listArea.appendChild(card);
    });
  }

  tabReceipts.addEventListener("click", showReceipts);
  tabPending.addEventListener("click",  showPending);
  showReceipts();
}

// ════════════════════════════════════════════════════════
// ROUTER
// ════════════════════════════════════════════════════════
const note = getNoteFromURL();
if (note) {
  // Receipt flow — check PIN first
  const session = getEngineerSession();
  if (session) {
    renderReceipt(note, session.name);
  } else {
    renderPINScreen(name => renderReceipt(note, name));
  }
} else {
  // Check URL for engineer mode
  const isEngineerRole = new URLSearchParams(window.location.search).get("role") === "engineer";
  if (isEngineerRole) {
    const session = getEngineerSession();
    if (session) renderEngineerHome(session.name);
    else renderPINScreen(name => renderEngineerHome(name));
  } else {
    const clerkSession = getClerkSession();
    if (clerkSession) renderCompanySelect();
    else renderClerkPINScreen(renderCompanySelect);
  }
}
