<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#EAEAE6"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="كوبري — أسفلت"/>
  <title>كوبري — تتبع شحنات الأسفلت</title>
  <meta property="og:type" content="website"/>
  <meta property="og:locale" content="ar_KW"/>
  <meta property="og:site_name" content="كوبري"/>
  <meta property="og:title" content="كوبري — تتبع شحنات الأسفلت"/>
  <meta property="og:description" content="البوابة الرسمية لتتبع أعمال كوبري"/>
  <meta property="og:url" content="https://app.copri.com/"/>
  <meta property="og:image" content="https://app.copri.com/og-image.png"/>
  <meta property="og:image:width" content="600"/>
  <meta property="og:image:height" content="600"/>
  <meta name="twitter:card" content="summary"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ═══════════════════════════════════════════════════════
       COPRI THEME — easy to customize
       Change values here to update the entire app
    ═══════════════════════════════════════════════════════ */
    :root {
      /* Brand colors */
      --green:        #00A651;
      --green-dark:   #007A3D;
      --green-light:  rgba(0, 166, 81, 0.10);
      --green-mid:    rgba(0, 166, 81, 0.20);

      /* Backgrounds */
      --bg:           #EAEAE6;
      --surface:      #FFFFFF;
      --surface-2:    #F4F4F0;
      --border:       #D8D8D2;
      --border-focus: #00A651;

      /* Text */
      --text-1:       #1A1A2E;
      --text-2:       #555560;
      --text-3:       #999999;

      /* Status colors */
      --red:          #D32F2F;
      --red-light:    rgba(211, 47, 47, 0.08);
      --amber:        #E65100;
      --amber-light:  rgba(230, 81, 0, 0.10);

      /* Layout */
      --radius:       8px;
      --radius-sm:    5px;
      --shadow-sm:    0 1px 4px rgba(0,0,0,0.08);
      --shadow:       0 2px 12px rgba(0,0,0,0.10);

      /* Typography */
      --font-ar:      'IBM Plex Sans Arabic', sans-serif;
      --font-label:   'Barlow Condensed', sans-serif;
    }

    /* ── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-ar);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ─────────────────────────────────────── */
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ────────────────────────────────────────── */
    .app-header {
      background: var(--surface);
      border-bottom: 3px solid var(--green);
      padding: .9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
      box-shadow: var(--shadow-sm);
    }
    .header-right { display: flex; align-items: center; gap: .6rem; }
    .header-refresh {
      background: var(--surface-2, #eaeae6); border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 1rem; line-height: 1; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; flex: none;
    }
    .header-refresh:disabled { opacity: .5; cursor: default; }
    .header-refresh.spin { animation: hr-spin .8s linear infinite; }
    @keyframes hr-spin { to { transform: rotate(360deg); } }
    .logo { display: flex; align-items: center; gap: .7rem; }
    .logo-img { height: 38px; width: auto; display: block; }
    .logo-mark {
      width: 40px; height: 40px;
      background: var(--green);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 26px; height: 26px; }
    .logo-text { display: flex; flex-direction: column; gap: 1px; }
    .logo-en {
      font-family: var(--font-label);
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .logo-ar {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1;
    }
    .header-badge {
      font-family: var(--font-label);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--green);
      background: var(--green-light);
      padding: .25rem .6rem;
      border-radius: 3px;
      border: 1px solid var(--green-mid);
    }

    /* ── MAIN ──────────────────────────────────────────── */
    .app-main { flex: 1; padding: 1.1rem 1rem; display: flex; flex-direction: column; gap: .9rem; }

    /* ── FOOTER ────────────────────────────────────────── */
    .app-footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: .68rem;
      color: var(--text-3);
      padding: .75rem;
    }

    /* ── SECTION TITLE ─────────────────────────────────── */
    .section-title {
      font-family: var(--font-label);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: .4rem;
      padding-bottom: .55rem;
      border-bottom: 1px solid var(--border);
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 0; height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-right: 7px solid var(--green);
    }

    /* ── CARD ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
      box-shadow: var(--shadow-sm);
    }

    /* ── FIELDS ────────────────────────────────────────── */
    .field-group { display: flex; flex-direction: column; gap: .35rem; }
    .field-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }

    label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: .01em;
    }
    .req { color: var(--red); }

    input, select, textarea {
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-1);
      font-family: var(--font-ar);
      font-size: .92rem;
      padding: .6rem .8rem;
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
      direction: rtl;
      outline: none;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--border-focus);
      background: #fff;
      box-shadow: 0 0 0 3px var(--green-light);
    }
    input::placeholder, textarea::placeholder { color: var(--text-3); font-size: .83rem; }
    select option { background: #fff; }
    textarea { resize: vertical; min-height: 64px; line-height: 1.5; }

    /* ── HINT TEXT ─────────────────────────────────────── */
    .field-hint { font-size: .72rem; color: var(--text-3); margin-top: .15rem; }

    /* ── BUTTONS ───────────────────────────────────────── */
    .btn-primary {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-ar);
      font-size: .95rem;
      font-weight: 700;
      padding: .85rem 1.25rem;
      cursor: pointer;
      width: 100%;
      transition: background .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .btn-danger {
      background: var(--red) !important;
    }
    .btn-danger:hover { background: #b71c1c !important; }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-ar);
      font-size: .88rem;
      font-weight: 500;
      padding: .75rem 1.25rem;
      cursor: pointer;
      width: 100%;
      margin-top: .4rem;
    }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); }

    /* ── DECISION BUTTONS ──────────────────────────────── */
    .decision-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }
    .decision-btn {
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      color: var(--text-2);
      font-family: var(--font-ar);
      font-size: .95rem;
      font-weight: 700;
      padding: .85rem;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .decision-btn.accept:hover, .decision-btn.accept.active {
      border-color: var(--green); background: var(--green-light); color: var(--green);
    }
    .decision-btn.reject:hover, .decision-btn.reject.active {
      border-color: var(--red); background: var(--red-light); color: var(--red);
    }

    /* ── RECEIPT SUMMARY ───────────────────────────────── */
    .receipt-summary {
      background: var(--surface);
      border: 2px solid var(--green);
      border-radius: var(--radius);
      padding: 1.1rem;
      box-shadow: var(--shadow-sm);
    }
    .summary-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: .5rem;
      font-size: .86rem;
      padding: .3rem 0;
      border-bottom: 1px solid var(--border);
    }
    .field-row:last-child { border-bottom: none; }
    .field-label { color: var(--text-2); flex-shrink: 0; }
    .field-value { color: var(--text-1); font-weight: 600; }

    /* ── BADGES ────────────────────────────────────────── */
    .badge {
      font-family: var(--font-label);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: 3px;
    }
    .badge-transit  { background: var(--amber-light);  color: var(--amber);    border: 1px solid rgba(230,81,0,.2);  }
    .badge-accepted { background: var(--green-light);  color: var(--green);    border: 1px solid var(--green-mid);   }
    .badge-rejected { background: var(--red-light);    color: var(--red);      border: 1px solid rgba(211,47,47,.2); }

    /* ── TEMP DELTA ────────────────────────────────────── */
    .temp-delta {
      font-size: .75rem;
      font-weight: 600;
      padding: .3rem .6rem;
      border-radius: var(--radius-sm);
      margin-top: .2rem;
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .delta-ok   { background: var(--green-light); color: var(--green); }
    .delta-warn { background: var(--red-light);   color: var(--red);   }

    /* ── WEIGHT DELTA ──────────────────────────────────── */
    .weight-delta {
      font-size: .75rem;
      font-weight: 600;
      padding: .3rem .6rem;
      border-radius: var(--radius-sm);
      margin-top: .2rem;
    }
    .weight-ok   { background: var(--green-light); color: var(--green); }
    .weight-warn { background: var(--amber-light); color: var(--amber); }
    .weight-err  { background: var(--red-light);   color: var(--red);   }

    /* ── SUCCESS / SCREENS ─────────────────────────────── */
    .success-screen {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 2.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: .7rem;
      box-shadow: var(--shadow-sm);
    }
    .success-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }
    .success-icon.ok       { background: var(--green-light); color: var(--green); border: 2px solid var(--green); }
    .success-icon.rejected { background: var(--red-light);   color: var(--red);   border: 2px solid var(--red);   }
    .success-screen h2 { font-size: 1.15rem; font-weight: 700; color: var(--text-1); }
    .success-screen p  { font-size: .88rem; color: var(--text-2); }
    .success-note      { color: var(--green) !important; font-weight: 600; }

    /* ── RECEIPT LINK BOX ──────────────────────────────── */
    .link-box {
      background: var(--surface-2);
      border: 1.5px solid var(--green);
      border-radius: var(--radius-sm);
      padding: .75rem .9rem;
      font-size: .78rem;
      color: var(--text-2);
      word-break: break-all;
      line-height: 1.6;
      width: 100%;
      text-align: right;
    }
    .link-box-label {
      font-family: var(--font-label);
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--green);
      display: block;
      margin-bottom: .3rem;
    }

    /* ── LOADING ───────────────────────────────────────── */
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
      padding: 3rem 1rem; color: var(--text-2);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR ─────────────────────────────────────────── */
    /* ── PROJECT SELECTION ─────────────────────────────────── */
    .project-btn {
      background: var(--surface-2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      cursor: pointer;
      width: 100%;
      text-align: right;
      transition: all .15s;
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }
    .project-btn:hover {
      border-color: var(--green);
      background: var(--green-light);
    }
    .project-btn-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-1);
    }
    .project-btn-contract {
      font-family: var(--font-label);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--green);
    }
    .project-banner {
      background: var(--green);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .5rem;
    }
    .project-banner-name {
      font-size: .9rem;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }
    .project-banner-contract {
      font-family: var(--font-label);
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: rgba(255,255,255,0.8);
    }
    .project-banner-change {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      color: #fff;
      font-family: var(--font-ar);
      font-size: .75rem;
      font-weight: 600;
      padding: .25rem .6rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .project-banner-change:hover { background: rgba(255,255,255,0.3); }

    .error-msg {
      background: var(--red-light);
      border: 1px solid rgba(211,47,47,.25);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: .82rem;
      font-weight: 500;
      padding: .6rem .8rem;
      text-align: center;
    }

    /* ── INFO BOX ──────────────────────────────────────── */
    .info-box {
      background: var(--green-light);
      border: 1px solid var(--green-mid);
      border-radius: var(--radius-sm);
      padding: .6rem .85rem;
      font-size: .8rem;
      color: var(--green-dark);
      font-weight: 500;
    }

    /* ── DIVIDER ───────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: .25rem 0; }

    /* ── PIN / LOGIN SCREEN ────────────────────────────── */
    .pin-screen {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 2rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }
    .pin-screen svg { display: block; margin: 0 auto .25rem; }
    .pin-screen h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-1);
      text-align: center;
    }
    .pin-screen p {
      font-size: .85rem;
      color: var(--text-2);
      text-align: center;
      margin-bottom: .4rem;
    }
    .pin-input {
      text-align: center;
      letter-spacing: .5em;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .pin-attempts {
      font-size: .78rem;
      font-weight: 600;
      color: var(--red);
      background: var(--red-light);
      border: 1px solid rgba(211,47,47,.2);
      border-radius: var(--radius-sm);
      padding: .5rem .75rem;
      text-align: center;
    }

    /* ── ENGINEER NAV BAR ──────────────────────────────── */
    .nav-bar {
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }
    .nav-btn {
      flex: 1;
      background: transparent;
      border: none;
      font-family: var(--font-ar);
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-2);
      padding: .6rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .15rem;
    }
    .nav-btn.active { color: var(--green); }
    .nav-btn:hover { color: var(--green); }
    .nav-icon { font-size: 1.15rem; }

    /* ── ENGINEER LOG — TABS & CARDS ───────────────────── */
    .history-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      margin-bottom: .8rem;
    }
    .history-tab {
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-ar);
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-2);
      padding: .6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .history-tab.active {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-inline-start: 4px solid var(--green);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: .9rem 1rem;
      margin-bottom: .7rem;
    }
    .history-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .5rem;
      padding-bottom: .5rem;
      border-bottom: 1px solid var(--border);
    }
    .history-card-note {
      font-weight: 700;
      font-size: .92rem;
      color: var(--text-1);
    }
    .history-card-time {
      font-family: var(--font-label);
      font-size: .82rem;
      font-weight: 600;
      color: var(--text-3);
    }
    .history-card-body {
      font-size: .82rem;
      color: var(--text-2);
      line-height: 1.7;
    }
    .history-empty {
      text-align: center;
      color: var(--text-3);
      font-size: .85rem;
      padding: 2rem 1rem;
    }

    /* ── DASHBOARD ─────────────────────────────────────── */
    .dash-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: .7rem; margin-bottom: 1rem; }
    @keyframes dashIn { from { opacity: 0; transform: translateY(10px); } }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .85rem .95rem;
      animation: dashIn .45s cubic-bezier(.2,.8,.3,1) both;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .kpi:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,166,81,.12); border-color: var(--green); }
    .kpi-val { font-size: 1.55rem; font-weight: 800; color: var(--green-dark); line-height: 1.1; }
    .kpi-lbl { font-size: .78rem; color: var(--text-2); font-weight: 600; margin-top: .25rem; }
    .kpi-sub { font-size: .7rem; color: var(--text-3); margin-top: .1rem; }
    .dash-card { animation: dashIn .5s cubic-bezier(.2,.8,.3,1) both; }
    .dash-card h3 { font-size: .95rem; font-weight: 700; color: var(--text-1); margin: 0 0 .85rem; }
    .dash-daypick { margin: -.4rem 0 1rem; }
    .dash-daypick input { max-width: 220px; }
    .dash-rangepick { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
    .dash-rangepick input { max-width: 165px; }
    .dash-rangepick span { font-size: .78rem; color: var(--text-2); font-weight: 600; }
    .kpi-click { cursor: pointer; }
    .kpi-click .kpi-sub { color: var(--green-dark); font-weight: 700; }
    .dash-trips .trip-row { padding: .55rem .1rem; border-bottom: 1px solid var(--border); }
    .dash-trips .trip-row:last-child { border-bottom: none; }
    .trip-main { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .trip-note { font-weight: 800; color: var(--green-dark); font-size: .9rem; }
    .trip-time { font-size: .74rem; color: var(--text-2); direction: ltr; }
    .trip-tons { margin-inline-start: auto; font-size: .78rem; font-weight: 700; background: var(--surface-2); border-radius: 6px; padding: .15rem .5rem; white-space: nowrap; }
    .trip-sub { font-size: .74rem; color: var(--text-2); margin-top: .15rem; }
    .rep-row { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-bottom: .55rem; }
    .rep-row:last-child { margin-bottom: 0; }
    .rep-row-lbl { font-size: .78rem; font-weight: 700; color: var(--text-2); min-width: 70px; }
    .rep-row input { flex: 1; min-width: 125px; max-width: 185px; }
    .rep-go { width: auto !important; flex: 0 0 auto; min-width: 0; padding: .5rem .95rem; font-size: .82rem; }
    .rep-sep { font-size: .74rem; color: var(--text-3); }
    .mat-qty { font-size: .76rem; font-weight: 700; color: var(--green-dark); background: rgba(0,166,81,.08); border-radius: 6px; padding: .15rem .5rem; white-space: nowrap; }
    .trip-sub a { color: var(--green-dark); font-weight: 600; text-decoration: none; }
    .wo-badge { font-size: .78rem; font-weight: 800; color: #fff; background: var(--green-dark); border-radius: 8px; padding: .18rem .55rem; white-space: nowrap; }
    .wo-cover { font-size: .76rem; font-weight: 700; color: var(--text-1); background: var(--surface-2); border-radius: 6px; padding: .15rem .5rem; }
    .wo-res { margin-top: .5rem; }
    .wo-res-line { display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; font-size: .85rem; padding: .35rem 0; }
    .wo-res-none { color: var(--text-3); }
    .wo-res-warn { font-size: .74rem; color: var(--amber); font-weight: 600; margin: .1rem 0 .3rem; }
    .wo-starwrap { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .6rem; }
    .wo-starchip { font-size: .76rem; font-weight: 700; color: var(--green-dark); background: rgba(0,166,81,.08);
      border: 1px dashed var(--green); border-radius: 999px; padding: .3rem .7rem; cursor: pointer; }
    .wo-starchip:hover { background: rgba(0,166,81,.16); }
    .wo-mapchk { display: flex; align-items: center; gap: .5rem; font-size: .82rem; font-weight: 600;
      color: var(--text-1); margin: .2rem 0 .8rem; cursor: pointer; }
    .wo-mapchk input { width: auto; }
    .hbars { display: flex; flex-direction: column; gap: .55rem; }
    .hbar { display: flex; align-items: center; gap: .5rem; position: relative; border-radius: 6px; transition: background .15s ease; }
    .hbar:hover { background: rgba(0,166,81,.05); }
    /* Instant tooltip bubble (native title has a delay) */
    .hbar::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 4px); inset-inline-start: 36%;
      background: #1a1a2e; color: #fff; font-size: .7rem; font-weight: 700; padding: .25rem .6rem; border-radius: 6px;
      white-space: nowrap; opacity: 0; transform: translateY(3px); pointer-events: none;
      transition: opacity .15s ease, transform .15s ease; z-index: 5; }
    .hbar:hover::after { opacity: 1; transform: translateY(0); }
    .hbar-name { flex: 0 0 34%; font-size: .78rem; color: var(--text-2); font-weight: 600; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hbar-track { flex: 1; background: var(--surface-2); border-radius: 5px; height: 20px; overflow: hidden; }
    @keyframes barGrow { from { width: 0; } }
    .hbar-fill { height: 100%; background: linear-gradient(90deg, var(--green), #00c261); border-radius: 5px; min-width: 3px;
      transition: width .5s ease, filter .15s ease; animation: barGrow .6s cubic-bezier(.2,.8,.3,1) both; }
    .hbar:hover .hbar-fill { filter: brightness(1.12); }
    .hbar-fill.st-ok { background: var(--green); } .hbar-fill.st-warn { background: var(--amber); } .hbar-fill.st-err { background: var(--red); }
    .hbar-val { flex: 0 0 auto; font-size: .76rem; font-weight: 700; color: var(--text-1); min-width: 52px; text-align: left; transition: color .15s ease; }
    .hbar:hover .hbar-val { color: var(--green-dark); }
    .trend-wrap { position: relative; }
    .trend-tip { position: absolute; transform: translate(-50%, -140%); background: #1a1a2e; color: #fff;
      font-size: .7rem; font-weight: 700; padding: .25rem .6rem; border-radius: 6px; white-space: nowrap;
      direction: ltr; opacity: 0; pointer-events: none; transition: opacity .12s ease; z-index: 5; }
    .trend-tip.on { opacity: 1; }
    .dash-trend { width: 100%; height: auto; display: block; direction: ltr; }
    .dash-trend .tr-line { fill: none; stroke: var(--green); stroke-width: 2; }
    @keyframes fadeIn { from { opacity: 0; } }
    .dash-trend .tr-area { fill: var(--green-light); stroke: none; animation: fadeIn .9s ease-out both; }
    .dash-trend .tr-dot { fill: var(--green); stroke: var(--surface); stroke-width: 1.5; transition: r .15s ease; }
    .dash-trend .tr-dot.hot { r: 5; }
    .dash-trend .tr-axis { stroke: var(--border); stroke-width: 1; }
    .dash-trend .tr-tick { fill: var(--text-3); font-size: 9px; }
    .dash-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; margin-top: .3rem; }
    .dash-stat { background: var(--surface-2); border-radius: var(--radius-sm); padding: .6rem .7rem; }
    .dash-stat .v { font-size: 1.1rem; font-weight: 800; color: var(--text-1); }
    .dash-stat .l { font-size: .72rem; color: var(--text-2); margin-top: .15rem; }
    .dash-legend { display: flex; flex-wrap: wrap; gap: .8rem; font-size: .74rem; color: var(--text-2); margin-top: .6rem; }
    .dash-legend span { display: inline-flex; align-items: center; gap: .3rem; }
    .dash-legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
    .dash-note { font-size: .72rem; color: var(--text-3); text-align: center; margin-top: .5rem; }

    /* ── PLANT PORTAL ──────────────────────────────────── */
    .portal-head { display: flex; justify-content: space-between; align-items: center; gap: .6rem; }
    .portal-head .who { font-weight: 800; color: var(--text-1); }
    .portal-head .sub { font-size: .74rem; color: var(--text-3); margin-top: .1rem; }
    .portal-tabs { display: flex; gap: .35rem; margin: 0 0 1rem; background: var(--surface-2); padding: .3rem; border-radius: 12px; }
    .portal-tabs button { flex: 1; border: 0; background: transparent; padding: .6rem .3rem; border-radius: 9px;
      font-family: inherit; font-size: .8rem; font-weight: 700; color: var(--text-2); cursor: pointer;
      transition: background .15s, color .15s, box-shadow .15s; }
    .portal-tabs button.active { background: #fff; color: var(--green); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .plant-dash-wrap > div > .history-tab { display: none; }  /* hide the "all boards" back link inside the portal */
    .plant-chip { display: inline-block; font-size: .7rem; font-weight: 700; padding: .25rem .6rem; border-radius: 999px;
      background: var(--surface-2); color: var(--text-2); white-space: nowrap; }
    .prog-day-head { font-size: .85rem; font-weight: 800; color: var(--text-1); margin: 1.15rem 0 .5rem;
      display: flex; align-items: center; gap: .55rem; }
    .prog-day-head::after { content: ""; flex: 1; height: 1px; background: rgba(0,0,0,.08); }
    .prog-day-head.today { color: var(--green); }
    .prog-card { border-inline-start: 4px solid var(--green); }
    .prog-card.done { border-inline-start-color: var(--text-3); }
    .prog-card.cancelled { border-inline-start-color: var(--red); opacity: .75; }
    .prog-top { display: flex; justify-content: space-between; align-items: center; gap: .5rem; margin-bottom: .45rem; }
    .prog-mix { font-size: .78rem; font-weight: 800; color: var(--green); background: rgba(0,166,81,.10);
      padding: .25rem .6rem; border-radius: 8px; }
    .prog-site { font-size: 1.02rem; font-weight: 800; color: var(--text-1); margin-bottom: .45rem; }
    .prog-meta { display: flex; flex-wrap: wrap; gap: .4rem .9rem; font-size: .8rem; color: var(--text-2); }
    .prog-meta b { color: var(--text-1); }
    .prog-actions { display: flex; gap: .5rem; margin-top: .7rem; }
    .prog-actions button { width: auto; flex: 1; padding: .5rem; font-size: .8rem; }
    .req-card .req-client { font-size: .98rem; font-weight: 800; color: var(--text-1); }
    .req-card .req-line { font-size: .78rem; color: var(--text-2); margin-top: .25rem; }

    /* ── MOBILE ────────────────────────────────────────── */
    @media (hover: none) { input, select, textarea { font-size: 16px; } }
    @supports (padding: max(0px)) {
      .app-header { padding-top: max(.9rem, env(safe-area-inset-top)); }
      .app-footer { padding-bottom: max(.75rem, env(safe-area-inset-bottom)); }
    }
  </style>

// Flattened, de-duplicated engineer list across all projects — used by the
// engineer login (receipt + ?role=engineer) where the project isn't known yet.
function allEngineers() {
  const seen = {}, out = [];
  Object.values(CONFIG.companies).forEach(c =>
    Object.values(c.projects).forEach(p =>
      (p.engineers || []).forEach(e => { if (!seen[e.name]) { seen[e.name] = 1; out.push(e); } })
    )
  );
  return out;
}
function findEngineer(name) { return allEngineers().find(e => e.name === name) || null; }

// DATABASE — Supabase (PostgREST + Storage) over plain fetch.
// No SDK: the app stays a single dependency-free file. The anon key is
// public by design; access is enforced by RLS policies in the database.
// Every helper returns parsed JSON or throws; readers that must never
// break the UI catch at the call site (same contract as before).
// ════════════════════════════════════════════════════════
function sbHeaders() {
  return {
    apikey: CONFIG.supabaseAnonKey,
    Authorization: `Bearer ${CONFIG.supabaseAnonKey}`,
    "Content-Type": "application/json",
  };
}
// GET /rest/v1/<path> (table query or RPC). Throws on HTTP error.
async function sbGet(path, timeoutMs) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeoutMs || 15000);
  try {
    const res = await fetch(`${CONFIG.supabaseUrl}/rest/v1/${path}`, { headers: sbHeaders(), signal: ctrl.signal });
    if (!res.ok) throw new Error(`db read ${res.status}`);
    return await res.json();
  } finally { clearTimeout(t); }
}
// INSERT rows. Returns { success, duplicate } — duplicate = unique-key hit,
// the atomic replacement for the old read-then-append duplicate guards.
async function sbInsert(table, rows) {
  const res = await fetch(`${CONFIG.supabaseUrl}/rest/v1/${table}`, {
    method: "POST",
    headers: { ...sbHeaders(), Prefer: "return=minimal" },
    body: JSON.stringify(rows),
  });
  if (res.ok) return { success: true };
  const body = await res.text();
  if (res.status === 409 || body.indexOf("23505") >= 0) return { success: false, duplicate: true };
  throw new Error(`db write ${res.status}: ${body.slice(0, 200)}`);
}
// Call a Postgres function. Every compound write (receipt confirm, milling
// lifecycle) goes through a SECURITY DEFINER RPC so it commits atomically
// server-side — the public key has no direct row-update rights on those
// tables. Returns the function's json result.
async function sbRpc(name, args) {
  const res = await fetch(`${CONFIG.supabaseUrl}/rest/v1/rpc/${name}`, {
    method: "POST", headers: sbHeaders(), body: JSON.stringify(args || {}),
  });
  if (!res.ok) throw new Error(`db rpc ${name} ${res.status}: ${(await res.text()).slice(0, 200)}`);
  return await res.json();
}
// Upload a data-URL image to Storage; returns its public URL ("" on no photo).
async function sbUploadPhoto(name, dataUrl) {
  if (!dataUrl) return "";
  const blob = await (await fetch(dataUrl)).blob();
  const res = await fetch(`${CONFIG.supabaseUrl}/storage/v1/object/material-receipts/${encodeURIComponent(name)}`, {
    method: "POST",
    headers: { apikey: CONFIG.supabaseAnonKey, Authorization: `Bearer ${CONFIG.supabaseAnonKey}`, "Content-Type": blob.type || "image/jpeg" },
    body: blob,
  });
  if (!res.ok) throw new Error(`photo upload ${res.status}`);
  return `${CONFIG.supabaseUrl}/storage/v1/object/public/material-receipts/${encodeURIComponent(name)}`;
}
const sbEq = (v) => `eq.${encodeURIComponent(v)}`;

const LOC_LABEL = { block_street: "قطعة / شارع", km_range: "نطاق كيلومتر", named: "اسم الشارع" };
function locCodeFromLabel(label) {
  for (const k in LOC_LABEL) { if (LOC_LABEL[k] === String(label || "").trim()) return k; }
  return "block_street";
}
// Kuwait wall-clock "yyyy-MM-dd HH:mm" from an ISO timestamp (display only).
function fmtKW(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    const p = new Intl.DateTimeFormat("en-GB", { timeZone: "Asia/Kuwait", year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).formatToParts(d);
    const g = (t) => (p.find(x => x.type === t) || {}).value || "";
    return `${g("year")}-${g("month")}-${g("day")} ${g("hour")}:${g("minute")}`;
  } catch { return String(iso); }
}
// Start of the current work shift (most recent noon, Kuwait) as ISO — the
// boundary the per-location load counter resets at. Mirrors shiftStart() that
// lived in Code.gs.
function shiftStartISO() {
  // Kuwait is fixed UTC+3 (no DST), so do the calendar math in Kuwait
  // wall-clock by shifting the epoch, then shift back.
  const KW_OFF = 3 * 3600e3;
  const kwNow = new Date(Date.now() + KW_OFF);
  const b = new Date(kwNow.getTime());
  b.setUTCHours(12, 0, 0, 0);                      // noon, Kuwait wall-clock
  if (kwNow.getUTCHours() < 12) b.setUTCDate(b.getUTCDate() - 1);
  return new Date(b.getTime() - KW_OFF).toISOString();
}

// Dispatch row by delivery-note number → UI shape, or null.
async function dbDispatchByNote(note) {

// Has this note already been receipted? → { alreadyReceived, engineer, decision, timestamp }
async function dbCheckReceipt(note) {
  const rows = await sbGet(`receipts?note=${sbEq(note)}&order=ts.desc&limit=1`);
  if (!rows.length) return { alreadyReceived: false };
  return { alreadyReceived: true, engineer: rows[0].engineer || "", decision: rows[0].decision || "", timestamp: fmtKW(rows[0].ts) };
}
// Engineer home payload — same shape the ?engineer= endpoint returned:
// receipts by this engineer (joined to their dispatch) + assigned pending loads.
async function dbEngineerData(engName) {
  const [recRows, pendRows] = await Promise.all([
    sbGet(`receipts?engineer=${sbEq(engName)}&order=ts.desc&limit=200`),
    sbGet(`dispatch_loads?notify_engineer=${sbEq(engName)}&or=(status.eq.${encodeURIComponent("في الطريق")},status.eq.)&order=ts.desc&limit=200`),
  ]);
  const notes = [...new Set(recRows.map(r => r.note))];
  let dispByNote = {};
  if (notes.length) {
    const dRows = await sbGet(`dispatch_loads?note=in.(${notes.map(n => `"${String(n).replace(/"/g, "")}"`).join(",")})&limit=${notes.length}`);
    dRows.forEach(d => { dispByNote[d.note] = d; });
  }
  const receivedNotes = new Set(recRows.map(r => String(r.note)));
  const receipts = recRows.map(r => {
    const d = dispByNote[r.note];
    return {
      noteNumber: String(r.note), timestamp: r.ts, decision: r.decision || "",
      weightArrival: r.weight_arrival == null ? "" : r.weight_arrival, remarks: r.remarks || "",
      project: d ? d.project || "" : "", workOrder: d ? d.work_order || "" : "",
      mixType: d ? d.mix || "" : "", weightDispatched: d ? (d.weight == null ? "" : d.weight) : "",
      loadNumber: d ? (d.load_number == null ? "" : d.load_number) : "",
    };
  });
  const pending = pendRows.filter(d => !receivedNotes.has(String(d.note))).map(d => ({
    noteNumber: String(d.note), isoTimestamp: d.ts, project: d.project || "",
    workOrder: d.work_order || "", plant: d.plant || "", naqel: d.naqel || "",
    driverName: d.driver || "", driverPhone: d.driver_phone || "", mixType: d.mix || "",
    weight: d.weight == null ? "" : d.weight, tempDispatch: d.temp_dispatch == null ? "" : d.temp_dispatch,
    site: d.site || "", loadNumber: d.load_number == null ? "" : d.load_number,
  }));
  return { receipts, pending };
}

// ── Domain writes ──
// Dispatch: one atomic RPC allocates the serial note number and inserts the
// row (the manual carbon-book number is retired — 0004 migration). clientRef
// makes retries idempotent: a resend after a dropped response returns the
// note that already landed instead of consuming a new serial.
// Returns { success, note } — note is the DB-assigned delivery-note number.
async function dbSubmitDispatch(data, clientRef) {
  return sbRpc("dispatch_submit", {
    p_client_ref: clientRef || "",
    p_project: data.project || "", p_contract: data.contract || "", p_work_order: data.workOrder || "",
    p_plant: data.plant || "", p_truck: String(data.truckNumber || ""),
    p_driver: data.driverName || "", p_mix: data.mixType || "", p_weight: parseFloat(data.weight) || null,
    p_temp_dispatch: parseFloat(data.tempDispatch) || null, p_site: data.site || "",
    p_block: data.block || "", p_street: data.street || "",
    p_loc_type: LOC_LABEL[data.locationType] || LOC_LABEL.block_street,
    p_clerk: data.clerkName || "", p_remarks: data.remarks || "",
    p_company: data.company || "", p_naqel: data.naqel || "", p_driver_phone: data.driverPhone || "",
    p_load_number: data.loadNumber === "" || data.loadNumber == null ? null : Number(data.loadNumber),
    p_notify_engineer: data.notifyEngineer || "",
  });
}
// Receipt: one atomic RPC inserts the receipt AND reflects the decision on
// the dispatch row (no drift possible between the two).
async function dbSubmitReceipt(p) {
  return sbRpc("confirm_receipt", {
    p_note: String(p.noteNumber), p_engineer: p.engineerName || "",
    p_work_order: p.workOrder || "", p_decision: p.decision || "",
    p_weight_arrival: parseFloat(p.weightArrival) || null,
    p_temp_arrival: parseFloat(p.tempArrival) || null, p_remarks: p.remarks || "",
  });
}
// Human-readable location string from a dispatch row/data object, aware of
// the three location types: block+street, km range, and named street.
function locDisplay(d) {
  if (d.locationType === "km_range") {
    if (!d.block && !d.street) return "";
    return `كم ${d.block || "?"} — ${d.street || "?"}`;
  }
  if (d.locationType === "named") return d.block || "";   // name stored in block
  // block_street
  const parts = [];
  if (d.block)  parts.push(`ق ${d.block}`);
  if (d.street) parts.push(`ش ${d.street}`);
  return parts.join(" / ");
}
// Fixed work-order number for a location, from CONFIG.workOrders. A rule with
// only `block` matches all streets in that block; only `street` matches by
// street/name regardless of block (named streets carry the name in `block`).
// Returns "*" when there is no rule. KEEP IN SYNC with woFor_() in Code.gs.
function lookupWorkOrder(site, block, street, locationType) {
  const siteKey = normSp(site);
  let blockKey = "", streetKey = "";
  if (locationType === "named") { streetKey = normSp(block); }       // name stored in block
  else if (locationType === "km_range") { return "*"; }              // highways — no WO map
  else { blockKey = normSp(block); streetKey = normSp(street); }
  for (const r of (CONFIG.workOrders || [])) {
    if (normSp(r.site) !== siteKey) continue;
    if (r.block  != null && normSp(r.block)  !== blockKey)  continue;
    if (r.street != null && normSp(r.street) !== streetKey) continue;
    return String(r.wo);
  }
  return "*";
}
// Active contract work orders for a project + site, from CONFIG.contractWorkOrders.
// Includes site-less "general" orders (متفرقات وطوارئ) for every site.
function workOrdersFor(projectName, site) {
  const s = normSp(site);
  return (CONFIG.contractWorkOrders || []).filter(w =>
    w.project === projectName && (!w.site || normSp(w.site) === s));
}
// Locked auto-fill: the single active work order that covers a location for a
// discipline, from the reference Work Orders tab (CONFIG.contractWorkOrders).
// Callers normalise a named street into `street` and leave `block` empty.
// discipline ∈ "asphalt" | "civil"; a WO tagged "both" matches either. Returns
// the WO string, "*" when a location is set but no order covers it, or "" when
// there is nothing to match on yet.
function autoWorkOrder(projectName, site, block, street, discipline) {
  const b = normSp(block), st = normSp(street);
  if (!b && !st) return "";
  const siteKey = normSp(site), disc = String(discipline || "").toLowerCase();
  const discOK = (d) => {
    d = String(d || "").toLowerCase();
    if (!d || /both|كلا/.test(d)) return true;
    if (disc === "asphalt") return /asphalt|أسفلت/.test(d);
    if (disc === "civil")   return /civil|مدني/.test(d);
    return false;
  };
  const hit = (CONFIG.contractWorkOrders || []).find(w => {
    if (w.project && w.project !== projectName) return false;
    if (w.site && normSp(w.site) !== siteKey) return false;
    if (!discOK(w.discipline)) return false;
    const wb = normSp(w.block), ws = normSp(w.street);
    if (b && wb) return wb === b && (!st || !ws || ws === st);
    if (st && ws) return ws === st;
    return false;
  });
  return hit ? String(hit.wo) : "*";
}
// Work-order field for Copri forms: a dropdown of active orders (filtered by
// site) plus a "*" option for sites where work is under way but no order has
// been issued yet. Non-Copri (plant-only) forms don't render this field at all.
// Returns { wrap, getValue(), setValue(wo), refresh(projectName, site, current) }.
const WO_NONE = "* — لم يصدر أمر عمل بعد";   // value = "*"
function makeWorkOrderField(labelText) {
  const wrap = el("div");
  let getV = () => "", setV = () => {}, lastKey = null;
  function refresh(projectName, site, current) {
    // Only depends on project + site; skip rebuild (and keep the selection)
    // when neither changed, so per-keystroke location edits don't reset it.
    const key = projectName + " " + (site || "");
    if (key === lastKey && current === undefined) return;
    lastKey = key;
    const opts = workOrdersFor(projectName, site).map(w => `${w.wo} — ${w.label}`).concat(WO_NONE);
    wrap.innerHTML = "";
    const { input: s } = fieldGroup(labelText, select(opts, "اختر أمر العمل"), true, "اختر أمر العمل الجاري، أو * إذا لم يصدر بعد");
    wrap.appendChild(s.parentElement);
    getV = () => (s.value ? s.value.split(" — ")[0] : "");
    setV = (wo) => { const o = opts.find(x => x.split(" — ")[0] === String(wo)); s.value = o || ""; };
    if (current) setV(current);
  }
  return { wrap, getValue: () => getV(), setValue: (v) => setV(v), refresh };
}
// Digits-only phone for tel:/wa.me links (strips +, spaces, dashes).
function cleanPhone(p) { return String(p || "").replace(/[^\d]/g, ""); }
// Trim + collapse inner whitespace — keeps street-name load counts consistent.
function normSp(s) { return String(s || "").trim().replace(/\s+/g, " "); }
// Kuwait numbers are stored full (965 + local). The UI shows a fixed +965
// prefix, so the input holds only the local digits.
function localFromFull(full) { const d = cleanPhone(full); return d.indexOf("965") === 0 ? d.slice(3) : d; }
function phoneToFull(local)   { const d = cleanPhone(local); if (!d) return ""; return d.indexOf("965") === 0 ? d : "965" + d; }

// Auto load count — asks the backend for the next load number at this exact
// location (project + site + block + street; a named street is carried in
// block) within the current shift (resets at noon Kuwait). Each dispatch
// advances it — no site confirmation needed. Returns the next number, or null.
async function fetchNextLoad(projectName, site, block, street, siteOnly) {
  try {
    // This shift's rows at the site (small set), then match the exact location
    // client-side with whitespace-normalised comparison — same as the old
    // backend norm(). One shift × one site is at most a few dozen rows.
    const rows = await sbGet(
      `dispatch_loads?select=block,street` +
      `&project=${sbEq(normSp(projectName))}&site=${sbEq(normSp(site))}` +
      `&ts=gte.${encodeURIComponent(shiftStartISO())}&limit=1000`);
    const b = normSp(block), st = normSp(street);
    const count = siteOnly ? rows.length
      : rows.filter(r => normSp(r.block) === b && normSp(r.street) === st).length;
    return count + 1;
  } catch { return null; }
}

function whatsappMessage(data, receiptLink) {

// Open the print-ready delivery note in a new window, inject the dispatch
// data + QR, and trigger the browser print dialog (with --kiosk-printing the
// dialog is skipped and sheets go straight to the default printer).
// Returns false when the popup was blocked (silent: no alert — the caller's
// manual button is the fallback), true when the window opened.
function printDeliveryNote(data, receiptLink, opts) {
  const w = window.open("", "_blank", "width=900,height=650");
  if (!w) {
    if (!(opts && opts.silent)) alert("يرجى السماح بالنوافذ المنبثقة لطباعة السند");
    return false;
  }
  w.document.write(TEMPLATE_HTML);
  w.document.close();

  const inject = () => {
    const d = w.document;
    const set = (id, val) => { const node = d.getElementById(id); if (node) node.textContent = val; };
    set("note-number", data.noteNumber);
    set("footer-note", data.noteNumber);
    set("load-number", data.loadNumber ? String(data.loadNumber) : "—");
    set("org-line", data.project);
    set("contract-display", data.contract ? `رقم العقد: ${data.contract}` : "");
    set("work-order", data.workOrder);
    set("plant", data.plant);
    set("truck", data.truckNumber);
    set("driver", data.driverName);
    set("mix-type", data.mixType);
    set("temp", `${data.tempDispatch}°م`);
    set("net-weight", data.weight);
    set("site", data.site);

    // Location label/value depends on the project's location type
    if (data.locationType === "km_range") {
      set("block-label", "من الكيلومتر"); set("block", data.block);
      set("street-label", "إلى الكيلومتر"); set("street", data.street);
    } else if (data.locationType === "named") {
      set("block-label", "اسم الشارع / الموقع"); set("block", data.block);
      set("street-label", ""); set("street", "");
    } else {
      set("block-label", "القطعة"); set("block", data.block);
      set("street-label", "الشارع"); set("street", data.street);
    }

    set("clerk-name", data.clerkName);
    set("remarks", data.remarks || "");

    const now = new Date();
    const toEN = s => s.replace(/[٠-٩]/g, c => String.fromCharCode(c.charCodeAt(0) - 1584));
    set("date", toEN(now.toLocaleDateString("ar-KW", { timeZone: "Asia/Kuwait" })));
    set("time", toEN(now.toLocaleTimeString("ar-KW", { timeZone: "Asia/Kuwait", hour: "2-digit", minute: "2-digit" })));

    // QR receipt link only when a receipt flow applies (Copri loads);
    // external recipients get the sheet without it.
    try {
      if (receiptLink) {
        const base = receiptLink.split("?")[0];
        if (typeof w.generateQR === "function") w.generateQR(data.noteNumber, base);
      } else {
        const qrBox = d.querySelector(".qr-box");
        if (qrBox) qrBox.style.visibility = "hidden";
      }
    } catch (e) { /* QR is best-effort */ }

    // 4 labeled copies — one sheet each for the paper trail's four hands.
    try {
      if (typeof w.makeCopies === "function") w.makeCopies([
        "نسخة السائق — Driver Copy",
        "نسخة مهندس الموقع — Site Engineer Copy",
        "نسخة المصنع — Plant Copy",
        "نسخة المكتب الرئيسي — Head Office Copy",
      ]);
    } catch (e) { /* copies are best-effort — worst case one sheet prints */ }

    setTimeout(() => { try { w.focus(); w.print(); } catch (e) {} }, 600);
  };

  if (w.document.readyState === "complete") inject();
  else w.onload = inject;
  return true;
}

function renderShell(subtitleText) {
