  const _refBtn = header.querySelector(".header-refresh");
  if (_refBtn) _refBtn.addEventListener("click", () => refreshReferenceData(_refBtn));

  const main = el("main", "app-main");
  main.id = "main-content";

  const footer = el("footer", "app-footer");
  footer.textContent = CONFIG.footerText;

  app.appendChild(header);
  app.appendChild(main);
  app.appendChild(footer);

  return main;
}

// ════════════════════════════════════════════════════════
// DISPATCH FORM — filled by plant clerk
// ════════════════════════════════════════════════════════
// Step 1 — pick the receiving COMPANY (Copri or another contractor).
function renderCompanySelect() {
  const main = renderShell("اختيار الشركة");

  const card = el("div", "card");
  card.appendChild(sectionTitle("الشركة المستلمة"));

  const info = el("div", "info-box");
  info.textContent = "اختر الشركة المستلمة للأسفلت";
  card.appendChild(info);

  Object.entries(CONFIG.companies).forEach(([name, company]) => {
    const btn = el("button", "project-btn");
    const projCount = Object.keys(company.projects || {}).length;
    btn.innerHTML = `
      <div class="project-btn-name">${name}</div>
      <div class="project-btn-contract">${company.isCopri ? "كوبري — تسليم بالموقع" : "تسجيل بالمصنع فقط"} · ${projCount} مشروع</div>
    `;
    btn.addEventListener("click", () => renderProjectSelect(name, company));
    card.appendChild(btn);
  });

  main.appendChild(card);
}

// Step 2 — pick the PROJECT within the chosen company.
function renderProjectSelect(companyName, company) {
  const main = renderShell("اختيار المشروع");

  const card = el("div", "card");
  card.appendChild(sectionTitle(`${companyName} — اختر المشروع`));

  const info = el("div", "info-box");
  info.textContent = "يرجى تحديد المشروع قبل إدخال بيانات الشحنة";
  card.appendChild(info);

  Object.entries(company.projects).forEach(([name, proj]) => {
    const btn = el("button", "project-btn");
    btn.innerHTML = `
      <div class="project-btn-name">${name}</div>
      <div class="project-btn-contract">${proj.contract || ""}</div>
    `;
    btn.addEventListener("click", () =>
      renderDispatch({ companyName, company, projectName: name, project: proj })
    );
    card.appendChild(btn);
  });

  const back = el("button", "btn-ghost"); back.textContent = "← تغيير الشركة";
  back.addEventListener("click", renderCompanySelect);
  card.appendChild(back);

  main.appendChild(card);
}

function renderDispatch(ctx) {
  const { companyName, company, projectName, project } = ctx;
  const isCopri = !!company.isCopri;
  const submitLabel = isCopri ? "إرسال وإخطار المهندس &nbsp;🚛" : "تسجيل الشحنة &nbsp;🚛";
  const main = renderShell("إرسال شحنة");

  // Company + project banner
  const banner = el("div", "project-banner");
  banner.innerHTML = `
    <div class="project-banner-name">${projectName}</div>
    <div class="project-banner-contract">${companyName}${project.contract ? " · " + project.contract : ""}</div>
    <button class="project-banner-change" id="changeProjectBtn">تغيير</button>
  `;
  main.appendChild(banner);
  document.getElementById("changeProjectBtn").addEventListener("click", renderCompanySelect);

  // If "other" project — show free text fields for project name and contract
  let otherProjectInput = null, otherContractInput = null;
  if (project.isOther) {
    const otherCard = el("div", "card");
    otherCard.style.marginBottom = ".5rem";
    otherCard.appendChild(sectionTitle("تفاصيل المشروع"));
    const { group: gOP, input: opInput } = fieldGroup(
      "اسم المشروع", input("text", "أدخل اسم المشروع"), true
    );
    const { group: gOC, input: ocInput } = fieldGroup(
      "رقم العقد", input("text", "أدخل رقم العقد"), false
    );
    otherCard.appendChild(gOP);
    otherCard.appendChild(gOC);
    main.appendChild(otherCard);
    otherProjectInput  = opInput;
    otherContractInput = ocInput;
  }

  const card = el("div", "card");

  // Section: Shipment data
  card.appendChild(sectionTitle("بيانات الشحنة"));

  // Note number is DB-allocated at submit (serial continuation of the carbon
  // book — 0004 migration). The clerk no longer types it.
  const noteInfo = el("div", "info-box");
  noteInfo.textContent = "🔢 رقم سند التسليم يُخصَّص تلقائياً عند الإرسال ويظهر على النسخ المطبوعة";
  card.appendChild(noteInfo);

  const { group: gPlant, input: plantInput } = fieldGroup(
    "رقم المصنع", select(CONFIG.plants, "اختر المصنع"), true
  );
  card.appendChild(gPlant);

  // Work-order field intentionally removed for now — WO must never be user-
  // editable. It will return as a locked auto-fill once the site→WO paths are
  // defined. (makeWorkOrderField / CONFIG.contractWorkOrders kept for that.)

  const { group: gNaqel, input: naqelInput } = fieldGroup(
    "الناقل", select(CONFIG.naqelOptions, "اختر الناقل"), true
  );
  card.appendChild(gNaqel);

  // ── Driver section — rebuilt when الناقل changes ──────────────────
  // The driver (quick-pick for Copri) comes first and auto-fills the phone
  // and plate; all stay editable. Phone has a fixed +965 prefix, so the
  // clerk types only the local digits. External contractor = free text.
  const driverWrap = el("div", "field-group"); driverWrap.style.gap = ".9rem";
  let getDriver = () => ({ name: "", phone: "", truck: "" });
  function buildDriver() {
    driverWrap.innerHTML = "";
    const copri = naqelInput.value === "كوبري";

    // 1) Driver name — the field that populates phone + plate
    const { group: gName, input: nameI } = fieldGroup("اسم السائق", input("text", "الاسم الكامل"), true);
    let pickSel = null;
    if (copri && CONFIG.copriDrivers.length) {
      const { group: gPick, input: ps } = fieldGroup(
        "اختر سائق كوبري", select(CONFIG.copriDrivers.map(d => d.name), "اختر من القائمة"), false,
        "يملأ الاسم والهاتف ورقم الشاحنة تلقائياً — يمكن تعديلها"
      );
      pickSel = ps;
      driverWrap.appendChild(gPick);
    }
    driverWrap.appendChild(gName);

    // 2) Phone — fixed +965 prefix, local digits only
    const gPhone = el("div", "field-group");
    const lblP = el("label"); lblP.textContent = "هاتف السائق"; gPhone.appendChild(lblP);
    const phoneRow = el("div"); phoneRow.style.display = "flex"; phoneRow.style.gap = ".4rem";
    phoneRow.style.direction = "ltr"; phoneRow.style.alignItems = "stretch";
    const prefix = el("div"); prefix.textContent = "+965";
    prefix.style.cssText = "display:flex;align-items:center;padding:0 .8rem;background:var(--surface-2);" +
      "border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-2);font-weight:700;white-space:nowrap;";
    const phoneI = input("tel", "XXXXXXXX", "tel"); phoneI.maxLength = 8;
    phoneI.style.direction = "ltr"; phoneI.style.textAlign = "left";
    phoneRow.appendChild(prefix); phoneRow.appendChild(phoneI);
    gPhone.appendChild(phoneRow);
    const hintP = el("div", "field-hint"); hintP.textContent = "٨ أرقام محلية بدون 965 — للتواصل من سجل المهندس";
    gPhone.appendChild(hintP);
    driverWrap.appendChild(gPhone);

    // 3) Plate number
    const { group: gTruck, input: truckI } = fieldGroup("رقم الشاحنة", input("text", "رقم اللوحة"), true);
    driverWrap.appendChild(gTruck);

    if (pickSel) {
      pickSel.addEventListener("change", () => {
        const d = CONFIG.copriDrivers.find(x => x.name === pickSel.value);
        if (d) { nameI.value = d.name; phoneI.value = localFromFull(d.phone); truckI.value = d.truck || ""; }
      });
    }

    getDriver = () => ({
      name:  nameI.value.trim(),
      phone: phoneToFull(phoneI.value),
      truck: truckI.value.trim(),
    });
  }
  naqelInput.addEventListener("change", buildDriver);
  buildDriver();
  card.appendChild(driverWrap);

  const { group: g4, input: mixInput } = fieldGroup(
    "نوع الخلطة", select(CONFIG.mixTypes, "اختر النوع"), true
  );
  card.appendChild(g4);

  const row3 = el("div", "field-row-2");
  const { group: g5, input: weightInput } = fieldGroup("الوزن (طن)", input("number", "33.00", "decimal"), true);
  weightInput.step = "0.01"; weightInput.min = "0.01"; weightInput.max = String(CONFIG.maxWeight);
  const { group: g6, input: tempInput } = fieldGroup("الحرارة عند الإرسال °م", input("number", "150", "numeric"), true);
  row3.appendChild(g5); row3.appendChild(g6);
  card.appendChild(row3);

  // Planned-program quick-pick (0006): today's/tomorrow's programs for this
  // project appear as one-tap chips that fill site + location (+ mix), and
  // their sites join the dropdown options. Filled async; hidden when none.
  const progPick = el("div"); progPick.style.display = "none";
  card.appendChild(progPick);

  // Site: required dropdown for Copri; optional free text (no suggestions) otherwise
  let siteInput;
  if (isCopri) {
    const { group: g7, input: sIn } = fieldGroup(
      "الموقع المستلم", select(project.sites || [], "اختر الموقع"), true
    );
    siteInput = sIn; card.appendChild(g7);
  } else {
    const { group: g7, input: sIn } = fieldGroup(
      "الموقع المستلم", input("text", "اختياري"), false
    );
    siteInput = sIn; card.appendChild(g7);
  }
  // A program site missing from the reference list still becomes pickable.
  function ensureSiteOption(name) {
    if (!name || siteInput.tagName !== "SELECT") return;
    if (![...siteInput.options].some((o) => o.value === name)) {
      const o = document.createElement("option"); o.value = o.textContent = name;
      siteInput.appendChild(o);
    }
  }

  // ── Location section ──────────────────────────────────────────────
  // km_range  → from/to kilometre.
  // block_street → block + street, with an optional "named street" toggle
  //                for main streets that have no block/street number.
  let getLocation = () => ({ block: "", street: "", locationType: project.locationType });
  let locContainer = null;   // element that holds the location inputs (for change events)

  if (project.locationType === "km_range") {
    const row4 = el("div", "field-row-2");
    const { group: gFrom, input: kmFrom } = fieldGroup("من الكيلومتر", input("text", "مثال: 12.5", "decimal"), true);
    const { group: gTo,   input: kmTo }   = fieldGroup("إلى الكيلومتر", input("text", "مثال: 14.0", "decimal"), true);
    row4.appendChild(gFrom); row4.appendChild(gTo);
    card.appendChild(row4);
    locContainer = row4;
    getLocation = () => ({ block: kmFrom.value.trim(), street: kmTo.value.trim(), locationType: "km_range" });
  } else {
    let locMode = "blocks"; // "blocks" | "named"
    const locWrap = el("div");
    locContainer = locWrap;

    // Toggle (only for projects that allow named main streets)
    if (project.allowNamedStreet) {
      const lbl = el("label"); lbl.textContent = "نوع العنوان"; lbl.style.marginBottom = ".35rem"; lbl.style.display = "block";
      const toggle = el("div", "history-tabs"); toggle.style.marginBottom = "0";
      const tBlocks = el("button", "history-tab active"); tBlocks.type = "button"; tBlocks.textContent = "قطعة وشارع";
      const tNamed  = el("button", "history-tab");        tNamed.type  = "button"; tNamed.textContent  = "اسم الشارع";
      toggle.appendChild(tBlocks); toggle.appendChild(tNamed);
      card.appendChild(lbl); card.appendChild(toggle);
      tBlocks.addEventListener("click", () => {
        if (locMode === "blocks") return;
        locMode = "blocks"; tBlocks.classList.add("active"); tNamed.classList.remove("active"); buildLoc(); refreshLoadNumber(); refreshWorkOrder();
      });
      tNamed.addEventListener("click", () => {
        if (locMode === "named") return;
        locMode = "named"; tNamed.classList.add("active"); tBlocks.classList.remove("active"); buildLoc(); refreshLoadNumber(); refreshWorkOrder();
      });
    }

    function buildLoc() {
      locWrap.innerHTML = "";
      if (locMode === "named") {
        // Named streets are a dropdown when the chosen site has a list;
        // otherwise fall back to free text.
        const list = (project.namedStreets && project.namedStreets[siteInput.value]) || [];
        const nameI = list.length
          ? select(list, "اختر الشارع")
          : input("text", "مثال: شارع بيروت");
        const { group: gName } = fieldGroup("اسم الشارع / الموقع", nameI, true);
        locWrap.appendChild(gName);
        getLocation = () => ({ block: nameI.value.trim(), street: "", locationType: "named" });
      } else {
        const row4 = el("div", "field-row-2");
        const { group: gBlock,  input: bInput } = fieldGroup("القطعة", input("text", "رقم القطعة", "numeric"), true);
        const { group: gStreet, input: sInput } = fieldGroup("الشارع", input("text", "رقم الشارع", "numeric"), true);
        row4.appendChild(gBlock); row4.appendChild(gStreet);
        locWrap.appendChild(row4);
        getLocation = () => ({ block: bInput.value.trim(), street: sInput.value.trim(), locationType: "block_street" });
      }
    }
    buildLoc();
    // Named-street options depend on the chosen site — rebuild on site change.
    siteInput.addEventListener("change", () => { if (locMode === "named") { buildLoc(); refreshWorkOrder(); } });
    card.appendChild(locWrap);
  }

  // ── Auto load number for this exact location (live preview) ────────
  // Counts loads to project+site+block+street since the last noon shift.
  const loadBox = el("div", "info-box");
  loadBox.style.fontWeight = "700";
  loadBox.textContent = "رقم الحمولة لهذا الموقع: —";
  card.appendChild(loadBox);

  // Count by site only when block/street can't be relied on as a key:
  //  - non-Copri projects (block/street optional), or
  //  - named-street entries (free-typed name varies in spelling/spacing).
  // Numbered block/street (and km range) stay granular.
  let liveLoad = null;
  let loadReqSeq = 0;
  async function refreshLoadNumber() {
    const loc = getLocation();
    const siteOnly = !isCopri || loc.locationType === "named";
    const ready = siteOnly ? !!siteInput.value : (!!siteInput.value && !!loc.block);
    if (!ready) { liveLoad = null; loadBox.textContent = "رقم الحمولة لهذا الموقع: —"; return; }
    const seq = ++loadReqSeq;
    loadBox.textContent = "رقم الحمولة لهذا الموقع: جارٍ الحساب…";
    const n = await fetchNextLoad(projectName, siteInput.value, loc.block, loc.street, siteOnly);
    if (seq !== loadReqSeq) return;   // a newer request superseded this one
    liveLoad = n;
    loadBox.textContent = n
      ? `رقم الحمولة لهذا الموقع: ${n}  ·  منذ ظهر اليوم`
      : "رقم الحمولة لهذا الموقع: —";
  }
  // Locked auto-fill work order — derived read-only from site + location for the
  // asphalt discipline; the clerk cannot edit it. Shows a "no order yet" note
  // when no active order in the reference Work Orders tab covers this spot.
  const woBox = el("div", "info-box"); woBox.style.fontWeight = "700";
  woBox.textContent = "أمر العمل: —";
  if (isCopri) card.appendChild(woBox);
  let liveWO = "";
  function refreshWorkOrder() {
    if (!isCopri) { liveWO = ""; return; }
    const loc = getLocation();
    if (loc.locationType === "km_range") { liveWO = ""; woBox.textContent = "أمر العمل: لا ينطبق"; return; }
    const street = loc.locationType === "named" ? loc.block : loc.street;  // named name lives in block
    const block  = loc.locationType === "named" ? "" : loc.block;
    if (!block && !street) { liveWO = ""; woBox.textContent = "أمر العمل: —"; return; }
    const wo = autoWorkOrder(projectName, siteInput.value, block, street, "asphalt");
    liveWO = wo;
    woBox.textContent = (wo && wo !== "*") ? `أمر العمل: ${wo}` : "أمر العمل: لم يصدر أمر عمل بعد";
  }
  siteInput.addEventListener("change", refreshLoadNumber);
  siteInput.addEventListener("change", refreshWorkOrder);
  if (locContainer) {
    locContainer.addEventListener("change", refreshLoadNumber);
    locContainer.addEventListener("change", refreshWorkOrder);
    locContainer.addEventListener("input",  refreshWorkOrder);
  }
  refreshWorkOrder();

  // ── Planned-program quick-pick: fetch + render chips (best-effort) ──
  function applyProgram(p) {
    ensureSiteOption(p.site);
    if (p.site) { siteInput.value = p.site; siteInput.dispatchEvent(new Event("change", { bubbles: true })); }

    // A street with no block is a NAMED-street location (e.g. مشرف ش57):
    // filling the blocks-mode street field would leave the mandatory قطعة
    // empty and dead-end the clerk at validation. Flip the address-type
    // toggle to اسم الشارع and fill the name instead.
    if (!p.block && p.street && project.allowNamedStreet) {
      const namedTab = [...card.querySelectorAll("button.history-tab")]
        .find((b) => b.textContent === "اسم الشارع");
      if (namedTab) namedTab.click();   // rebuilds the location inputs in named mode
      const field = locContainer ? locContainer.querySelector("select, input") : null;
      if (field) {
        if (field.tagName === "SELECT" && ![...field.options].some((o) => o.value === p.street)) {
          const o = document.createElement("option"); o.value = o.textContent = p.street;
          field.appendChild(o);
        }
        field.value = p.street;
        field.dispatchEvent(new Event("change", { bubbles: true }));
      }
    } else {
      // Block+street program: make sure the form is in قطعة وشارع mode
      // (a previous chip may have flipped it to named).
      const blocksTab = [...card.querySelectorAll("button.history-tab")]
        .find((b) => b.textContent === "قطعة وشارع");
      if (blocksTab && !blocksTab.classList.contains("active")) blocksTab.click();
      // blocks-mode inputs sit in locContainer as [block, street]
      const ins = locContainer ? locContainer.querySelectorAll("input") : [];
      if (ins.length >= 2) {
        if (p.block)  ins[0].value = p.block;
        if (p.street) ins[1].value = p.street;
        if (p.block || p.street) ins[1].dispatchEvent(new Event("change", { bubbles: true }));
      }
    }
    if (p.mix && [...mixInput.options].some((o) => o.value === p.mix)) mixInput.value = p.mix;
  }
  (async () => {
    try {
      const from = plantKwISO(-1), to = plantKwISO(1);   // last night's shift .. tomorrow
      const progs = (await sbGet(
        `asphalt_programs?work_date=gte.${from}&work_date=lte.${to}&status=eq.${encodeURIComponent("مخطط")}&order=work_date.asc&limit=50`
      )).filter((p) => p.project === projectName);
      if (!progs.length) return;
      progs.forEach((p) => ensureSiteOption(p.site));
      const box = el("div", "info-box");
      const lbl = el("div"); lbl.style.cssText = "font-weight:700;margin-bottom:.45rem;";
      lbl.textContent = "📋 برامج الأعمال المخططة — اضغط لتعبئة الموقع";
      box.appendChild(lbl);
      const rowC = el("div"); rowC.style.cssText = "display:flex;flex-wrap:wrap;gap:.4rem;";
      progs.forEach((p) => {
        const chip = el("button", "history-tab"); chip.type = "button";
        chip.style.cssText = "width:auto;font-size:.75rem;";
        chip.textContent = `${p.work_date === plantKwISO(0) ? "اليوم" : p.work_date === plantKwISO(1) ? "غداً" : p.work_date} · ${p.site}${p.block ? " ق" + p.block : ""}${p.street ? " ش" + p.street : ""}${p.mix ? " · " + p.mix : ""}`;
        chip.addEventListener("click", () => applyProgram(p));
        rowC.appendChild(chip);
      });
      box.appendChild(rowC);
      progPick.appendChild(box);
      progPick.style.display = "";
    } catch (e) { /* quick-pick is a convenience — the form works without it */ }
  })();

  // Engineer to notify — Copri only (other companies end at the plant)
  let notifyInput = null;
  if (isCopri) {
    const engineers = project.engineers || [];
    const { group: gNotify, input: nInput } = fieldGroup(
      "إخطار المهندس", select(engineers.map(e => e.name), "اختر المهندس"), true,
      "سيظهر زر إرسال رابط الاستلام له عبر WhatsApp بعد الإرسال"
    );
    card.appendChild(gNotify);
    notifyInput = nInput;
    if (!engineers.length) {
      const noEng = el("div", "info-box");
      noEng.textContent = "لا يوجد مهندسون مُسجّلون لهذا المشروع بعد — يرجى إضافتهم في الإعدادات.";
      card.appendChild(noEng);
    }
  }

  // Section: Clerk signature
  card.appendChild(sectionTitle("توقيع المشرف"));

  const { group: g8, input: clerkInput } = fieldGroup(
    "اسم المشرف / الكاتب",
    CONFIG.clerks.length ? select(CONFIG.clerks.map(c => c.name), "اختر اسمك") : input("text", "الاسم الكامل"),
    true
  );
  const clerkSession = getClerkSession();
  if (clerkSession) { clerkInput.value = clerkSession.name; clerkInput.disabled = true; }
  card.appendChild(g8);

  const { group: g9, input: remarksInput } = fieldGroup(
    "ملاحظات", textarea("أي ملاحظات على الشحنة..."), false
  );
  card.appendChild(g9);

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none";
  card.appendChild(errDiv);

  const btn = el("button", "btn-primary"); btn.type = "button";
  btn.innerHTML = submitLabel;
  card.appendChild(btn);

  main.appendChild(card);

  // Submit handler. submitRef is fixed per form render: if the response is
  // lost mid-air, the retry sends the same ref and gets back the note that
  // already landed (no double row, no burned serial).
  const submitRef = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
  btn.addEventListener("click", async () => {
    const driver = getDriver();
    const loc    = getLocation();
    const data = {
      company:      companyName,
      project:      project.isOther ? (otherProjectInput ? otherProjectInput.value.trim() : projectName) : projectName,
      contract:     project.isOther ? (otherContractInput ? otherContractInput.value.trim() : "") : project.contract,
      workOrder:    liveWO,
      plant:        plantInput.value,
      truckNumber:  driver.truck,
      naqel:        naqelInput.value,
      driverName:   driver.name,
      driverPhone:  cleanPhone(driver.phone),
      mixType:      mixInput.value,
      weight:       weightInput.value,
      tempDispatch: tempInput.value,
      site:         normSp(siteInput.value),
      block:        normSp(loc.block),
      street:       normSp(loc.street),
      locationType: loc.locationType,
      clerkName:    clerkInput.value,
      notifyEngineer: notifyInput ? notifyInput.value : "",
      remarks:      remarksInput.value.trim(),
    };
    // street is not required in km_range "from only"? both required; in named mode only block (the name) is required.
    const required = ["plant","truckNumber","naqel","driverName","mixType","weight","tempDispatch","block","clerkName"];
    if (data.locationType !== "named") required.push("street");
    if (isCopri) required.push("site", "notifyEngineer");
    if (project.isOther && otherProjectInput && !otherProjectInput.value.trim()) {
      errDiv.textContent = "يرجى إدخال اسم المشروع"; errDiv.style.display = "block"; return;
    }
    if (required.some(k => !data[k])) {
      errDiv.textContent = "يرجى تعبئة جميع الحقول المطلوبة";
      errDiv.style.display = "block"; return;
    }
    // Weight sanity — a real asphalt load is a few tens of tons. Reject an
    // out-of-range value so a typo (e.g. 33,3809) can't be recorded, and store
    // the clean parsed number rather than whatever raw text was typed.
    const wNum = parseFloat(String(data.weight).replace(",", "."));
    if (!isFinite(wNum) || wNum <= 0 || wNum > CONFIG.maxWeight) {
      errDiv.textContent = `الوزن يجب أن يكون بين 0 و ${CONFIG.maxWeight} طن — تأكد من الرقم`;
      errDiv.style.display = "block"; return;
    }
    data.weight = String(wNum);
    errDiv.style.display = "none";
    btn.disabled = true; btn.textContent = "جارٍ التحقق...";

    // Authoritative load number for this exact location, fetched right before
    // writing so it reflects the latest count (resets at noon Kuwait).
    const loadSiteOnly = !isCopri || data.locationType === "named";
    const authLoad = await fetchNextLoad(data.project, data.site, data.block, data.street, loadSiteOnly);
    data.loadNumber = (authLoad != null) ? authLoad : (liveLoad != null ? liveLoad : "");

    btn.textContent = "جارٍ الإرسال...";
    try {
      // The RPC allocates the serial note number and inserts atomically;
      // the assigned number comes back in the response.
      const w = await dbSubmitDispatch(data, submitRef);
      if (!w.success || !w.note) throw new Error(w.error || "dispatch_submit failed");
      data.noteNumber = String(w.note);
      const receiptLink = `${window.location.href.split("?")[0]}?note=${encodeURIComponent(data.noteNumber)}`;
      renderDispatchSuccess(ctx, data, receiptLink);
    } catch {
      btn.disabled = false; btn.innerHTML = submitLabel;
      errDiv.textContent = "حدث خطأ، يرجى المحاولة مجدداً";
      errDiv.style.display = "block";
    }
  });
}

function renderDispatchSuccess(ctx, data, receiptLink) {
  const isCopri = !!ctx.company.isCopri;
  const main = document.getElementById("main-content");
  main.innerHTML = "";

  const s = el("div", "success-screen");
  const icon = el("div", "success-icon ok"); icon.textContent = "✓"; s.appendChild(icon);
  const h = el("h2"); h.textContent = isCopri ? "تم الإرسال بنجاح" : "تم تسجيل الشحنة"; s.appendChild(h);
  const p1 = el("p"); p1.innerHTML = `<strong>${data.company}</strong> — ${data.project}`; s.appendChild(p1);
  const p2b = el("p"); p2b.innerHTML = `أمر العمل: <strong>${data.workOrder}</strong> — رقم السند: <strong>${data.noteNumber}</strong>`; s.appendChild(p2b);
  const loc = locDisplay(data);
  const p2c = el("p"); p2c.textContent = `${data.plant} — ${data.site}${loc ? " / " + loc : ""}`; s.appendChild(p2c);
  if (data.loadNumber) {
    const pLoad = el("p", "success-note");
    pLoad.textContent = `🔢 رقم الحمولة لهذا الموقع: ${data.loadNumber}`;
    s.appendChild(pLoad);
  }

  // Auto-print the 4 labeled A5 copies immediately: silent on the plant PC
  // (Chrome --kiosk-printing), one confirm tap elsewhere (phones print to the
  // plant printer over WiFi). Popup blocked → the manual button below is the
  // fallback.
  const autoPrinted = printDeliveryNote(data, isCopri ? receiptLink : null, { silent: true });

  // WhatsApp to the engineer is the clerk's one manual step until the Cloud
  // API automates it server-side — keep it the dominant action on success.
  if (isCopri) {
    const notifyEng = findEngineer(data.notifyEngineer);
    if (notifyEng && notifyEng.phone) {
      const waBtn = el("button", "btn-primary"); waBtn.style.marginTop = ".9rem";
      waBtn.style.background = "#25D366"; waBtn.style.fontSize = "1.05rem";
      waBtn.innerHTML = `إرسال إلى ${notifyEng.name} عبر WhatsApp &nbsp;💬`;
      waBtn.addEventListener("click", () => {
        window.open(`https://wa.me/${notifyEng.phone}?text=${whatsappMessage(data, receiptLink)}`, "_blank");
      });
      s.appendChild(waBtn);
    } else if (data.notifyEngineer) {
      const noPhone = el("div", "info-box"); noPhone.style.marginTop = ".75rem";
      noPhone.textContent = `لا يوجد رقم WhatsApp للمهندس ${data.notifyEngineer} — انسخ الرابط وأرسله يدوياً، أو أضف الرقم في الإعدادات.`;
      s.appendChild(noPhone);
    }
  }

  // Reprint / fallback print button (also the only print path when the
  // popup was blocked on first use).
  const printBtn = el("button", "btn-primary");
  printBtn.style.marginTop = ".75rem";
  printBtn.innerHTML = autoPrinted ? "🖨️ إعادة طباعة السند (٤ نسخ)" : "🖨️ طباعة السند — ٤ نسخ";
  printBtn.addEventListener("click", () => printDeliveryNote(data, isCopri ? receiptLink : null));
  s.appendChild(printBtn);
  if (autoPrinted) {
    const pNote = el("p", "success-note");
    pNote.textContent = "🖨️ فُتحت نافذة الطباعة تلقائياً — ٤ نسخ";
    s.appendChild(pNote);
  }

  if (isCopri) {
    const lb = el("div", "link-box");
    const lbl = el("span", "link-box-label"); lbl.textContent = "🔗 رابط الاستلام — أرسله للمهندس على WhatsApp";
    lb.appendChild(lbl);
    lb.appendChild(document.createTextNode(receiptLink));
    s.appendChild(lb);

    const copyBtn = el("button", "btn-primary"); copyBtn.style.marginTop = ".75rem";
    copyBtn.style.background = "var(--text-2)";
    copyBtn.textContent = "نسخ الرابط 📋";
    copyBtn.addEventListener("click", () => {
      navigator.clipboard.writeText(receiptLink);
      copyBtn.textContent = "تم النسخ ✓";
    });
    s.appendChild(copyBtn);
  } else {
    const done = el("p", "success-note"); done.textContent = "تم التسجيل بالمصنع — لا حاجة لإرسال للموقع."; s.appendChild(done);
  }

  const newBtn = el("button", "btn-ghost"); newBtn.textContent = "إرسال شحنة جديدة";
  newBtn.addEventListener("click", () => renderDispatch(ctx));
  s.appendChild(newBtn);

  const projBtn = el("button", "btn-ghost"); projBtn.textContent = "تغيير الشركة / المشروع";
  projBtn.addEventListener("click", renderCompanySelect);
  s.appendChild(projBtn);

  const logoutBtn = el("button", "btn-ghost"); logoutBtn.textContent = "تسجيل الخروج";
  logoutBtn.style.color = "var(--text-3)";
  logoutBtn.addEventListener("click", () => { clearClerkSession(); renderClerkPINScreen(renderCompanySelect); });
  s.appendChild(logoutBtn);

  main.appendChild(s);
}

// ════════════════════════════════════════════════════════
// RECEIPT FORM — filled by site engineer
// ════════════════════════════════════════════════════════
async function renderReceipt(noteNumber, preAuthName) {
  const main = renderShell("استلام شحنة");

  // Loading
  const loading = el("div", "loading-screen");
  loading.innerHTML = `<div class="spinner"></div><p>جارٍ تحميل بيانات الشحنة...</p>`;
  main.appendChild(loading);

  // Fetch dispatch data. A network failure stays lenient (the engineer can
  // still confirm); a SUCCESSFUL lookup that finds nothing is a wrong note
  // number — usually a carbon-book number instead of the app's serial — and
  // gets a clear stop instead of a silently empty form.
  let dispatch = null, lookupFailed = false;
  try {
    dispatch = await dbDispatchByNote(noteNumber);
  } catch { lookupFailed = true; /* network error — show what we have */ }

  main.innerHTML = "";

  if (!dispatch && !lookupFailed) {
    const s = el("div", "success-screen");
    const icon = el("div", "success-icon"); icon.textContent = "؟"; icon.style.background = "#fdecea"; icon.style.color = "var(--red)";
    s.appendChild(icon);
    const h = el("h2"); h.textContent = "لا توجد شحنة بهذا الرقم"; s.appendChild(h);
    const p1 = el("p"); p1.innerHTML = `رقم السند <strong>${noteNumber}</strong> غير مسجل في المنظومة.`; s.appendChild(p1);
    const hint = el("div", "info-box"); hint.style.textAlign = "right";
    hint.textContent = "افتح رابط الاستلام المرسل من المصنع عبر WhatsApp كما هو — الرقم المكتوب على الورقة الكربونية قد يختلف عن رقم المنظومة.";
    s.appendChild(hint);
    main.appendChild(s);
    return;
  }

  // ── One-time link check — block if already receipted ──────────────────
  if (dispatch) {
    try {
      const statusJson = await dbCheckReceipt(noteNumber);
      if (statusJson.alreadyReceived) {
        const s = el("div", "success-screen");
        const icon = el("div", "success-icon ok"); icon.textContent = "✓"; s.appendChild(icon);
        const h = el("h2"); h.textContent = "تم استلام هذه الشحنة مسبقاً"; s.appendChild(h);
        const p1 = el("p"); p1.textContent = `رقم السند: ${noteNumber}`; s.appendChild(p1);
        const p2 = el("p"); p2.textContent = `تم التأكيد بواسطة: ${statusJson.engineer}`; s.appendChild(p2);
        const p3 = el("p"); p3.textContent = `في: ${statusJson.timestamp}`; s.appendChild(p3);
        main.appendChild(s);
        return;
      }
    } catch { /* network issue — allow to proceed */ }
  }

  // ── Summary card ──────────────────────────────────────
  const summary = el("div", "receipt-summary");
  const sh = el("div", "summary-header");
  const sl = el("div", "section-title"); sl.style.border="none"; sl.style.paddingBottom="0"; sl.textContent = "بيانات الشحنة الواردة";
  sh.appendChild(sl);
  sh.appendChild(badge("في الطريق", "badge-transit"));
  summary.appendChild(sh);

  if (dispatch) {
    const rows = [
      ["المشروع",                dispatch.project || "—"],
      ["رقم العقد",              dispatch.contract || "—"],
      ["رقم أمر العمل",          dispatch.workOrder || "—"],
      ["رقم السند",              dispatch.noteNumber],
      ["رقم الحمولة لهذا الموقع", dispatch.loadNumber || "—"],
      ["المصنع",                 dispatch.plant],
      ["رقم الشاحنة",            dispatch.truckNumber],
      ["الناقل",                 dispatch.naqel || "—"],
      ["السائق",                 dispatch.driverName],
      ["نوع الخلطة",             dispatch.mixType],
      ["الوزن المرسل",           `${dispatch.weight} طن`],
      ["الحرارة عند الإرسال",    `${dispatch.tempDispatch}°م`],
      ["الموقع",                 dispatch.site],
    ];
    if (dispatch.locationType === "km_range") {
      rows.push(["من الكيلومتر", dispatch.block || "—"]);
      rows.push(["إلى الكيلومتر", dispatch.street || "—"]);
    } else if (dispatch.locationType === "named") {
      rows.push(["اسم الشارع / الموقع", dispatch.block || "—"]);
    } else {
      rows.push(["القطعة", dispatch.block || "—"]);
      rows.push(["الشارع", dispatch.street || "—"]);
    }
    rows.push(["وقت المغادرة", dispatch.timestamp]);
    rows.forEach(([l, v]) => summary.appendChild(fieldRow(l, v)));
  } else {
    summary.appendChild(fieldRow("رقم السند", noteNumber));
    const warn = el("div", "info-box"); warn.style.marginTop=".5rem";
    warn.textContent = "لم يتم العثور على بيانات الإرسال لهذا السند. تأكد من الرقم وأعد المحاولة.";
    summary.appendChild(warn);
  }

  // Contact the driver directly (call / WhatsApp) if a number was recorded
  if (dispatch && dispatch.driverPhone) {
    const contact = driverContactRow(dispatch.driverName, dispatch.driverPhone);
    contact.style.marginTop = ".6rem";
    summary.appendChild(contact);
  }
  main.appendChild(summary);

  // ── Receipt form ──────────────────────────────────────
  const card = el("div", "card");
  card.appendChild(sectionTitle("تأكيد الاستلام"));

  // Engineer name
  const engList = allEngineers();
  const { group: g1, input: engInput } = fieldGroup(
    "اسم المهندس",
    engList.length ? select(engList.map(e => e.name), "اختر اسمك") : input("text", "الاسم الكامل"),
    true
  );
  if (preAuthName) { engInput.value = preAuthName; engInput.disabled = true; }
  card.appendChild(g1);

  // Work order is fixed by the dispatch location — read-only on the receipt too.
  const { group: gWOr, input: woReceiptInput } = fieldGroup(
    "رقم أمر العمل", input("text", "—"), false,
    "يُحدَّد تلقائياً من بيانات الإرسال"
  );
  woReceiptInput.value = dispatch
    ? lookupWorkOrder(dispatch.site, dispatch.block, dispatch.street, dispatch.locationType)
    : "*";
  woReceiptInput.readOnly = true;
  woReceiptInput.style.background = "var(--surface-2)";
  woReceiptInput.style.fontWeight = "700";
  card.appendChild(gWOr);

  // Arrival weight is no longer entered by the engineer — it defaults to the
  // dispatched weight (recorded at the plant scale). See submit handler below.

  // Temperature at arrival
  const row = el("div", "field-row-2");
  const { group: g3, input: tempArrInput } = fieldGroup(
    "الحرارة عند الوصول °م", input("number", "أدخل القراءة", "numeric"), true
  );
  const tempDeltaDiv = el("div", "temp-delta"); tempDeltaDiv.style.display = "none";
  g3.appendChild(tempDeltaDiv);
  row.appendChild(g3);
  card.appendChild(row);

  tempArrInput.addEventListener("input", () => {
    if (!dispatch || !tempArrInput.value) { tempDeltaDiv.style.display = "none"; return; }
    const diff = Math.abs(Number(tempArrInput.value) - Number(dispatch.tempDispatch));
    tempDeltaDiv.style.display = "block";
    tempDeltaDiv.className = `temp-delta ${diff > CONFIG.tempDropWarning ? "delta-warn" : "delta-ok"}`;
    tempDeltaDiv.textContent = `فرق الحرارة: ${diff}°م ${diff > CONFIG.tempDropWarning ? "⚠ كبير" : "✓"}`;
  });

  // Decision
  const decGroup = el("div", "field-group");
  const decLabel = el("label"); decLabel.innerHTML = 'قرار الاستلام <span class="req">*</span>';
  const decBtns = el("div", "decision-buttons");
  const acceptBtn = el("button", "decision-btn accept"); acceptBtn.type = "button"; acceptBtn.innerHTML = "✓&nbsp; قبول";
  const rejectBtn = el("button", "decision-btn reject"); rejectBtn.type = "button"; rejectBtn.innerHTML = "✗&nbsp; رفض";
  decBtns.appendChild(acceptBtn); decBtns.appendChild(rejectBtn);
  decGroup.appendChild(decLabel); decGroup.appendChild(decBtns);
  card.appendChild(decGroup);

  let decision = "";

  const { group: reasonGroupEl, input: reasonInput } = fieldGroup(
    "سبب الرفض", select(CONFIG.rejectionReasons, "اختر السبب"), true
  );
  reasonGroupEl.style.display = "none";
  card.appendChild(reasonGroupEl);

  const { group: remarksGroup, input: remarksInput } = fieldGroup(
    "ملاحظات", textarea("أي ملاحظات..."), false
  );
  remarksGroup.style.display = "none";
  card.appendChild(remarksGroup);

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none";
  card.appendChild(errDiv);

  const submitBtn = el("button", "btn-primary"); submitBtn.type = "button";
  submitBtn.textContent = "تأكيد الاستلام والتوقيع";
  card.appendChild(submitBtn);

  main.appendChild(card);

  acceptBtn.addEventListener("click", () => {
    decision = "مقبول";
    acceptBtn.classList.add("active"); rejectBtn.classList.remove("active");
    reasonGroupEl.style.display = "none"; remarksGroup.style.display = "flex";
    submitBtn.className = "btn-primary"; submitBtn.textContent = "تأكيد الاستلام والتوقيع";
  });
  rejectBtn.addEventListener("click", () => {
    decision = "مرفوض";
    rejectBtn.classList.add("active"); acceptBtn.classList.remove("active");
    reasonGroupEl.style.display = "flex"; remarksGroup.style.display = "none";
    submitBtn.className = "btn-primary btn-danger"; submitBtn.textContent = "تسجيل الرفض";
  });

  submitBtn.addEventListener("click", async () => {
    if (!engInput.value) { errDiv.textContent = "يرجى اختيار اسم المهندس"; errDiv.style.display = "block"; return; }
    if (!tempArrInput.value) { errDiv.textContent = "يرجى إدخال الحرارة عند الوصول"; errDiv.style.display = "block"; return; }
    if (!decision) { errDiv.textContent = "يرجى اختيار قبول أو رفض"; errDiv.style.display = "block"; return; }
    if (decision === "مرفوض" && !reasonInput.value) { errDiv.textContent = "يرجى اختيار سبب الرفض"; errDiv.style.display = "block"; return; }
    errDiv.style.display = "none";
    submitBtn.disabled = true; submitBtn.textContent = "جارٍ التسجيل...";

    try {
      await dbSubmitReceipt({
        noteNumber,
        engineerName:  engInput.value,
        workOrder:     woReceiptInput.value.trim(),
        decision,
        weightArrival: dispatch ? dispatch.weight : "",
        tempArrival:   tempArrInput.value,
        remarks:       decision === "مرفوض" ? reasonInput.value : remarksInput.value,
      });
      renderReceiptSuccess(noteNumber, decision, preAuthName);
    } catch {
      submitBtn.disabled = false;
      errDiv.textContent = "حدث خطأ، يرجى المحاولة مجدداً";
      errDiv.style.display = "block";
    }
  });
}

function renderReceiptSuccess(noteNumber, decision, engName) {
  const main = document.getElementById("main-content");
  main.innerHTML = "";

  const s = el("div", "success-screen");
  const accepted = decision === "مقبول";
  const icon = el("div", `success-icon ${accepted ? "ok" : "rejected"}`);
  icon.textContent = accepted ? "✓" : "✗"; s.appendChild(icon);
  const h = el("h2"); h.textContent = accepted ? "تم قبول الشحنة" : "تم تسجيل الرفض"; s.appendChild(h);
  const p1 = el("p"); p1.textContent = `رقم السند: ${noteNumber}`; s.appendChild(p1);
  const p2 = el("p", "success-note"); p2.textContent = `تم تسجيل توقيعك — ${timestamp()}`; s.appendChild(p2);

  // Quick access to engineer log
  if (engName) {
    const logBtn = el("button", "btn-primary");
    logBtn.style.marginTop = ".9rem";
    logBtn.textContent = "عرض سجلاتي 📋";
    logBtn.addEventListener("click", () => renderEngineerHome(engName));
    s.appendChild(logBtn);
  }

  main.appendChild(s);
}

  screen.appendChild(attemptsDiv);

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none";
  screen.appendChild(errDiv);

  const btn = el("button", "btn-primary"); btn.type = "button";
  btn.textContent = "دخول"; btn.style.width = "100%";
  screen.appendChild(btn);

  main.appendChild(screen);

  let attempts = 0;
  btn.addEventListener("click", () => {
    const name = nameInput.value;
    const pin  = pinInput.value.trim();
    if (!name) { errDiv.textContent = "يرجى اختيار اسمك"; errDiv.style.display = "block"; return; }
    if (!pin)  { errDiv.textContent = "يرجى إدخال الرمز السري"; errDiv.style.display = "block"; return; }

    const eng = findEngineer(name);
    if (eng && eng.pin === pin) {
      setEngineerSession(name);
      onSuccess(name);
    } else {
      attempts++;
      errDiv.textContent = "رمز سري خاطئ";
      errDiv.style.display = "block";
      pinInput.value = "";
      if (attempts >= 3) {
        attemptsDiv.textContent = `محاولات فاشلة: ${attempts} — الرجاء التواصل مع المشرف`;
        attemptsDiv.style.display = "block";
      }
    }
  });

  // Allow Enter key
  pinInput.addEventListener("keydown", e => { if (e.key === "Enter") btn.click(); });
}

    const json = await dbEngineerData(engName);
    const allReceipts = json.receipts || [];

    const nowKW   = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Kuwait" }));
    const todayY  = nowKW.getFullYear();
    const todayM  = nowKW.getMonth();
    const todayD  = nowKW.getDate();

    function isToday(isoStr) {
      if (!isoStr) return false;
      try {
        const d = new Date(isoStr);
        const kw = new Date(d.toLocaleString("en-US", { timeZone: "Asia/Kuwait" }));
        return kw.getFullYear() === todayY && kw.getMonth() === todayM && kw.getDate() === todayD;
      } catch { return false; }
    }

    receipts         = allReceipts.filter(r => isToday(r.timestamp));
    pendingDispatches = allPending.filter(p => isToday(p.isoTimestamp));
  } catch(err) {
    console.error("Engineer fetch error:", err);
    receipts = [];
    pendingDispatches = [];
  }

  content.innerHTML = "";

  // Engineer greeting
  const greeting = el("div", "info-box");
  greeting.style.marginBottom = ".75rem";
  greeting.innerHTML = `مرحباً <strong>${engName}</strong> — ${(()=>{
        const d = new Date();
        const parts = new Intl.DateTimeFormat("ar-KW", {timeZone:"Asia/Kuwait", weekday:"long", year:"numeric", month:"long", day:"numeric"}).formatToParts(d);
        const toEN = s => s.replace(/[٠-٩]/g, c => String.fromCharCode(c.charCodeAt(0)-1584));
        return parts.map(p => toEN(p.value)).join("");
      })()}`;
  content.appendChild(greeting);

  // Tabs
  const tabs = el("div", "history-tabs");

      listArea.appendChild(empty);

    receipts.forEach(r => {

      const hdr = el("div", "history-card-header");

      const time = el("div", "history-card-time");
      try {
        const d = new Date(r.timestamp);
        const toEN = s => s.replace(/[٠-٩]/g, c => String.fromCharCode(c.charCodeAt(0)-1584));
        time.textContent = toEN(d.toLocaleTimeString("ar-KW", { timeZone:"Asia/Kuwait", hour:"2-digit", minute:"2-digit" }));
      } catch { time.textContent = r.timestamp; }
      hdr.appendChild(note); hdr.appendChild(time);
      const body = el("div", "history-card-body");
      body.innerHTML = `
        <strong>المشروع:</strong> ${r.project || "—"}<br>
        <strong>أمر العمل:</strong> ${r.workOrder || "—"}<br>
        <strong>الخلطة:</strong> ${r.mixType || "—"}<br>
        <strong>وزن مرسل:</strong> ${r.weightDispatched || "—"} طن &nbsp;|&nbsp; <strong>وزن مستلم:</strong> ${r.weightArrival || "—"} طن<br>
        <strong>القرار:</strong> <span style="color:${r.decision==='مقبول'?'var(--green)':'var(--red)'}; font-weight:700">${r.decision}</span>
        ${r.remarks ? `<br><strong>ملاحظات:</strong> ${r.remarks}` : ""}
      `;
      card.appendChild(hdr);
      card.appendChild(body);
      listArea.appendChild(card);
    });
  }

  function showPending() {
    tabPending.className  = "history-tab active";
    tabReceipts.className = "history-tab";
    listArea.innerHTML = "";
    if (!pendingDispatches.length) {
      const empty = el("div", "history-empty");
      empty.textContent = "لا توجد شحنات في الطريق حالياً";
      listArea.appendChild(empty);
      return;
    }
    pendingDispatches.forEach(d => {
      const card = el("div", "history-card");
      card.style.borderColor = "var(--amber)";
      const hdr = el("div", "history-card-header");

      hdr.appendChild(note); hdr.appendChild(badge);

        <strong>أمر العمل:</strong> ${d.workOrder || "—"}<br>
        <strong>المصنع:</strong> ${d.plant || "—"} &nbsp;|&nbsp; <strong>الناقل:</strong> ${d.naqel || "—"}<br>
        <strong>السائق:</strong> ${d.driverName || "—"}<br>
        <strong>الخلطة:</strong> ${d.mixType || "—"} &nbsp;|&nbsp; <strong>الوزن:</strong> ${d.weight || "—"} طن<br>

      `;
      card.appendChild(hdr);
      card.appendChild(body);

      // Contact the driver directly, if a number was recorded
      if (d.driverPhone) {
        const contact = driverContactRow(d.driverName, d.driverPhone);

      }

      // Receipt button
      const receiptBtn = el("button", "btn-primary");
      receiptBtn.textContent = "تأكيد الاستلام →";
      receiptBtn.style.marginTop = ".6rem";
      receiptBtn.style.fontSize = ".85rem";
      receiptBtn.style.padding = ".6rem 1rem";
      receiptBtn.addEventListener("click", () => {
        window.location.href = `${window.location.href.split("?")[0]}?note=${encodeURIComponent(d.noteNumber)}`;
      });
      card.appendChild(receiptBtn);
      listArea.appendChild(card);
    });
  }

  tabReceipts.addEventListener("click", showReceipts);
  tabPending.addEventListener("click",  showPending);
  showReceipts();
}

// ── MILLING MODULE (client) ─────────────────────────────
// Engineer portal + public report view. PM/Marco portals are wired as
// stubs for now (built in the next phase). All functions prefixed
// renderMilling* / milling* so the module can be extracted later.
// ════════════════════════════════════════════════════════
const MILL_STATUS = {
  pending:  "بانتظار الموافقة", rejected: "مرفوض", review: "مراجعة",
  approved: "معتمد", scheduled: "مجدول", progress: "قيد التنفيذ", complete: "مكتمل",
};

// Flatten asphalt projects for milling dropdowns.
function millingAllProjects() {
  const out = [];
  Object.values(CONFIG.companies).forEach(c => {
    if (!c.isCopri) return;   // milling is for Copri projects only
    Object.entries(c.projects).forEach(([name, p]) =>
      out.push({ name, sites: p.sites || [], namedStreets: p.namedStreets || null, locationType: p.locationType || "block_street" }));
  });
  return out;
}
function millingProjectByName(name) { return millingAllProjects().find(p => p.name === name) || null; }
function millingDepthByLabel(label) { return (CONFIG.millingDepths || []).find(d => d.label === label) || null; }

// PM / Marco sessions (mirror the engineer session helpers; used next phase).
function getPMSession()      { try { return JSON.parse(sessionStorage.getItem("pm_session")    || "null"); } catch { return null; } }
function setPMSession(name)  { sessionStorage.setItem("pm_session",    JSON.stringify({ name, ts: Date.now() })); }
function getMarcoSession()   { try { return JSON.parse(sessionStorage.getItem("marco_session") || "null"); } catch { return null; } }
function setMarcoSession(n)  { sessionStorage.setItem("marco_session", JSON.stringify({ name: n, ts: Date.now() })); }

// Milling reads — same param shapes and return shapes as the old Apps Script
// endpoints, served from the milling_programs table. Returns {} on failure.
function sbIn(values) {
  return `in.(${encodeURIComponent(values.map(v => `"${String(v).replace(/"/g, "")}"`).join(","))})`;
}
async function millingGet(params) {
  try {
    if (params.millingProgram || params.millingReport) {
      const id = params.millingProgram || params.millingReport;
      const rows = await sbGet(`milling_programs?program_id=${sbEq(id)}&limit=1`);
      return { program: rows.length ? millingRowToUI(rows[0]) : null };
    }
    let filter = null;
    if (params.millingByEngineer) filter = `engineer=${sbEq(params.millingByEngineer)}`;
    else if (params.millingPMQueue)    filter = `status=${sbIn([MILL_STATUS.pending, MILL_STATUS.review])}`;
    else if (params.millingDecided)    filter = `status=not.${sbIn([MILL_STATUS.pending, MILL_STATUS.review])}`;
    else if (params.millingMarcoQueue) filter = `status=${sbIn([MILL_STATUS.approved, MILL_STATUS.scheduled, MILL_STATUS.progress])}`;
    if (!filter) return {};
    const rows = await sbGet(`milling_programs?${filter}&order=submitted_at.desc&limit=500`);
    return { programs: rows.map(millingRowToUI) };
  } catch { return {}; }
}

// ── Milling writes — atomic RPCs. The server owns the state machine and
// appends the audit trail under a row lock (no read-modify-write races). ──
function _millingRpcArgs(p) {
  return {
    p_program_id: p.programId, p_project: p.project || "", p_work_order: p.workOrder || "",
    p_site: p.site || "", p_block: p.block || "", p_street: p.street || "",
    p_depth: p.depth || "", p_item_code: p.itemCode || "", p_area: parseFloat(p.area) || null,
    p_machines: parseInt(p.machines, 10) || null, p_requested_date: p.requestedDate || null,
    p_priority: p.priority || "", p_engineer: p.engineerName || "", p_notes: p.notes || "",
  };
}
async function dbMillingSubmit(p) {
  return sbRpc("milling_submit", _millingRpcArgs(p));
}
async function dbMillingUpdateStatus(p) {
  const r = await sbRpc("milling_decide", {
    p_program_id: p.programId, p_decision: p.decision,
    p_by: p.by || "", p_note: p.note || "", p_role: p.role || "",
  });
  if (!r.success) throw new Error(r.error || "milling update failed");
}
async function dbMillingRevise(p) {
  const r = await sbRpc("milling_revise", _millingRpcArgs(p));
  if (!r.success) throw new Error(r.error || "milling revise failed");
}

// Client-side unique id — the no-cors POST can't read a server-assigned id.
function millingNewProgramId() {
  return `MILL-${new Date().getFullYear()}-${Date.now().toString(36).slice(-5).toUpperCase()}`;
}

function millingStatusColors(status) {
  if (status === MILL_STATUS.rejected) return ["#fdecea", "#D32F2F"];
  if (status === MILL_STATUS.pending || status === MILL_STATUS.review) return ["rgba(230,81,0,.10)", "#E65100"];
  return ["var(--green-light)", "var(--green-dark)"];   // approved / scheduled / progress / complete
}
function millingStatusBadge(status) {
  const [bg, fg] = millingStatusColors(status);
  const b = el("span"); b.textContent = status || "—";
  b.style.cssText = `display:inline-block;font-size:.7rem;font-weight:700;padding:.25rem .6rem;border-radius:999px;background:${bg};color:${fg};`;
  return b;
}
function millingPriorityBadge(priority) {
  const map = { "عادي": ["var(--surface-2)", "var(--text-2)"], "عاجل": ["rgba(230,81,0,.10)", "#E65100"], "حرج": ["#fdecea", "#D32F2F"] };
  const [bg, fg] = map[priority] || map["عادي"];
  const b = el("span"); b.textContent = priority || "—";
  b.style.cssText = `display:inline-block;font-size:.68rem;font-weight:700;padding:.2rem .55rem;border-radius:999px;background:${bg};color:${fg};`;
  return b;
}
function millingActionLabel(a) {
  return ({ submitted: "تم التقديم", rejected: "مرفوض", revised: "تمت المراجعة",
            approved: "تمت الموافقة", scheduled: "تمت الجدولة", started: "بدء التنفيذ",
            completed: "اكتمل" })[a] || a;
}
function millingRoleLabel(r) {
  return ({ engineer: "مهندس", pm: "مدير المشروع", marco: "ماركو" })[r] || r;
}

// A program details block (label/value rows), reused by cards and the report.
function millingDetails(prog) {
  const wrap = el("div");
  wrap.appendChild(fieldRow("المشروع", prog.project));
  wrap.appendChild(fieldRow("رقم أمر العمل", prog.workOrder));
  wrap.appendChild(fieldRow("الموقع", prog.site));
  const _mp = millingProjectByName(prog.project);
  if (_mp && _mp.locationType === "km_range") {
    const km = [prog.block, prog.street].filter(Boolean).join(" — ");
    if (km) wrap.appendChild(fieldRow("النطاق (كم)", km));
  } else {
    const locParts = [prog.block ? `ق ${prog.block}` : "", prog.street ? `ش ${prog.street}` : ""].filter(Boolean).join(" / ");
    if (locParts) wrap.appendChild(fieldRow("القطعة / الشارع", locParts));
  }
  wrap.appendChild(fieldRow("سماكة القشط", prog.depth));
  wrap.appendChild(fieldRow("المساحة المطلوب قشطها (م²)", prog.area));
  if (prog.machines) wrap.appendChild(fieldRow("عدد ماكينات القشط", prog.machines));
  if (prog.priority) wrap.appendChild(fieldRow("الأولوية", prog.priority));
  wrap.appendChild(fieldRow("التاريخ المطلوب", prog.requestedDate));
  wrap.appendChild(fieldRow("اسم المهندس", prog.engineer));
  if (prog.engNotes) wrap.appendChild(fieldRow("ملاحظات", prog.engNotes));
  return wrap;
}

// Audit trail timeline.
function millingTimeline(audit) {
  const wrap = el("div"); wrap.style.cssText = "margin-top:.6rem;";
  (audit || []).forEach(ev => {
    const row = el("div"); row.style.cssText = "border-right:3px solid var(--green);padding:.3rem .7rem;margin-bottom:.5rem;background:var(--surface-2);border-radius:4px;";
    const top = el("div"); top.style.cssText = "font-weight:700;font-size:.82rem;";
    top.textContent = `${millingActionLabel(ev.action)} — ${ev.by || ""} (${millingRoleLabel(ev.role)})`;
    const ts = el("div"); ts.style.cssText = "font-size:.7rem;color:var(--text-3);";
    ts.textContent = (ev.ts || "").replace("T", " ").slice(0, 16);
    row.appendChild(top); row.appendChild(ts);
    if (ev.note) { const n = el("div"); n.style.cssText = "font-size:.78rem;color:var(--text-2);margin-top:.2rem;"; n.textContent = `« ${ev.note} »`; row.appendChild(n); }
    wrap.appendChild(row);
  });
  return wrap;
}

// ── Engineer home — my programs + new submission ──────────────────
async function renderMillingEngineerHome(engName) {
  setEngineerSession(engName);
  const main = renderShell("برنامج القشط — المهندس"); main.innerHTML = "";

  const head = el("div", "card");
  const hr = el("div"); hr.style.cssText = "display:flex;justify-content:space-between;align-items:center;";
  const hi = el("div"); hi.innerHTML = `<div style="font-weight:700">${engName}</div><div style="font-size:.75rem;color:var(--text-3)">بوابة برامج القشط</div>`;
  const out = el("button", "btn-secondary"); out.type = "button"; out.textContent = "خروج"; out.style.width = "auto";
  out.addEventListener("click", () => { clearEngineerSession(); location.href = location.href.split("?")[0] + "?millingRole=engineer"; });
  hr.appendChild(hi); hr.appendChild(out); head.appendChild(hr);

  const tabs = el("div", "history-tabs");
  const tMine = el("button", "history-tab active"); tMine.type = "button"; tMine.textContent = "برامجي";
  const tNew  = el("button", "history-tab");        tNew.type  = "button"; tNew.textContent  = "برنامج جديد";
  tabs.appendChild(tMine); tabs.appendChild(tNew); main.appendChild(tabs);

  const body = el("div"); main.appendChild(body);

  let activeTab = "mine";
  async function showMine() {
    activeTab = "mine";
    tMine.classList.add("active"); tNew.classList.remove("active");
    body.innerHTML = "";
    const info = el("div", "info-box"); info.textContent = "جارٍ تحميل برامجك…"; body.appendChild(info);
    const data = await millingGet({ millingByEngineer: engName });
    if (activeTab !== "mine") return;   // user switched tabs while loading
    body.innerHTML = "";
    const progs = (data.programs || []).sort((a, b) => String(b.submittedAt).localeCompare(String(a.submittedAt)));
    if (!progs.length) { const e = el("div", "info-box"); e.textContent = "لا توجد برامج بعد — ابدأ ببرنامج جديد."; body.appendChild(e); return; }
    progs.forEach(prog => body.appendChild(millingProgramCard(prog, engName, showMine)));

  function showNew() {
    activeTab = "new";
    tNew.classList.add("active"); tMine.classList.remove("active");

    // which would detach the `body` that showMine writes into.
    body.appendChild(renderMillingProgramForm(engName, null, () => renderMillingEngineerHome(engName)));
  }
  tMine.addEventListener("click", showMine);
  tNew.addEventListener("click", showNew);
  showMine();

// A single program card in the engineer's list.
function millingProgramCard(prog, engName, onChange) {
  const card = el("div", "card");
  const top = el("div"); top.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;";
  const id = el("div"); id.style.cssText = "font-weight:700;font-size:.9rem;"; id.textContent = prog.programId;
  top.appendChild(id); top.appendChild(millingStatusBadge(prog.status)); card.appendChild(top);

  const prow = el("div"); prow.style.cssText = "margin-bottom:.4rem;"; prow.appendChild(millingPriorityBadge(prog.priority)); card.appendChild(prow);
  card.appendChild(millingDetails(prog));

  if (prog.status === MILL_STATUS.rejected && prog.pmNote) {
    const rej = el("div"); rej.style.cssText = "margin-top:.5rem;padding:.5rem .7rem;background:#fdecea;border-radius:6px;color:#D32F2F;font-size:.8rem;";
    rej.innerHTML = `<strong>سبب الرفض:</strong> ${prog.pmNote}`; card.appendChild(rej);
  }

  const actions = el("div"); actions.style.cssText = "display:flex;gap:.5rem;margin-top:.7rem;";
  const view = el("a", "btn-secondary"); view.textContent = "عرض / طباعة"; view.style.cssText = "width:auto;text-decoration:none;text-align:center;";
  view.href = `${location.href.split("?")[0]}?millingReport=${encodeURIComponent(prog.programId)}`; view.target = "_blank";
  actions.appendChild(view);

  const editable = prog.status === MILL_STATUS.pending || prog.status === MILL_STATUS.rejected;
  if (editable && prog.engineer === engName) {
    const edit = el("button", "btn-primary"); edit.type = "button"; edit.style.width = "auto";
    edit.textContent = prog.status === MILL_STATUS.rejected ? "تعديل وإعادة تقديم" : "تعديل";
    edit.addEventListener("click", () => {
      const main = document.getElementById("main-content"); if (!main) return;
      main.innerHTML = ""; main.appendChild(renderMillingProgramForm(engName, prog, () => renderMillingEngineerHome(engName)));
    });
    actions.appendChild(edit);
  }
  card.appendChild(actions);
  return card;
}

// ── Submission / revision form ────────────────────────────────────
function renderMillingProgramForm(engName, existing, onDone) {
  const card = el("div", "card");
  card.appendChild(sectionTitle(existing ? "تعديل برنامج القشط" : "برنامج قشط جديد"));

  if (existing && existing.status === MILL_STATUS.rejected && existing.pmNote) {
    const rej = el("div"); rej.style.cssText = "margin-bottom:.8rem;padding:.6rem .8rem;background:#fdecea;border-radius:6px;color:#D32F2F;font-size:.82rem;";
    rej.innerHTML = `<strong>ملاحظة الرفض من مدير المشروع:</strong><br>${existing.pmNote}`; card.appendChild(rej);
  }

  // Project (drives the site list)
  const { group: gProj, input: projInput } = fieldGroup("المشروع", select(millingAllProjects().map(p => p.name), "اختر المشروع"), true);
  card.appendChild(gProj);

  // Site (rebuilt when project changes)
  const siteWrap = el("div");
  let siteInput = null;
  function buildSite() {
    siteWrap.innerHTML = "";
    const proj = millingProjectByName(projInput.value);
    const { group, input: s } = fieldGroup("الموقع", select((proj && proj.sites) || [], "اختر الموقع"), true);
    siteInput = s; siteWrap.appendChild(group);
    if (existing && existing.site) siteInput.value = existing.site;
  }
  buildSite();
  projInput.addEventListener("change", () => { buildSite(); buildMillingLoc(); refreshMillingWO(); });
  card.appendChild(siteWrap);

  // Location — block + street, or a named street picked from the site's list
  // (same named streets as the asphalt module). Toggle appears only for sites
  // that have named streets defined.
  const locWrap = el("div");
  let locMode = "blocks";                 // "blocks" | "named"
  let getMillingLoc = () => ({ block: "", street: "" });
  function millingNamed() {
    const proj = millingProjectByName(projInput.value);
    return (proj && proj.namedStreets && siteInput && proj.namedStreets[siteInput.value]) || [];
  }
  function buildMillingLoc() {
    locWrap.innerHTML = "";
    const projLt = millingProjectByName(projInput.value);
    if (projLt && projLt.locationType === "km_range") {
      const r = el("div", "field-row-2");
      const { group: gF, input: kmFrom } = fieldGroup("من الكيلومتر", input("text", "مثال: 12.5", "decimal"), false);
      const { group: gT, input: kmTo }   = fieldGroup("إلى الكيلومتر", input("text", "مثال: 14.0", "decimal"), false);
      r.appendChild(gF); r.appendChild(gT); locWrap.appendChild(r);
      kmFrom.addEventListener("input", refreshMillingWO);
      kmTo.addEventListener("input", refreshMillingWO);
      getMillingLoc = () => ({ block: kmFrom.value.trim(), street: kmTo.value.trim() });
      return;
    }
    const named = millingNamed();
    if (!named.length) locMode = "blocks";
    if (named.length) {
      const toggle = el("div", "history-tabs"); toggle.style.marginBottom = ".6rem";
      const tB = el("button", "history-tab" + (locMode === "blocks" ? " active" : "")); tB.type = "button"; tB.textContent = "قطعة وشارع";
      const tN = el("button", "history-tab" + (locMode === "named"  ? " active" : "")); tN.type = "button"; tN.textContent = "اسم الشارع";
      toggle.appendChild(tB); toggle.appendChild(tN); locWrap.appendChild(toggle);
      tB.addEventListener("click", () => { if (locMode === "blocks") return; locMode = "blocks"; buildMillingLoc(); refreshMillingWO(); });
      tN.addEventListener("click", () => { if (locMode === "named")  return; locMode = "named";  buildMillingLoc(); refreshMillingWO(); });
    }
    if (locMode === "named") {
      const { group, input: s } = fieldGroup("اسم الشارع / الجادة", select(named, "اختر الشارع"), false);
      locWrap.appendChild(group);
      s.addEventListener("change", refreshMillingWO);
      getMillingLoc = () => ({ block: "", street: s.value.trim() });
    } else {
      const r = el("div", "field-row-2");
      const { group: gB, input: b }  = fieldGroup("القطعة", input("text", "رقم القطعة", "numeric"), false);
      const { group: gS, input: st } = fieldGroup("الشارع / الجادة", input("text", "اختياري"), false);
      r.appendChild(gB); r.appendChild(gS); locWrap.appendChild(r);
      b.addEventListener("input", refreshMillingWO);
      st.addEventListener("input", refreshMillingWO);
      getMillingLoc = () => ({ block: b.value.trim(), street: st.value.trim() });
    }
  }
  card.appendChild(locWrap);

  // Work order — picker of active contract orders, filtered by the chosen site.
  function refreshMillingWO() {}   // no-op — WO field removed (returns as locked auto-fill later)
  siteWrap.addEventListener("change", () => { buildMillingLoc(); refreshMillingWO(); });
  buildMillingLoc();
  refreshMillingWO();

  const { group: gDepth, input: depthInput } = fieldGroup("سماكة القشط", select((CONFIG.millingDepths || []).map(d => d.label), "اختر السماكة"), true);
  card.appendChild(gDepth);

  const row2 = el("div", "field-row-2");
  const { group: gArea, input: areaInput } = fieldGroup("المساحة المطلوب قشطها (م²)", input("number", "0", "decimal"), true);
  areaInput.step = "0.01";
  const { group: gDate, input: dateInput } = fieldGroup("التاريخ المطلوب", input("date", ""), true);
  row2.appendChild(gArea); row2.appendChild(gDate); card.appendChild(row2);

  const row3 = el("div", "field-row-2");
  const { group: gMach, input: machInput } = fieldGroup("عدد ماكينات القشط المطلوبة", input("number", "1", "numeric"), true);
  machInput.min = "1"; machInput.step = "1";
  const { group: gPrio, input: prioInput } = fieldGroup("الأولوية", select(CONFIG.millingPriorities || [], "اختر الأولوية"), true);
  row3.appendChild(gMach); row3.appendChild(gPrio); card.appendChild(row3);

  const { group: gNotes, input: notesInput } = fieldGroup("ملاحظات", textarea("قيود، صعوبات وصول، إلخ..."), false);
  card.appendChild(gNotes);

  // Engineer (locked)
  const { group: gEng, input: engInput } = fieldGroup("اسم المهندس", input("text", ""), true);
  engInput.value = engName; engInput.readOnly = true; engInput.style.background = "var(--surface-2)";
  card.appendChild(gEng);

  // Prefill on edit
  if (existing) {
    projInput.value = existing.project || ""; buildSite();
    if (existing.site) siteInput.value = existing.site;
    locMode = (existing.street && millingNamed().indexOf(existing.street) >= 0) ? "named" : "blocks";
    buildMillingLoc();
    if (locMode === "named") {
      const sel = locWrap.querySelector("select"); if (sel) sel.value = existing.street || "";
    } else {
      const ins = locWrap.querySelectorAll("input");
      if (ins[0]) ins[0].value = existing.block || "";
      if (ins[1]) ins[1].value = existing.street || "";
    }
    depthInput.value = existing.depth || "";
    areaInput.value = existing.area || ""; machInput.value = existing.machines || "";
    dateInput.value = existing.requestedDate || "";
    prioInput.value = existing.priority || ""; notesInput.value = existing.engNotes || "";
  }

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none"; card.appendChild(errDiv);
  const btn = el("button", "btn-primary"); btn.type = "button"; btn.textContent = existing ? "إعادة التقديم" : "تقديم البرنامج"; card.appendChild(btn);

  btn.addEventListener("click", async () => {
    const depth = millingDepthByLabel(depthInput.value);
    const loc = getMillingLoc();
    const data = {
      project: projInput.value,
      workOrder: "",
      site: siteInput ? siteInput.value : "",
      block: loc.block, street: loc.street,
      depth: depthInput.value, itemCode: depth ? depth.code : "",
      area: areaInput.value.trim(), machines: machInput.value.trim(),
      requestedDate: dateInput.value, priority: prioInput.value,
      engineerName: engName, notes: notesInput.value.trim(),
    };
    const required = ["project", "site", "depth", "area", "machines", "requestedDate", "priority"];
    if (required.some(k => !data[k])) { errDiv.textContent = "يرجى تعبئة جميع الحقول المطلوبة"; errDiv.style.display = "block"; return; }
    errDiv.style.display = "none"; btn.disabled = true; btn.textContent = "جارٍ الإرسال…";

    const programId = existing ? existing.programId : millingNewProgramId();
    try {
      if (existing) await dbMillingRevise({ programId, ...data });
      else          await dbMillingSubmit({ programId, ...data });
      renderMillingSubmitSuccess(programId, !!existing, () => (onDone ? onDone() : renderMillingEngineerHome(engName)));
    } catch {
      btn.disabled = false; btn.textContent = existing ? "إعادة التقديم" : "تقديم البرنامج";
      errDiv.textContent = "حدث خطأ، يرجى المحاولة مجدداً"; errDiv.style.display = "block";
    }
  });

  return card;
}

// Apply a status change, then refresh. The database write is confirmed

function millingPMCard(prog, pmName, onChange) {

  const top = el("div"); top.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;";
  const id = el("div"); id.style.cssText = "font-weight:700;font-size:.9rem;"; id.textContent = prog.programId;

  card.appendChild(millingDetails(prog));

  const actions = el("div"); actions.style.cssText = "display:flex;gap:.5rem;margin-top:.7rem;";

  reject.addEventListener("click", () => {

    });
  });
  return card;
}

function getMatSession()     { try { return JSON.parse(sessionStorage.getItem("mat_session") || "null"); } catch { return null; } }
function setMatSession(name)  { sessionStorage.setItem("mat_session", JSON.stringify({ name, ts: Date.now() })); }
function clearMatSession()    { sessionStorage.removeItem("mat_session"); }

function matReceiverByName(name) { return (CONFIG.materialReceivers || []).find(r => r.name === name) || null; }
function matCatByName(cat)       { return (CONFIG.materialCatalog || []).find(c => c.category === cat) || null; }

// Materials reads — same shapes as the old endpoints, from material_receipts.
async function matGet(params) {
  try {
    let filter = "";
    if (params.materialsByReceiver) filter = `receiver=${sbEq(params.materialsByReceiver)}&`;
    else if (!params.materialsAll) return {};
    const rows = await sbGet(`material_receipts?${filter}order=ts.desc&limit=500`);
    return { receipts: rows.map(materialRowToUI) };
  } catch { return {}; }
}

// Materials write: photo to Storage first, then the receipt row (unique
// receipt_id is the duplicate guard). A row is never written without its photo.
async function dbSubmitMaterialReceipt(p) {
  const photoUrl = await sbUploadPhoto(`${p.receiptId}.jpg`, p.photoData);
  return sbInsert("material_receipts", {
    receipt_id: p.receiptId, receiver: p.receiverName || "", project: p.project || "",
    site: p.site || "", work_order: p.workOrder || "", block: p.block || "",
    street: p.street || "", category: p.category || "", material: p.material || "",
    quantity: parseFloat(p.quantity) || null, unit: p.unit || "",
    supplier: p.supplier || "", subcontractor: p.subcontractor || "",
    photo_url: photoUrl, remarks: p.remarks || "",
  });
}
// Client-side unique id — the no-cors POST can't read a server-assigned id.
function matNewReceiptId() {
  return `MAT-${new Date().getFullYear()}-${Date.now().toString(36).slice(-5).toUpperCase()}`;
}

// Compress a captured/selected image to a JPEG data-URL (max 1280px, q0.7) so
// the base64 payload rides comfortably inside the no-cors POST body.
function matCompressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const max = 1280;
        let { width: w, height: h } = img;
        if (w > max || h > max) { const s = Math.min(max / w, max / h); w = Math.round(w * s); h = Math.round(h * s); }
        const canvas = el("canvas"); canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

    }

    if (!named.length) locMode = "blocks";
    if (named.length) {
      const toggle = el("div", "history-tabs"); toggle.style.marginBottom = ".6rem";
      const tB = el("button", "history-tab" + (locMode === "blocks" ? " active" : "")); tB.type = "button"; tB.textContent = "قطعة وشارع";

      tN.addEventListener("click", () => { if (locMode === "named")  return; locMode = "named";  buildMatLoc(); refreshMatWO(); });
    }
    if (locMode === "named") {
      const { group, input: s } = fieldGroup("اسم الشارع / الجادة", select(named, "اختر الشارع"), false);
      locWrap.appendChild(group);
      s.addEventListener("change", refreshMatWO);
      getMatLoc = () => ({ block: "", street: s.value.trim() });
    } else {
      const r = el("div", "field-row-2");
      const { group: gB, input: b }  = fieldGroup("القطعة", input("text", "رقم القطعة", "numeric"), false);

  // Photo of the paper receipt (required). capture=environment opens the camera on mobile.
  const { group: gPhoto, input: photoInput } = fieldGroup("صورة الإيصال الورقي", input("file"), true, "التقط أو أرفق صورة سند الاستلام");

  // Remarks
  const { group: gRem, input: remInput } = fieldGroup("ملاحظات", textarea("اختياري..."), false);

  const { group: gRec, input: recInput } = fieldGroup("اسم المستلم", input("text", ""), true);

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none"; card.appendChild(errDiv);
  const btn = el("button", "btn-primary"); btn.type = "button"; btn.textContent = "تسجيل الاستلام"; card.appendChild(btn);

  btn.addEventListener("click", async () => {
    const loc = getMatLoc();
    const data = {
      project: projInput.value, site: siteInput ? siteInput.value : "",
      workOrder: liveMatWO,
      block: loc.block, street: loc.street,
      category: catInput.value, material: matInput ? matInput.value : "",
      quantity: qtyInput.value.trim(), unit: unitInput.value,
      supplier: supInput.value, subcontractor: subInput.value,
      receiverName: name, remarks: remInput.value.trim(),

    const required = ["project", "site", "category", "material", "quantity", "supplier", "subcontractor"];

    errDiv.style.display = "none"; btn.disabled = true; btn.textContent = "جارٍ الإرسال…";
