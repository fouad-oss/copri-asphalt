// ════════════════════════════════════════════════════════
// REFERENCE DATA — live-read, staff-editable (Ref — * Sheet tabs)
// Overlays the Sheet onto the built-in CONFIG defaults. Cached in localStorage
// and applied synchronously for an instant load; a background fetch refreshes
// the cache for the next open. Any failure falls back to cache, then defaults —
// so the app never breaks. Backend: setupReferenceTabs() / ?ref=1 in Code.gs.
// ════════════════════════════════════════════════════════
const REF_CACHE_KEY = "copri_ref_cache_v1";
let _lastRefJson = localStorage.getItem(REF_CACHE_KEY) || "";   // last payload applied

// True when it's safe to swap the screen out from under the user. Never
// re-render while they're typing into a form field (would wipe half-typed input).
function _refSafeToRerender() {
  const el = document.activeElement;
  if (!el) return true;
  const tag = (el.tagName || "").toLowerCase();
  return !(tag === "input" || tag === "select" || tag === "textarea");
}

function _refProjectCtx(projectName) {
  for (const cn in (CONFIG.companies || {})) {
    const c = CONFIG.companies[cn];
    if (c.projects && c.projects[projectName]) return { companyName: cn, company: c, project: c.projects[projectName] };
  }
  return null;
}
function _refUpsertPin(list, name, pin) {
  const f = (list || []).find(x => x.name === name);
  if (f) f.pin = pin; else list.push({ name, pin });
}
function _refBool(v) { return /^(1|true|نعم|yes|y)$/i.test(String(v || "").trim()); }
function _refCopriProjectNames() {
  const out = [];
  for (const cn in (CONFIG.companies || {})) {
    const c = CONFIG.companies[cn]; if (!c.isCopri) continue;
    for (const pn in (c.projects || {})) out.push(pn);
  }
  return out;
}

// Rebuild/overlay CONFIG from the aggregated reference payload (per-unit files).
// Datasets present in the sheet replace their baked default; absent → default kept.
function applyReferenceData(ref) {
  if (!ref) return;

  // Settings / thresholds / branding.
  const s = ref.settings || {};
  if (s.tempDropWarning !== undefined && s.tempDropWarning !== "") CONFIG.tempDropWarning = Number(s.tempDropWarning);
  if (s.weightShortage  !== undefined && s.weightShortage  !== "") CONFIG.weightShortage  = Number(s.weightShortage);
  if (s.maxWeight       !== undefined && s.maxWeight       !== "") CONFIG.maxWeight       = Number(s.maxWeight);
  if (s.projectName)   CONFIG.projectName   = s.projectName;
  if (s.projectNameEn) CONFIG.projectNameEn = s.projectNameEn;
  if (s.footerText)    CONFIG.footerText    = s.footerText;

  // Companies/projects — rebuilt from Clients + Client Projects + Project Info.
  if ((ref.clients || []).length) {
    const companies = {};
    (ref.clients || []).forEach(c => { if (c.company) companies[c.company] = { isCopri: _refBool(c.isCopri), projects: {} }; });
    (ref.clientProjects || []).forEach(r => {
      if (!r.company || !r.project) return;
      companies[r.company] = companies[r.company] || { isCopri: false, projects: {} };
      companies[r.company].projects[r.project] = { contract: r.contract || "", locationType: r.locationType || "block_street", allowNamedStreet: _refBool(r.allowNamedStreet), sites: [], namedStreets: {} };
    });
    (ref.projectInfo || []).forEach(pi => {
      if (!pi.company || !pi.project) return;
      companies[pi.company] = companies[pi.company] || { isCopri: true, projects: {} };
      const p = companies[pi.company].projects[pi.project] = companies[pi.company].projects[pi.project] || { sites: [], namedStreets: {} };
      if (pi.contract) p.contract = pi.contract;
      p.locationType = pi.locationType || p.locationType || "block_street";
      p.allowNamedStreet = _refBool(pi.allowNamedStreet);
    });
    CONFIG.companies = companies;
  }
  // Sites & named streets into their projects.
  (ref.sites || []).forEach(r => { const ctx = _refProjectCtx(r.project); if (ctx && r.site) { ctx.project.sites = ctx.project.sites || []; if (!ctx.project.sites.includes(r.site)) ctx.project.sites.push(r.site); } });
  (ref.streets || []).forEach(r => {
    const ctx = _refProjectCtx(r.project); if (!ctx || !r.site || !r.street) return;
    const p = ctx.project; p.namedStreets = p.namedStreets || {};
    p.namedStreets[r.site] = p.namedStreets[r.site] || [];
    if (!p.namedStreets[r.site].includes(r.street)) p.namedStreets[r.site].push(r.street);
    p.allowNamedStreet = true;
  });

  // Staff → asphalt engineers (per project) + material receivers + milling staff.
  if ((ref.staff || []).length) {
    const receivers = [], milling = [];
    (ref.staff || []).forEach(r => {
      if (!r.name) return;
      const fn = String(r.function || "").toLowerCase(), pin = String(r.pin || "");
      const asph = /asphalt|أسفلت/.test(fn) || /both|كلا/.test(fn);
      const civ  = /civil|مدني/.test(fn)   || /both|كلا/.test(fn);
      if (asph) {
        const ctx = _refProjectCtx(r.project);
        if (ctx) { const e = ctx.project.engineers = ctx.project.engineers || []; const f = e.find(x => x.name === r.name);
          if (f) { f.pin = pin; if (r.phone) f.phone = cleanPhone(r.phone); } else e.push({ name: r.name, pin, phone: cleanPhone(r.phone) }); }
      }
      if (civ) _refUpsertPin(receivers, r.name, pin);
      if (_refBool(r.milling)) _refUpsertPin(milling, r.name, pin);
    });
    if (receivers.length) CONFIG.materialReceivers = receivers;
    CONFIG.millingStaff = milling;   // reserved for milling-login wiring
  }

  // Clerks (Plant file).
  if ((ref.clerks || []).length) CONFIG.clerks = ref.clerks.filter(r => r.name).map(r => ({ name: r.name, pin: String(r.pin || "") }));

  // Work orders (active only) → contractWorkOrders.
  const wos = (ref.workOrders || []).filter(r => r.wo && (!r.status || /جاري|active/i.test(r.status)));
  if (wos.length) CONFIG.contractWorkOrders = wos.map(r => ({
    wo: String(r.wo), project: r.project || "", site: r.site || "", block: r.block || "", street: r.street || "",
    discipline: r.discipline || "", label: r.description || [r.site, r.block ? `قطعة ${r.block}` : "", r.discipline].filter(Boolean).join(" "),
  }));

  // Drivers (Copri + contractor; still editable at dispatch).
  const drv = (ref.drivers || []).filter(r => r.name);
  if (drv.length) CONFIG.copriDrivers = drv.map(r => ({ name: r.name, phone: cleanPhone(r.phone), truck: r.plate || "", company: r.company || "", copri: _refBool(r.copri) }));

  // Simple pick-lists.
  if ((ref.mixTypes || []).length)         CONFIG.mixTypes = ref.mixTypes;
  if ((ref.plants || []).length)           CONFIG.plants = ref.plants;
  if ((ref.transporters || []).length)     CONFIG.naqelOptions = ref.transporters;
  if ((ref.rejectionReasons || []).length) CONFIG.rejectionReasons = ref.rejectionReasons;
  if ((ref.suppliers || []).length)        CONFIG.materialSuppliers = ref.suppliers;
  if ((ref.subcontractors || []).length)   CONFIG.materialSubcontractors = ref.subcontractors;

  // Materials catalog (Category → items + unit).
  if ((ref.catalog || []).length) {
    const cats = {};
    ref.catalog.forEach(r => { if (!r.category || !r.item) return; const c = cats[r.category] = cats[r.category] || { category: r.category, unit: r.unit || "", items: [] }; c.items.push(r.item); if (r.unit && !c.unit) c.unit = r.unit; });
    const list = Object.keys(cats).map(k => cats[k]); if (list.length) CONFIG.materialCatalog = list;
  }

  // Milling machines / priorities / managers.
  if ((ref.machines || []).length)   CONFIG.millingMachines = ref.machines.map(r => ({ id: r.id, name: r.name, width: Number(r.width) || 1 }));
  if ((ref.priorities || []).length) CONFIG.millingPriorities = ref.priorities;
  if ((ref.managers || []).length) {
    CONFIG.projectManagers = [];
    ref.managers.forEach(r => {
      if (!r.name || !r.pin) return;
      const role = String(r.role || "").toLowerCase(), pin = String(r.pin);
      const projs = (r.projects || "").split(",").map(x => x.trim()).filter(Boolean);
      if (/marco|ماركو/.test(role)) CONFIG.marco = { name: r.name, pin };
      else CONFIG.projectManagers.push({ name: r.name, pin, projects: projs });
    });
  }
}

// Fetch the reference payload (one RPC, milliseconds); cache on success.
// The version-probe machinery the 15-second Sheets read forced on us is gone —
// the payload itself is cheap enough to pull and diff directly.
async function fetchReference(timeoutMs) {
  const data = await sbGet("rpc/ref_payload", timeoutMs || 15000);
  if (data && (data.streets || data.workOrders || data.settings)) {
    try { localStorage.setItem(REF_CACHE_KEY, JSON.stringify(data)); } catch (e) {}
  }
  return data;
}

// Seamless auto-update: pull the payload, apply + re-render only when it
// actually changed — and only when safe (not mid-form). Silent no-op on failure.
async function syncReferenceIfChanged() {
  let fresh;
  try { fresh = await fetchReference(15000); } catch (e) { return; }
  if (!fresh) return;
  const json = JSON.stringify(fresh);
  if (json === _lastRefJson) return;              // nothing changed
  applyReferenceData(fresh);
  _lastRefJson = json;
  if (_refSafeToRerender()) runRouter();          // re-render only if not mid-typing
}

// Manual refresh (🔄 in the header, on every portal): pull the latest reference
// data now, apply it, and re-render the current screen.
async function refreshReferenceData(btn) {
  if (btn) { btn.disabled = true; btn.classList.add("spin"); }
  try {
    const r = await fetchReference(15000);
    if (r) { applyReferenceData(r); _lastRefJson = JSON.stringify(r); }
  } catch (e) { /* keep current data */ }
  if (btn) { btn.disabled = false; btn.classList.remove("spin"); }
  runRouter();   // re-render the active screen with the fresh data
}

const _numFmt = (n) => new Intl.NumberFormat("en").format(n);
const _tonsFmt = (n) => _numFmt(Math.round(n)) + " ط";

// Horizontal bars scaled to the max value. items: [{name, value, cls?}].
function _dashBars(items, fmt) {
  const wrap = el("div", "hbars");
  const max = Math.max(1, ...items.map((x) => x.value));
  if (!items.length) { const e = el("div", "field-hint"); e.textContent = "لا توجد بيانات"; wrap.appendChild(e); return wrap; }
  items.forEach((x, i) => {
    const row = el("div", "hbar");
    row.setAttribute("data-tip", x.name + ": " + (fmt ? fmt(x.value) : x.value));
    const name = el("div", "hbar-name"); name.textContent = x.name; name.title = x.name;
    const track = el("div", "hbar-track");
    const fill = el("div", "hbar-fill" + (x.cls ? " " + x.cls : ""));
    fill.style.width = Math.max(3, Math.round((x.value / max) * 100)) + "%";
    fill.style.animationDelay = (i * 45) + "ms";   // staggered grow-in
    track.appendChild(fill);
    const val = el("div", "hbar-val"); val.textContent = fmt ? fmt(x.value) : x.value;
    row.appendChild(name); row.appendChild(track); row.appendChild(val);
    wrap.appendChild(row);
  });
  return wrap;
}

// Line + area trend over days. days: [{date, loads, tons}].
function _dashTrend(days, key, fmt) {
  const W = 320, H = 120, pl = 8, pr = 8, pt = 10, pb = 18, n = days.length;
  const max = Math.max(1, ...days.map((d) => d[key]));
  const iw = W - pl - pr, ih = H - pt - pb;
  const X = (i) => (n <= 1 ? pl + iw / 2 : pl + (i / (n - 1)) * iw);
  const Y = (v) => pt + ih - (v / max) * ih;
  const pts = days.map((d, i) => [X(i), Y(d[key])]);
  const poly = pts.map((p) => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  let area = "";
  if (pts.length) area = "M" + pts[0][0].toFixed(1) + "," + (pt + ih) + " " + pts.map((p) => "L" + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ") + " L" + pts[pts.length - 1][0].toFixed(1) + "," + (pt + ih) + " Z";
  const dots = days.map((d, i) => `<circle class="tr-dot" data-i="${i}" cx="${X(i).toFixed(1)}" cy="${Y(d[key]).toFixed(1)}" r="2.6"/>`).join("");
  const tickIdx = n <= 1 ? [0] : [0, Math.floor((n - 1) / 2), n - 1];
  const ticks = tickIdx.map((i) => {
    if (!days[i]) return "";
    const anchor = i === 0 ? "start" : (i === n - 1 ? "end" : "middle");
    const x = i === 0 ? pl : (i === n - 1 ? pl + iw : X(i));
    return `<text class="tr-tick" x="${x.toFixed(1)}" y="${H - 5}" text-anchor="${anchor}">${days[i].date.slice(5)}</text>`;
  }).join("");
  const svg = `<svg class="dash-trend" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="اتجاه يومي">`
    + `<line class="tr-axis" x1="${pl}" y1="${pt + ih}" x2="${pl + iw}" y2="${pt + ih}"/>`
    + (area ? `<path class="tr-area" d="${area}"/>` : "")
    + `<polyline class="tr-line" points="${poly}"/>${dots}${ticks}</svg>`;

  // Hover/tap tooltip: track the pointer, snap to the nearest day point.
  const wrap = el("div", "trend-wrap");
  wrap.innerHTML = svg;
  const svgEl = wrap.firstElementChild;
  const tip = el("div", "trend-tip"); wrap.appendChild(tip);
  const show = (i) => {
    const d = days[i]; if (!d) return;
    const r = svgEl.getBoundingClientRect();
    tip.textContent = `${d.date.slice(5)} — ${fmt ? fmt(d[key]) : d[key]}`;
    tip.style.left = (pts[i][0] / W) * r.width + "px";
    tip.style.top  = (pts[i][1] / H) * r.height + "px";
    tip.classList.add("on");
    svgEl.querySelectorAll(".tr-dot").forEach((c) => c.classList.toggle("hot", +c.getAttribute("data-i") === i));
  };
  const track = (e) => {
    const r = svgEl.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
    const x = ((cx - r.left) / r.width) * W;
    let best = 0, bd = Infinity;
    pts.forEach((p, i) => { const d2 = Math.abs(p[0] - x); if (d2 < bd) { bd = d2; best = i; } });
    show(best);
  };
  svgEl.addEventListener("mousemove", track);
  svgEl.addEventListener("touchstart", track, { passive: true });
  svgEl.addEventListener("mouseleave", () => {
    tip.classList.remove("on");
    svgEl.querySelectorAll(".tr-dot.hot").forEach((c) => c.classList.remove("hot"));
  });

  // Draw-in: measure the real line length once mounted, then transition.
  requestAnimationFrame(() => {
    try {
      const line = svgEl.querySelector(".tr-line");
      const L = line.getTotalLength();
      line.style.strokeDasharray = L; line.style.strokeDashoffset = L;
      requestAnimationFrame(() => {
        line.style.transition = "stroke-dashoffset .9s ease-out";
        line.style.strokeDashoffset = "0";
      });
    } catch (e) { /* draw-in is decorative */ }
  });
  return wrap;
}

// ── Dashboard state, filters, aggregation ──
let _dashCache = null;                       // fetched slim-row payload
let _dashRange = "today";                    // today | day | range | all
let _dashDay = null;                         // yyyy-mm-dd when _dashRange === "day"
let _dashFrom = null, _dashTo = null;        // yyyy-mm-dd pair when _dashRange === "range"
const DASH_RANGES = [["today", "اليوم"], ["day", "📅 يوم محدد"], ["range", "📆 فترة"], ["all", "الكل"]];
const _kdFmt = (n) => new Intl.NumberFormat("en", { maximumFractionDigits: 0 }).format(n) + " د.ك";

function _dashDayStr(dt) { const p = (n) => String(n).padStart(2, "0"); return dt.getFullYear() + "-" + p(dt.getMonth() + 1) + "-" + p(dt.getDate()); }
// Day-to-day range bounds, defaulting to the last 7 days; tolerates a
// reversed pair (user picks from > to) by swapping.
function _dashRangeBounds() {
  if (!_dashTo) _dashTo = _dashDayStr(new Date());
  if (!_dashFrom) _dashFrom = _dashDayStr(new Date(Date.now() - 6 * 864e5));
  return _dashFrom <= _dashTo ? [_dashFrom, _dashTo] : [_dashTo, _dashFrom];
}
// Single-day views (today / picked day) — the daily-quantities trend is
// meaningless with one point, so boards skip it.
const _dashSingleDay = () => _dashRange === "today" || _dashRange === "day";
// The calendar day a single-day view is looking at.
const _dashCurrentDay = () => (_dashRange === "day" ? (_dashDay || (_dashDay = _dashDayStr(new Date()))) : _dashDayStr(new Date()));
function _dashWindow(rows) {
  if (_dashSingleDay()) {
    const d = _dashCurrentDay();
    return (rows || []).filter((r) => r.d === d);
  }
  if (_dashRange === "range") {
    const [f, t] = _dashRangeBounds();
    return (rows || []).filter((r) => r.d >= f && r.d <= t);
  }
  return rows || [];
}
function _aggBy(rows, keyFn, valFn) {
  const map = {};
  rows.forEach((r) => { const k = keyFn(r); if (!k || k === "—") return; map[k] = (map[k] || 0) + (valFn ? valFn(r) : 1); });
  return Object.keys(map).map((k) => ({ name: k, value: Math.round(map[k] * 10) / 10 })).sort((a, b) => b.value - a.value);
}
function _aggDays(rows, valFn) {
  const map = {};
  rows.forEach((r) => { map[r.d] = (map[r.d] || 0) + (valFn ? valFn(r) : 1); });
  return Object.keys(map).sort().map((d) => ({ date: d, tons: Math.round(map[d] * 10) / 10 }));
}
const _sum = (rows, f) => rows.reduce((a, r) => a + (f(r) || 0), 0);

// ── Shared page pieces ──
function _dashKpis(main, items) {

// Back link + title + time-filter tabs; onChange re-renders the page.
function _dashPageHead(main, title, onChange) {
  const head = el("div");
  const back = el("button", "history-tab"); back.type = "button"; back.textContent = "◂ كل اللوحات";
  back.style.marginBottom = ".6rem";

  head.appendChild(h);
  const bar = el("div", "history-tabs"); bar.style.marginBottom = "1rem";
  DASH_RANGES.forEach(([key, label]) => {
    const b = el("button", "history-tab" + (key === _dashRange ? " active" : "")); b.type = "button"; b.textContent = label;
    b.addEventListener("click", () => { if (_dashRange === key) return; _dashRange = key; onChange(); });
    bar.appendChild(b);
  });
  head.appendChild(bar);
  // Specific-day picker: segment every board to one calendar day.
  if (_dashRange === "day") {
    bar.style.marginBottom = ".55rem";

  // Day-to-day range picker: from / to calendar days (inclusive).
  if (_dashRange === "range") {

    const dp = el("div", "dash-daypick dash-rangepick");
    const mk = (val, set) => {
      const di = input("date", "");
      di.value = val; di.max = _dashDayStr(new Date());
      di.addEventListener("change", () => { if (!di.value) return; set(di.value); onChange(); });
      return di;
    };
    const l1 = el("span"); l1.textContent = "من";
    const l2 = el("span"); l2.textContent = "إلى";
    dp.appendChild(l1); dp.appendChild(mk(f, (v) => { _dashFrom = v; }));
    dp.appendChild(l2); dp.appendChild(mk(t, (v) => { _dashTo = v; }));
    head.appendChild(dp);
  }
  main.appendChild(head);
}
function _dashFooter(main, D) {

const _stLegend = `<span><i style="background:var(--green)"></i> مقبولة</span><span><i style="background:var(--amber)"></i> قيد الانتظار</span><span><i style="background:var(--red)"></i> مرفوضة</span>`;

        body.appendChild(r);

    })
    .catch(() => { body.innerHTML = `<div class="error-msg" style="display:block">تعذّر تحميل التفاصيل — حاول مجدداً</div>`; });
}

// ── Entry: fetch once, then route to a page ──
function renderDashboard(page, projName) {
  const main = renderShell("لوحة المعلومات");
  // Accountant board reads material_receipts itself — no slim payload needed.
  if (page === "acct" && projName) { _dashAcct(main, projName); return; }
  if (_dashCache) { _dashRoute(main, _dashCache, page, projName); return; }
  const loading = el("div", "card");
  loading.innerHTML = `<div class="info-box">جارٍ تحميل البيانات…</div>`;
  main.appendChild(loading);
  sbGet("rpc/dash_payload")
    .then((d) => {
      if (!d || !d.dispatch) throw new Error("bad payload");
      _dashCache = d; main.innerHTML = ""; _dashRoute(main, d, page, projName);
    })
    .catch(() => { loading.innerHTML = `<div class="error-msg" style="display:block">تعذّر تحميل البيانات — تحقق من الاتصال وحاول مجدداً</div>`; });
}
function _dashRoute(main, data, page, projName) {
  if (page === "plant") return _dashPlant(main, data);
  if (page === "exec") return _dashExec(main, data);
  if (page === "project" && projName) return _dashProject(main, data, projName);
  return _dashHome(main);
}

// ── Reports: print-ready summary for a period (Supabase-era successor of
// the old Apps Script daily PDFs). Opens a window → browser print/PDF. ──
async function dbReportDayLoads(dayISO) {
  // Kuwait calendar day → UTC range (fixed +03, no DST).
  const start = new Date(dayISO + "T00:00:00+03:00");
  return sbGet(`dispatch_loads?ts=gte.${start.toISOString()}&ts=lt.${new Date(start.getTime() + 864e5).toISOString()}&order=ts.asc&limit=1000`);
}
// kind "day": a = yyyy-mm-dd · kind "range": a/b = from/to days (inclusive)
// kind "month": a = yyyy-mm (whole calendar month)
async function dashGenerateReport(kind, a, b) {
  if (!_dashCache) {
    try { const d = await sbGet("rpc/dash_payload"); if (d && d.dispatch) _dashCache = d; } catch (e) {}
  }
  if (!_dashCache) { alert("تعذّر تحميل البيانات — تحقق من الاتصال"); return; }
  const all = _dashCache.dispatch || [];
  const today = _dashDayStr(new Date());
  let from, to, label;
  if (kind === "day") {
    to = from = a || today;
    label = "يومي";
  } else if (kind === "range") {
    from = a || today; to = b || today;
    if (from > to) { const t = from; from = to; to = t; }
    label = "فترة";
  } else {
    const ym = a || today.slice(0, 7);
    const y = parseInt(ym.slice(0, 4), 10), m = parseInt(ym.slice(5, 7), 10);
    from = ym + "-01"; to = _dashDayStr(new Date(y, m, 0));   // day 0 of next month = month end
    let name = ym; try { name = new Date(y, m - 1, 1).toLocaleDateString("ar", { month: "long", year: "numeric" }); } catch (e) {}
    label = "شهر " + name;
  }
  const rows = all.filter((r) => r.d >= from && r.d <= to);
  let detail = null;
  if (kind === "day") { try { detail = await dbReportDayLoads(from); } catch (e) { /* summary still prints */ } }
  _openReport(label, from, to, rows, detail);
}
function _openReport(label, from, to, rows, detail) {
  const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;");
  const tons = _sum(rows, (r) => r.t), tonsRecv = _sum(rows, (r) => r.tr);
  const copri = rows.filter((r) => r.c === (_dashCache.copri || "كوبري"));
  const acc = copri.filter((r) => r.st === 1).length;
  const accPct = copri.length ? Math.round((acc / copri.length) * 100) : 0;
  const kpi = (v, l) => `<div class="rk"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  const table = (title, heads, body) => body
    ? `<h2>${title}</h2><table><thead><tr>${heads.map((h) => `<th>${h}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>` : "";
  const aggTable = (title, keyFn, cap) => {
    const ag = _aggBy(rows, keyFn, (r) => r.t).slice(0, cap || 100);
    const counts = {}; rows.forEach((r) => { const k = keyFn(r); if (k && k !== "—") counts[k] = (counts[k] || 0) + 1; });
    return table(title, ["البند", "الدروب", "الكمية (طن)"],
      ag.map((x) => `<tr><td>${esc(x.name)}</td><td>${_numFmt(counts[x.name] || 0)}</td><td>${_numFmt(x.value)}</td></tr>`).join(""));
  };
  // Per-day subtotals (multi-day reports only)
  let daysTable = "";
  if (from !== to) {
    const byDay = {};
    rows.forEach((r) => { (byDay[r.d] = byDay[r.d] || { n: 0, t: 0, tr: 0 }); byDay[r.d].n++; byDay[r.d].t += r.t || 0; byDay[r.d].tr += r.tr || 0; });
    daysTable = table("الكميات حسب اليوم", ["اليوم", "الدروب", "صادرة (طن)", "مستلمة (طن)"],
      Object.keys(byDay).sort().map((d) => `<tr><td>${d}</td><td>${_numFmt(byDay[d].n)}</td><td>${_numFmt(Math.round(byDay[d].t))}</td><td>${_numFmt(Math.round(byDay[d].tr))}</td></tr>`).join(""));
  }
  // Per-load detail (last-work-day report only)
  let detailTable = "";
  if (detail && detail.length) {
    detailTable = table(`تفاصيل الدروب (${detail.length})`,
      ["السند", "الوقت", "الشركة / المشروع", "الموقع", "الخلطة", "طن", "الحالة"],
      detail.map((d) => `<tr><td>${esc(d.note)}</td><td>${esc(fmtKW(d.ts).slice(11))}</td><td>${esc(d.company)} — ${esc(d.project)}</td><td>${esc(d.site)}${d.block ? " ق" + esc(d.block) : ""}${d.street ? " ش" + esc(d.street) : ""}</td><td>${esc(d.mix)}</td><td>${d.weight == null ? "—" : d.weight}</td><td>${esc(d.status)}</td></tr>`).join(""));
  }
  const html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>تقرير الإرساليات</title><style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @page { size: A4 portrait; margin: 12mm; }
  body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10pt; color: #1a1a1a; direction: rtl; padding: 8px; }
  .head { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #00A651; padding-bottom: 8px; margin-bottom: 12px; }
  .head img { height: 44px; }
  .head .t1 { font-size: 15pt; font-weight: 800; }
  .head .t2 { font-size: 9pt; color: #555; margin-top: 2px; }
  .rks { display: flex; gap: 8px; margin-bottom: 14px; }
  .rk { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; text-align: center; }
  .rk .v { font-size: 14pt; font-weight: 800; color: #007A3D; }
  .rk .l { font-size: 7.5pt; color: #555; margin-top: 2px; }
  h2 { font-size: 11pt; margin: 14px 0 6px; color: #007A3D; }
  table { width: 100%; border-collapse: collapse; font-size: 8.5pt; }
  th { background: #f0f6f2; border: 1px solid #cfe0d6; padding: 4px 6px; font-weight: 700; text-align: right; }
  td { border: 1px solid #e2e2e2; padding: 3.5px 6px; }
  tr:nth-child(even) td { background: #fafaf8; }

  @media screen { body { max-width: 800px; margin: auto; } }
  </style></head><body>
  <div class="head">
    <div><div class="t1">تقرير الإرساليات — ${label}</div>
    <div class="t2">${from === to ? "يوم " + from : "من " + from + " إلى " + to} · أُنشئ ${esc(fmtKW(new Date().toISOString()))}</div></div>
    <img src="${COPRI_LOGO}" alt="COPRI"/>
  </div>
  <div class="rks">
    ${kpi(_numFmt(rows.length), "عدد الدروب")}
    ${kpi(_numFmt(Math.round(tons)), "الكميات الصادرة (طن)")}
    ${kpi(_numFmt(Math.round(tonsRecv)), "الكميات المستلمة (طن)")}
    ${kpi(accPct + "٪", "نسبة الاستلام — كوبري")}
    ${kpi(rows.length ? (tons / rows.length).toFixed(1) : "0", "متوسط الحمولة (طن)")}
  </div>

  ${aggTable("الكميات حسب المشروع", (r) => r.p)}
  ${daysTable}
  ${aggTable("الكميات حسب الموقع", (r) => r.s, 15)}
  ${aggTable("الكميات حسب نوع الخلطة", (r) => r.m)}
  ${detailTable}
  <div class="foot">شركة كوبري للمشاريع الإنشائية — طُبع من منظومة التتبع الرقمي</div>
  </body></html>`;
  const w = window.open("", "_blank", "width=900,height=700");
  if (!w) { alert("يرجى السماح بالنوافذ المنبثقة لإنشاء التقرير"); return; }
  w.document.write(html); w.document.close();
  setTimeout(() => { try { w.focus(); w.print(); } catch (e) {} }, 500);
}

// ── Accountant board: itemized material deliveries for one project.
// Built for the project accountant — reads material_receipts directly
// (the slim dash payload drops rate, receipt id, photo and remarks,
// all of which the accountant needs for audit). ──
let _matAcctCache = {};   // project → receipt rows (+d Kuwait-day key)
async function _dashAcct(main, projName) {
  const rerender = () => { main.innerHTML = ""; _dashAcct(main, projName); };
  _dashPageHead(main, "محاسبة المواد — " + projName, rerender);
  let all = _matAcctCache[projName];
  if (!all) {
    const loading = el("div", "card");
    loading.innerHTML = `<div class="info-box">جارٍ تحميل التوريدات…</div>`;
    main.appendChild(loading);
    try {
      const raw = await sbGet(`material_receipts?project=${sbEq(projName)}&order=ts.desc&limit=2000`);
      all = raw.map((r) => ({ ...r, d: fmtKW(r.ts).slice(0, 10) }));
      _matAcctCache[projName] = all;
    } catch (e) {
      loading.innerHTML = `<div class="error-msg" style="display:block">تعذّر تحميل التوريدات — تحقق من الاتصال</div>`;
      return;
    }
    loading.remove();
  }
  const rows = _dashWindow(all);
  _dashKpis(main, [
    ["استلامات المواد", _numFmt(rows.length), "إيصال"],
    ["أصناف موردة", _numFmt(new Set(rows.map((r) => r.material).filter(Boolean)).size), "بند"],
    ["مقاولون من الباطن", _numFmt(new Set(rows.map((r) => r.subcontractor).filter(Boolean)).size), ""],
    ["موردون", _numFmt(new Set(rows.map((r) => r.supplier).filter(Boolean)).size), ""],
  ]);

  // The core: the delivery-by-delivery record, newest first, with the
  // paper-receipt photo link for audit.
  const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;");
  const listBody = el("div");
  const printBtn = el("button", "btn-secondary rep-go"); printBtn.type = "button";
  printBtn.textContent = "🖨️ طباعة كشف";
  printBtn.style.marginBottom = ".5rem";
  printBtn.addEventListener("click", () => _openMatReport(projName, rows));
  listBody.appendChild(printBtn);
  if (!rows.length) {
    const ib = el("div", "info-box"); ib.textContent = "لا توجد توريدات مواد في هذه الفترة";
    listBody.appendChild(ib);
  }
  const moreBtn = el("button", "btn-secondary"); moreBtn.type = "button";
  moreBtn.style.marginTop = ".6rem";
  let shown = 0;
  const CHUNK = 60;
  const matRow = (r) => {
    const row = el("div", "trip-row");
    const loc = `${esc(r.site)}${r.block ? " ق" + esc(r.block) : ""}${r.street ? " ش" + esc(r.street) : ""}`;
    const links = [];
    if (r.receipt_id) links.push(esc(r.receipt_id));
    if (r.photo_url) links.push(`<a href="${esc(r.photo_url)}" target="_blank" rel="noopener">🧾 صورة الإيصال</a>`);
    if (r.remarks) links.push(esc(r.remarks));
    row.innerHTML = `
      <div class="trip-main">
        <span class="trip-note">${esc(r.material) || "—"}</span>
        <span class="mat-qty">${r.quantity == null ? "—" : esc(r.quantity)} ${esc(r.unit)}</span>
      </div>
      <div class="trip-sub">${esc(fmtKW(r.ts))} · ${esc(r.category) || "—"} · ${loc}</div>
      <div class="trip-sub">المورد: ${esc(r.supplier) || "—"} · المقاول: ${esc(r.subcontractor) || "—"} · المستلم: ${esc(r.receiver) || "—"}</div>
      ${links.length ? `<div class="trip-sub">${links.join(" · ")}</div>` : ""}`;
    return row;
  };
  const renderChunk = () => {
    rows.slice(shown, shown + CHUNK).forEach((r) => listBody.insertBefore(matRow(r), moreBtn));
    shown = Math.min(rows.length, shown + CHUNK);
    moreBtn.style.display = shown < rows.length ? "" : "none";
    moreBtn.textContent = `عرض المزيد (${_numFmt(rows.length - shown)})`;
  };
  listBody.appendChild(moreBtn);
  renderChunk();
  _dashCard(main, `سجل التوريدات (${_numFmt(rows.length)})`, listBody);

  _dashCard(main, "المواد حسب الفئة (استلامات)", _dashBars(_aggBy(rows, (r) => r.category).slice(0, 10), _numFmt));
  _dashCard(main, "حسب المقاول من الباطن (استلامات)", _dashBars(_aggBy(rows, (r) => r.subcontractor).slice(0, 10), _numFmt));
  _dashCard(main, "حسب المورد (استلامات)", _dashBars(_aggBy(rows, (r) => r.supplier).slice(0, 10), _numFmt));
  _dashCard(main, "الكميات حسب البند", _dashBars(
    _aggBy(rows, (r) => (r.material || "—") + (r.unit ? " (" + r.unit + ")" : ""), (r) => r.quantity || 0).slice(0, 12), _numFmt));
  _dashCard(main, "حسب المستلم (استلامات)", _dashBars(_aggBy(rows, (r) => r.receiver).slice(0, 10), _numFmt));
}

// Print-ready itemized materials statement for the accountant —
// same window→print/PDF flow as the dispatch reports.
function _openMatReport(projName, rows) {
  if (!rows.length) { alert("لا توجد توريدات في هذه الفترة"); return; }
  const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;");
  const days = rows.map((r) => r.d);
  const from = days.reduce((a, b) => (a < b ? a : b)), to = days.reduce((a, b) => (a > b ? a : b));
  const kpi = (v, l) => `<div class="rk"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  const ordered = rows.slice().sort((a, b) => (a.ts < b.ts ? -1 : 1));
  const detail = ordered.map((r) => `<tr>
    <td>${esc(fmtKW(r.ts))}</td><td>${esc(r.receipt_id)}</td><td>${esc(r.category)}</td><td>${esc(r.material)}</td>
    <td>${r.quantity == null ? "—" : esc(r.quantity)}</td><td>${esc(r.unit)}</td>
    <td>${esc(r.supplier)}</td><td>${esc(r.subcontractor)}</td><td>${esc(r.receiver)}</td>
    <td>${esc(r.site)}${r.block ? " ق" + esc(r.block) : ""}${r.street ? " ش" + esc(r.street) : ""}</td>
  </tr>`).join("");

// ── Exec board: top-level management view across all units ──
function _dashExec(main, data) {
  const rerender = () => { main.innerHTML = ""; _dashExec(main, data); };
  _dashPageHead(main, "لوحة الإدارة العامة", rerender);
  const rows = _dashWindow(data.dispatch);
  const copriRows = rows.filter((r) => r.c === data.copri);
  const mats = _dashWindow(data.materials);
  const tons = _sum(rows, (r) => r.t), copriTons = _sum(copriRows, (r) => r.t);
  const acc = copriRows.filter((r) => r.st === 1).length;
  // Acceptance excludes non-Copri clients: accepted / total dispatched to Copri projects.
  const accPct = copriRows.length ? Math.round((acc / copriRows.length) * 100) : 0;
  _dashKpis(main, [
    ["الكمية الإجمالية (طن)", _numFmt(Math.round(tons)), _numFmt(rows.length) + " درب"],
    ["كميات كوبري (طن)", _numFmt(Math.round(copriTons)), "مشاريعنا"],
    ["كميات الغير (طن)", _numFmt(Math.round(tons - copriTons)), "عملاء المصنع"],
    ["نسبة الاستلام — كوبري", accPct + "٪", acc + " مستلمة من " + copriRows.length],
  ]);
  _dashCard(main, "الكميات حسب المشروع (طن)", _dashBars(_aggBy(rows, (r) => r.p, (r) => r.t).slice(0, 8), _tonsFmt));
  if (!_dashSingleDay()) {
    const tw = el("div"); tw.appendChild(_dashTrend(_aggDays(rows, (r) => r.t), "tons", _tonsFmt));
    _dashCard(main, "الكميات اليومية (طن)", tw);
  }
  _dashCard(main, "حالة استلام الأسفلت — مشاريع كوبري", _dashStatusBars(copriRows));
  // Quality flags (confirmed receipts only).
  const wShort = copriRows.filter((r) => r.dw != null && r.dw <= -CONFIG.weightShortage).length;
  const tDrop = copriRows.filter((r) => r.dt != null && r.dt <= -CONFIG.tempDropWarning).length;
  const dwArr = copriRows.filter((r) => r.dw != null), dtArr = copriRows.filter((r) => r.dt != null);
  const avgDw = dwArr.length ? (_sum(dwArr, (r) => r.dw) / dwArr.length).toFixed(2) : "0";
  const avgDt = dtArr.length ? (_sum(dtArr, (r) => r.dt) / dtArr.length).toFixed(1) : "0";
  const qBody = el("div"); const sr = el("div", "dash-stat-row");
  [
    [wShort + " شحنة", "نقص وزن (≤ -" + CONFIG.weightShortage + " ط)"],
    [avgDw + " ط", "متوسط فرق الوزن"],
    [tDrop + " شحنة", "انخفاض حرارة (≤ -" + CONFIG.tempDropWarning + "°)"],
    [avgDt + "°", "متوسط فرق الحرارة"],
  ].forEach((s) => { const d2 = el("div", "dash-stat"); d2.innerHTML = `<div class="v">${s[0]}</div><div class="l">${s[1]}</div>`; sr.appendChild(d2); });
  qBody.appendChild(sr);
  _dashCard(main, "جودة التسليم (الاستلامات المؤكدة)", qBody);
  if (mats.length) {
    _dashCard(main, "استلامات المواد حسب المشروع", _dashBars(_aggBy(mats, (m) => m.p).slice(0, 8), _numFmt));
  }
  _dashFooter(main, data);
}

// ── Kuwait wall-clock day labels ──
function plantKwISO(offsetDays) {
  return new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Kuwait" })
    .format(new Date(Date.now() + (offsetDays || 0) * 864e5));
}
function plantDayLabel(iso) {
  const d = new Date(iso + "T12:00:00+03:00");
  const wd = new Intl.DateTimeFormat("ar", { weekday: "long" }).format(d);
  const dt = new Intl.DateTimeFormat("ar", { day: "numeric", month: "long" }).format(d);
  const tag = iso === plantKwISO(0) ? " · اليوم" : iso === plantKwISO(1) ? " · غداً" : "";
  return `${wd} ${dt}${tag}`;
}
// Work-order items line for request cards (mix: qty × rate per row).
function reqItemsLines(r) {
  const items = Array.isArray(r.items) ? r.items : [];
  if (!items.length) return null;
  const d = el("div", "req-line");
  d.innerHTML = items.map((it) => `${it.mix}: <b>${it.qty} طن × ${it.rate} د.ك</b>`).join(" · ");
  return d;
}
function plantStatusChip(status) {
  const map = { "مخطط": ["rgba(0,166,81,.12)", "var(--green)"], "منفذ": ["var(--surface-2)", "var(--text-2)"],
                "ملغي": ["#fdecea", "var(--red)"], "قيد المراجعة": ["rgba(230,81,0,.12)", "var(--amber)"],
                "موافَق عليه": ["rgba(0,166,81,.12)", "var(--green)"], "مرفوض": ["#fdecea", "var(--red)"] };
  const [bg, fg] = map[status] || ["var(--surface-2)", "var(--text-2)"];
  const s = el("span", "plant-chip"); s.textContent = status || "—";
  s.style.background = bg; s.style.color = fg;
  return s;
}

// ── Tab 1: the plant dashboard, embedded (range tabs stay interactive) ──

async function plantTabDash(body) {
  body.innerHTML = "";
  const rep = el("div", "card");

  const today = _dashDayStr(new Date());
  const mkRow = (title) => { const r = el("div", "rep-row"); const t = el("span", "rep-row-lbl"); t.textContent = title; r.appendChild(t); return r; };
  const mkGo = (fn) => { const b = el("button", "btn-secondary rep-go"); b.type = "button"; b.textContent = "إنشاء"; b.addEventListener("click", fn); return b; };
  // Single day — defaults to the last work day once the payload is in.
  const dayRow = mkRow("تقرير يوم");
  const dayI = input("date", ""); dayI.value = today; dayI.max = today;
  dayRow.appendChild(dayI); dayRow.appendChild(mkGo(() => dashGenerateReport("day", dayI.value || today)));
  // Day-to-day period (replaces the fixed last-week window).
  const rgRow = mkRow("تقرير فترة");
  const fromI = input("date", ""); fromI.value = _dashDayStr(new Date(Date.now() - 6 * 864e5)); fromI.max = today;
  const toI = input("date", ""); toI.value = today; toI.max = today;
  const sep = el("span", "rep-sep"); sep.textContent = "إلى";
  rgRow.appendChild(fromI); rgRow.appendChild(sep); rgRow.appendChild(toI);
  rgRow.appendChild(mkGo(() => dashGenerateReport("range", fromI.value || today, toI.value || today)));
  // Calendar month (replaces the fixed last-30-days window).
  const moRow = mkRow("تقرير شهر");
  const moI = input("month", ""); moI.value = today.slice(0, 7); moI.max = today.slice(0, 7);
  moRow.appendChild(moI); moRow.appendChild(mkGo(() => dashGenerateReport("month", moI.value || today.slice(0, 7))));
  rep.appendChild(dayRow); rep.appendChild(rgRow); rep.appendChild(moRow);
  body.appendChild(rep);
  const setDayDefault = () => {
    const all = (_dashCache && _dashCache.dispatch) || [];
    if (all.length) dayI.value = all.map((r) => r.d).reduce((a, b) => (a > b ? a : b));
  };

  const box = el("div", "plant-dash-wrap"); body.appendChild(box);
  const paint = (data) => { box.innerHTML = ""; _dashPlant(box, data); };
  if (_dashCache) { setDayDefault(); paint(_dashCache); return; }
  const info = el("div", "info-box"); info.textContent = "جارٍ تحميل البيانات…"; box.appendChild(info);
  try {
    const d = await sbGet("rpc/dash_payload");
    if (!d || !d.dispatch) throw new Error("bad payload");
    _dashCache = d; setDayDefault(); paint(d);
  } catch {
    box.innerHTML = `<div class="error-msg" style="display:block">تعذّر تحميل البيانات — تحقق من الاتصال</div>`;
  }

async function plantTabPrograms(body, who) {

  const { group: gSite,   input: siteI }   = fieldGroup("الموقع", input("text", "مثال: مشرف"), true);
  const rowBS = el("div", "field-row-2");
  const { group: gBlock,  input: blockI }  = fieldGroup("القطعة", input("text", "اختياري", "numeric"), false);
  const { group: gStreet, input: streetI } = fieldGroup("الشارع", input("text", "رقم أو اسم"), false);
  rowBS.appendChild(gBlock); rowBS.appendChild(gStreet);
  // Mixes: one or more mix+loads pairs (multi-mix programs are common).
  const mixLbl = el("label"); mixLbl.textContent = "الخلطات وعدد السيارات";
  mixLbl.style.cssText = "display:block;margin-bottom:.35rem;";
  const mixRows = el("div");

  function addMixRow() {
    const row = el("div", "field-row-2"); row.style.marginBottom = ".5rem";
    const mixSel = select(CONFIG.mixTypes, "اختر النوع");
    const loadsIn = input("number", "عدد السيارات", "numeric");
    row.appendChild(mixSel); row.appendChild(loadsIn);
    mixRows.appendChild(row);
    mixRowInputs.push({ mixSel, loadsIn });
  }
  addMixRow();
  const moreMixBtn = el("button", "btn-ghost"); moreMixBtn.type = "button";
  moreMixBtn.textContent = "+ خلطة أخرى";
  moreMixBtn.style.cssText = "width:auto;font-size:.78rem;margin-bottom:.8rem;";
  moreMixBtn.addEventListener("click", addMixRow);

  const { group: gPlant, input: plantI } = fieldGroup("المصنع", select(CONFIG.plants, "اختر المصنع"), false);
  const rowT = el("div", "field-row-2");
  const { group: gLoadT, input: loadTI } = fieldGroup("موعد التحميل", input("time", ""), false);
  const { group: gPaveT, input: paveTI } = fieldGroup("موعد الفرش", input("time", ""), false);
  rowT.appendChild(gLoadT); rowT.appendChild(gPaveT);
  const { group: gNotes, input: notesI } = fieldGroup("ملاحظات", textarea("جهة التنسيق، تفاصيل…"), false);
  [gComp, gProj, gDate, gSite].forEach((g) => form.appendChild(g));
  form.appendChild(rowBS);
  form.appendChild(mixLbl); form.appendChild(mixRows); form.appendChild(moreMixBtn);
  form.appendChild(gPlant);
  form.appendChild(rowT); form.appendChild(gNotes);
  const addErr = el("div", "error-msg"); addErr.style.display = "none"; form.appendChild(addErr);
  const saveBtn = el("button", "btn-primary"); saveBtn.type = "button"; saveBtn.textContent = "حفظ البرنامج";
  form.appendChild(saveBtn);

  addBtn.addEventListener("click", () => {
    const open = form.style.display !== "none";
    form.style.display = open ? "none" : "block";
    addBtn.textContent = open ? "+ برنامج لعميل خارجي" : "إخفاء النموذج ▴";
  });
  saveBtn.addEventListener("click", async () => {
    if (!compI.value || !projI.value || !dateI.value || !siteI.value.trim()) {
      addErr.textContent = "الشركة والمشروع والتاريخ والموقع مطلوبة"; addErr.style.display = "block"; return;

      const r = await sbRpc("asphalt_program_submit", {
        p_work_date: dateI.value, p_company: compI.value, p_project: projI.value,
        p_site: siteI.value.trim(), p_block: blockI.value.trim(), p_street: streetI.value.trim(),
        p_mix: "", p_loads: null, p_mixes: mixes,
        p_plant: plantI.value || "", p_load_time: loadTI.value || "", p_pave_time: paveTI.value || "",
        p_notes: notesI.value.trim(), p_by: who,

      saveBtn.disabled = false; saveBtn.textContent = "حفظ البرنامج";

    listWrap.appendChild(e); return;
  }

  const today = plantKwISO(0);
  const upcoming = rows.filter(r => r.work_date >= today);
  const past     = rows.filter(r => r.work_date < today).reverse();
  const renderGroup = (list) => {
    let lastDate = null;
    list.forEach(r => {
      if (r.work_date !== lastDate) {
        lastDate = r.work_date;
        const h = el("div", "prog-day-head" + (r.work_date === today ? " today" : ""));
        h.textContent = plantDayLabel(r.work_date);
        listWrap.appendChild(h);
      }
      listWrap.appendChild(plantProgramCard(r, who, () => plantTabPrograms(body, who)));
    });
  };
  renderGroup(upcoming);
  if (past.length) {
    const ph = el("div", "prog-day-head"); ph.textContent = "الأيام السابقة"; ph.style.color = "var(--text-3)";
    listWrap.appendChild(ph);
    renderGroup(past);
  }
}

function plantProgramCard(p, who, refresh) {
  const cls = p.status === "ملغي" ? " cancelled" : p.status === "منفذ" ? " done" : "";
  const c = el("div", "card prog-card" + cls);

  const top = el("div", "prog-top");
  const mix = el("span", "prog-mix"); mix.textContent = p.mix || "خلطة غير محددة";
  top.appendChild(mix); top.appendChild(plantStatusChip(p.status));
  c.appendChild(top);

  const site = el("div", "prog-site");
  site.textContent = p.site + (p.block ? ` ق${p.block}` : "") + (p.street ? ` ش${p.street}` : "");
  c.appendChild(site);

  // External-client programs carry who the asphalt is for.
  if (p.company && p.company !== "كوبري") {
    const cl = el("div", "req-line");
    cl.textContent = `لـ ${p.company}${p.project ? " — " + p.project : ""}`;
    c.appendChild(cl);
  }

  const meta = el("div", "prog-meta");
  const item = (icon, label, val) => { if (!val) return; const s = el("span"); s.innerHTML = `${icon} ${label} <b>${val}</b>`; meta.appendChild(s); };
  // Multi-mix programs list the per-mix load split; single-mix shows the total.
  const mixes = Array.isArray(p.mixes) ? p.mixes : [];
  if (mixes.length > 1) {
    item("🚛", "", mixes.map((m) => `${m.loads || "؟"} × ${m.mix}`).join(" · "));
  } else {
    item("🚛", "", p.loads ? `${p.loads} سيارة` : "");
  }
  item("🏭", "", p.plant);
  item("⏱️", "تحميل", p.load_time);
  item("🛣️", "فرش", p.pave_time);
  c.appendChild(meta);

  if (p.notes) { const n = el("div", "field-hint"); n.style.marginTop = ".5rem"; n.textContent = p.notes; c.appendChild(n); }

  if (p.status === "مخطط") {
    const acts = el("div", "prog-actions");
    const doneB = el("button", "btn-secondary"); doneB.type = "button"; doneB.textContent = "تم التنفيذ ✓";
    const cancB = el("button", "btn-secondary"); cancB.type = "button"; cancB.textContent = "إلغاء ✕";
    cancB.style.color = "var(--red)";
    const act = async (status, btn) => {
      if (!confirm(status === "ملغي" ? "إلغاء هذا البرنامج؟ (سوء أحوال جوية / عطل مصنع…)" : "تأكيد تنفيذ هذا البرنامج؟")) return;
      doneB.disabled = cancB.disabled = true;
      try { await dbPlantProgramStatus(p.id, status, who); } catch {}
      refresh();
    };
    doneB.addEventListener("click", () => act("منفذ", doneB));
    cancB.addEventListener("click", () => act("ملغي", cancB));
    acts.appendChild(doneB); acts.appendChild(cancB); c.appendChild(acts);
  }
  return c;
}

async function plantTabRequests(body, who, justSent) {
  body.innerHTML = "";

    waBtn.innerHTML = `إبلاغ ${justSent.financeName} عبر WhatsApp &nbsp;💬`;
    const msg = encodeURIComponent(
      `طلب إضافة أمر عمل:\n` +
      `الشركة: ${justSent.company}\nالعميل: ${justSent.client}\n` +
      (justSent.contract ? `العقد: ${justSent.contract}\n` : "") +
      `الدفع: ${justSent.payment || "—"}\n` +
      (justSent.items || []).map((it) => `- ${it.mix}: ${it.qty} طن × ${it.rate} د.ك`).join("\n") + "\n" +
      (justSent.details ? `تفاصيل: ${justSent.details}\n` : "") +

      `للاعتماد: ${location.href.split("?")[0]}?financeRole=manager`
    );
    waBtn.addEventListener("click", () => window.open(`https://wa.me/${justSent.financePhone}?text=${msg}`, "_blank"));
    ok.appendChild(waBtn);
    body.appendChild(ok);
  }

  const formCard = el("div", "card");
  formCard.appendChild(sectionTitle("طلب إضافة أمر عمل"));
  const explain = el("div", "info-box");
  explain.textContent = "طلب أمر عمل جديد لاستلام الأسفلت — حدّد العميل والكميات وسعر الوحدة لكل خلطة. يُعتمد الطلب من المدير المالي، ويظهر العميل في نموذج الإرسال بعد الموافقة.";
  formCard.appendChild(explain);

  const companyNames = Object.keys(CONFIG.companies || {});
  const { group: gComp, input: compI } = fieldGroup("الشركة", select([...companyNames, "شركة أخرى / جديدة"], "اختر الشركة"), true);
  const { group: gCompNew, input: compNewI } = fieldGroup("اسم الشركة الجديدة", input("text", "اسم الشركة"), true);
  gCompNew.style.display = "none";
  compI.addEventListener("change", () => { gCompNew.style.display = compI.value === "شركة أخرى / جديدة" ? "" : "none"; });
  const { group: gClient,   input: clientI }   = fieldGroup("اسم العميل / المشروع", input("text", "مثال: مشروع صيانة الجهراء"), true);
  const { group: gContract, input: contractI } = fieldGroup("رقم العقد", input("text", "اختياري"), false);

  // Payment: cash / credit tick
  let payment = "";
  const payLbl = el("label"); payLbl.innerHTML = 'طريقة الدفع <span class="req">*</span>';
  payLbl.style.cssText = "display:block;margin-bottom:.35rem;";
  const payRow = el("div", "history-tabs"); payRow.style.marginBottom = "1rem";
  const mkPay = (label) => {
    const b = el("button", "history-tab"); b.type = "button"; b.textContent = label;
    b.addEventListener("click", () => {
      payment = label;
      [...payRow.children].forEach((x) => x.classList.toggle("active", x === b));
    });
    payRow.appendChild(b); return b;
  };
  mkPay("نقدي"); mkPay("آجل");

  // Work-order items: one mandatory row per mix type — quantity (tons)
  // and unit rate (KD/ton). Multi-mix orders add rows.
  const itemsLbl = el("label");
  itemsLbl.innerHTML = 'الخلطات — الكمية وسعر الوحدة <span class="req">*</span>';
  itemsLbl.style.cssText = "display:block;margin-bottom:.35rem;";
  const itemsHead = el("div");
  itemsHead.style.cssText = "display:flex;gap:.5rem;font-size:.7rem;color:var(--text-3);margin-bottom:.25rem;";
  itemsHead.innerHTML = `<span style="flex:1.4">نوع الخلطة</span><span style="flex:1">الكمية (طن)</span><span style="flex:1">سعر الطن (د.ك)</span>`;
  const itemRowsWrap = el("div");
  const itemRows = [];
  function addItemRow() {
    const row = el("div"); row.style.cssText = "display:flex;gap:.5rem;margin-bottom:.5rem;";
    const mixSel = select(CONFIG.mixTypes, "اختر النوع"); mixSel.style.flex = "1.4";
    const qtyIn  = input("number", "الكمية", "decimal"); qtyIn.style.flex = "1";
    const rateIn = input("number", "السعر", "decimal");  rateIn.style.flex = "1";
    row.appendChild(mixSel); row.appendChild(qtyIn); row.appendChild(rateIn);
    itemRowsWrap.appendChild(row);
    itemRows.push({ mixSel, qtyIn, rateIn });
  }
  addItemRow();
  const moreItemBtn = el("button", "btn-ghost"); moreItemBtn.type = "button";
  moreItemBtn.textContent = "+ خلطة أخرى";
  moreItemBtn.style.cssText = "width:auto;font-size:.78rem;margin-bottom:.8rem;";
  moreItemBtn.addEventListener("click", addItemRow);

  const { group: gDetails, input: detailsI } = fieldGroup("تفاصيل", textarea("الموقع، جهة التنسيق، سبب الإضافة…"), false);
  [gComp, gCompNew, gClient, gContract].forEach(g => formCard.appendChild(g));
  formCard.appendChild(payLbl); formCard.appendChild(payRow);
  formCard.appendChild(itemsLbl); formCard.appendChild(itemsHead);
  formCard.appendChild(itemRowsWrap); formCard.appendChild(moreItemBtn);
  formCard.appendChild(gDetails);
  const reqErr = el("div", "error-msg"); reqErr.style.display = "none"; formCard.appendChild(reqErr);
  const sendBtn = el("button", "btn-primary"); sendBtn.type = "button"; sendBtn.textContent = "إرسال الطلب للاعتماد 📨";
  formCard.appendChild(sendBtn);
  body.appendChild(formCard);

  sendBtn.addEventListener("click", async () => {
    const company = compI.value === "شركة أخرى / جديدة" ? compNewI.value.trim() : compI.value;

      reqErr.textContent = "الشركة واسم العميل وطريقة الدفع مطلوبة"; reqErr.style.display = "block"; return;
    }
    // Every started row must be complete; at least one row overall.
    const started = itemRows.filter((r) => r.mixSel.value || r.qtyIn.value || r.rateIn.value);
    const items = started.map((r) => ({
      mix: r.mixSel.value, qty: parseFloat(r.qtyIn.value) || 0, rate: parseFloat(r.rateIn.value) || 0,
    }));
    if (!items.length || items.some((it) => !it.mix || it.qty <= 0 || it.rate <= 0)) {
      reqErr.textContent = "لكل خلطة: النوع والكمية وسعر الوحدة مطلوبة"; reqErr.style.display = "block"; return;
    }
    reqErr.style.display = "none"; sendBtn.disabled = true; sendBtn.textContent = "جارٍ الإرسال…";
    try {
      const r = await dbPlantRequestSubmit({
        p_company: company, p_client: clientI.value.trim(), p_contract: contractI.value.trim(),
        p_payment: payment, p_details: detailsI.value.trim(), p_by: who, p_items: items,
      });
      if (!r.success) throw new Error(r.error || "failed");
      // Finance contact for the WhatsApp handoff (best-effort fetch).
      let fm = { name: "المدير المالي", phone: "96566445179" };
      try {
        const fms = await sbGet("finance_managers?active=eq.true&order=id&limit=1");
        if (fms.length) fm = { name: fms[0].name, phone: fms[0].phone || fm.phone };
      } catch (e) {}
      plantTabRequests(body, who, {
        company, client: clientI.value.trim(), contract: contractI.value.trim(),
        payment, details: detailsI.value.trim(), items,
        financeName: fm.name, financePhone: fm.phone,
      });
    } catch {
      sendBtn.disabled = false; sendBtn.textContent = "إرسال الطلب للاعتماد 📨";
      reqErr.textContent = "حدث خطأ — حاول مجدداً"; reqErr.style.display = "block";
    }
  });

  const listWrap = el("div"); body.appendChild(listWrap);
  const info = el("div", "info-box"); info.textContent = "جارٍ التحميل…"; listWrap.appendChild(info);
  let rows = [];
  try { rows = await dbPlantRequests(); } catch {}
  listWrap.innerHTML = "";
  if (!rows.length) {
    const e = el("div", "info-box"); e.textContent = "لا توجد طلبات سابقة.";
    listWrap.appendChild(e); return;
  }
  const h = el("div", "prog-day-head"); h.textContent = "الطلبات السابقة"; listWrap.appendChild(h);
  rows.forEach(r => {
    const c = el("div", "card req-card");
    const top = el("div", "prog-top");
    const client = el("div", "req-client"); client.textContent = r.client;
    top.appendChild(client); top.appendChild(plantStatusChip(r.status));
    c.appendChild(top);
    const l1 = el("div", "req-line");
    l1.textContent = r.company + (r.contract ? ` · عقد ${r.contract}` : "") + (r.payment ? ` · ${r.payment}` : "");
    c.appendChild(l1);
    const li = reqItemsLines(r); if (li) c.appendChild(li);
    const l2 = el("div", "req-line");
    l2.textContent = `طلبه ${r.requested_by || "—"} · ${fmtKW(r.created_at)}`;
    c.appendChild(l2);
    if (r.details) { const d = el("div", "field-hint"); d.style.marginTop = ".4rem"; d.textContent = r.details; c.appendChild(d); }
    if (r.office_note) {
      const n = el("div", "req-line"); n.innerHTML = `<strong>رد المكتب:</strong> ${r.office_note}`;
      c.appendChild(n);
    }
    listWrap.appendChild(c);
  });
}

  try { rows = await dbPlantRequests(); } catch (e) {}

  const pending = rows.filter((r) => r.status === "قيد المراجعة");

    c.appendChild(l1);
    const li = reqItemsLines(r); if (li) c.appendChild(li);
    const l2 = el("div", "req-line");
    l2.textContent = `طلبه ${r.requested_by || "—"} · ${fmtKW(r.created_at)}`;
    c.appendChild(l2);
    if (r.details) { const d = el("div", "field-hint"); d.style.marginTop = ".4rem"; d.textContent = r.details; c.appendChild(d); }

      const noteI = textarea("ملاحظة (اختياري — مطلوبة عند الرفض)");
      noteI.style.cssText = "margin-top:.6rem;min-height:44px;";

      const acts = el("div", "prog-actions");

      const noB = el("button", "btn-secondary"); noB.type = "button"; noB.textContent = "رفض ✕";

          noteI.style.borderColor = "var(--red)"; noteI.placeholder = "اذكر سبب الرفض"; return;
        }
        okB.disabled = noB.disabled = true;
        try {
          await sbRpc("recipient_request_decide", {
            p_id: r.id, p_decision: decision, p_by: who, p_note: noteI.value.trim(),
          });
        } catch (e) {}
        renderFinanceHome(who);
      };
      okB.addEventListener("click", () => decide("موافَق عليه"));

      acts.appendChild(okB); acts.appendChild(noB); c.appendChild(acts);

  const hPend = el("div", "prog-day-head today");

  if (decided.length) {
    const hLog = el("div", "prog-day-head"); hLog.textContent = "قرارات سابقة";
    listWrap.appendChild(hLog);
    decided.forEach((r) => listWrap.appendChild(reqCard(r, false)));
  }

// ── COMMITMENT PIPELINE MODULE (?rf=1) ──
// System of engagement for spend commitments (migration 0013): every
// work order / LPO / contract is born as a numbered RF-* request and
// approved into a WO-/LPO-/CON- commitment. Call-offs inside a live
// blanket LPO auto-approve server-side (request_submit); everything
// else waits in the head-office queue (request_decide). One portal,
// capability-based: requesters get the form + their requests; approvers
// also get the queue, the commitment register and the blanket board.
// Login is PIN-only via the pipeline_user_check RPC — pipeline_users
// has NO anon read policy, so PINs never reach the client (unlike the
// older portals). NOTE: the pipeline's WO- series is COST commitments
// to subcontractors; the ministry's work_orders (dispatch auto-fill)
// are a different thing entirely — never mix the two.
// ════════════════════════════════════════════════════════
const RF_TYPES = [
  ["WO",  "أمر عمل — مقاول (RF-WO)"],
  ["LPO", "أمر شراء — مورد (RF-LPO)"],
  ["CON", "عقد (RF-Contract)"],
];
function getPipeSession()  { try { return JSON.parse(sessionStorage.getItem("pipe_session") || "null"); } catch { return null; } }
function setPipeSession(u) { sessionStorage.setItem("pipe_session", JSON.stringify(u)); }

function pipeStatusChip(status) {
  const map = { "قيد المراجعة": ["rgba(230,81,0,.12)", "var(--amber)"],
                "معتمد": ["rgba(0,166,81,.12)", "var(--green)"],
                "مرفوض": ["#fdecea", "var(--red)"], "ملغي": ["var(--surface-2)", "var(--text-2)"],
                "نشط": ["rgba(0,166,81,.12)", "var(--green)"], "مغلق": ["var(--surface-2)", "var(--text-2)"],
                "مسودة": ["rgba(230,81,0,.12)", "var(--amber)"], "صادر": ["rgba(0,166,81,.12)", "var(--green)"] };

async function dbPipeMasters() {
  const [ccs, vendors, blankets, draw, cats] = await Promise.all([
    sbGet("cost_centers?active=eq.true&order=kind.desc,code"),
    sbGet("vendors?active=eq.true&order=name"),
    sbGet(`blanket_lpos?status=${sbEq("نشط")}&select=*,vendors(name),commitments!blanket_lpos_commitment_id_fkey(number)&order=id`),
    sbGet("blanket_drawdown"),
    sbGet("list_options?kind=eq.blanket_category&order=sort_order"),
  ]);
  const byId = {}; draw.forEach(d => { byId[d.blanket_id] = d; });
  blankets.forEach(b => { const d = byId[b.id] || {}; b.drawn = d.drawn || 0; b.remaining = d.remaining != null ? d.remaining : b.ceiling; });
  return { ccs, vendors, blankets, cats: cats.map(c => c.value) };
}
const PIPE_REQ_SELECT = "select=*,cost_centers(code,name_ar,name_en),vendors(name),commitments!commitment_requests_commitment_fkey(number)";

// ── Tab: new request ──
async function pipeTabNewRequest(body, user) {
  body.innerHTML = "";
  const info = el("div", "info-box"); info.textContent = "جارٍ التحميل…"; body.appendChild(info);
  let m;
  try { m = await dbPipeMasters(); } catch {
    body.innerHTML = `<div class="error-msg" style="display:block">تعذّر تحميل البيانات — تحقق من الاتصال</div>`; return;
  }
  body.innerHTML = "";
  const card = el("div", "card");
  card.appendChild(sectionTitle("طلب التزام جديد"));

  // Fixed per render: a retry after a dropped response returns the same
  // RF number instead of raising a duplicate (dispatch_submit pattern).
  const clientRef = (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`);

  const typeSel = el("select");
  RF_TYPES.forEach(([v, label]) => { const o = el("option"); o.value = v; o.textContent = label; typeSel.appendChild(o); });
  card.appendChild(fieldGroup("نوع الطلب", typeSel, true).group);

  const ccSel = el("select");
  const ccDef = el("option"); ccDef.value = ""; ccDef.textContent = "اختر مركز التكلفة"; ccSel.appendChild(ccDef);
  m.ccs.forEach(cc => { const o = el("option"); o.value = cc.id; o.textContent = pipeCcLabel(cc); ccSel.appendChild(o); });
  if (user.costCenterId) ccSel.value = String(user.costCenterId);
  card.appendChild(fieldGroup("مركز التكلفة الطالب", ccSel, true).group);

  // Call-off: pick a live blanket → vendor locks to the blanket's vendor.
  const blSel = el("select");
  const blDef = el("option"); blDef.value = ""; blDef.textContent = "بدون — طلب مستقل"; blSel.appendChild(blDef);
  m.blankets.forEach(b => {
    const o = el("option"); o.value = b.id;
    const no = (b.commitments && b.commitments.number) || `#${b.id}`;
    o.textContent = `${no} · ${(b.vendors && b.vendors.name) || ""} · ${b.category} · متبقي ${pipeKD(b.remaining)}`;
    blSel.appendChild(o);
  });
  const blGroup = fieldGroup("سحب من مظلة (LPO)", blSel, false,
    "السحب ضمن سقف وصلاحية المظلة يُعتمد تلقائياً").group;
  card.appendChild(blGroup);

  const vSel = el("select");
  card.appendChild(fieldGroup("المورد / المقاول", vSel, true).group);
  const vendorKinds = { WO: ["subcontractor", "internal"], LPO: ["supplier", "internal"], CON: null };
  function fillVendors() {
    vSel.innerHTML = "";
    const def = el("option"); def.value = ""; def.textContent = "اختر من القائمة الموحدة"; vSel.appendChild(def);
    const kinds = vendorKinds[typeSel.value];
    let list = kinds ? m.vendors.filter(v => kinds.includes(v.kind)) : m.vendors;
    if (!list.length) list = m.vendors;
    list.forEach(v => { const o = el("option"); o.value = v.id; o.textContent = v.name; vSel.appendChild(o); });
  }
  fillVendors();

  // Blanket terms — only when this LPO request IS a blanket.
  const blkWrap = el("div");
  const blkChk = el("input"); blkChk.type = "checkbox"; blkChk.id = "rf-blk";
  const blkLbl = el("label"); blkLbl.htmlFor = "rf-blk"; blkLbl.style.cssText = "display:flex;gap:.5rem;align-items:center;cursor:pointer";
  blkLbl.appendChild(blkChk); blkLbl.appendChild(document.createTextNode("هذا الطلب مظلة (Blanket LPO) — سقف يُسحب منه لاحقاً"));
  const blkFields = el("div"); blkFields.style.display = "none";
  const catSel = select(m.cats, "اختر الفئة");
  blkFields.appendChild(fieldGroup("فئة المظلة", catSel, true).group);
  const rateI = input("text", "مرجع الأسعار (عرض/اتفاقية)");
  blkFields.appendChild(fieldGroup("مرجع السعر", rateI, false).group);
  const fromI = input("date", ""); const toI = input("date", "");
  blkFields.appendChild(fieldGroup("سارية من", fromI, true).group);
  blkFields.appendChild(fieldGroup("سارية حتى", toI, true).group);
  blkChk.addEventListener("change", () => { blkFields.style.display = blkChk.checked ? "" : "none"; });
  blkWrap.appendChild(blkLbl); blkWrap.appendChild(blkFields);
  card.appendChild(blkWrap);

  const descI = textarea("وصف الأعمال / المواد المطلوبة", 3);
  card.appendChild(fieldGroup("الوصف", descI, true).group);
  const valI = input("number", "0.000", "decimal"); valI.step = "0.001"; valI.min = "0";
  card.appendChild(fieldGroup("القيمة التقديرية (د.ك)", valI, true).group);

  function syncSections() {
    const isLPO = typeSel.value === "LPO";
    blGroup.style.display = isLPO && m.blankets.length ? "" : "none";
    blkWrap.style.display = isLPO ? "" : "none";
    if (!isLPO) { blSel.value = ""; blkChk.checked = false; blkFields.style.display = "none"; }
    fillVendors();
    syncBlanket();
  }
  function syncBlanket() {
    const b = m.blankets.find(x => String(x.id) === blSel.value);
    if (b) {
      vSel.value = String(b.vendor_id); vSel.disabled = true;
      blkChk.checked = false; blkChk.disabled = true; blkFields.style.display = "none";
    } else { vSel.disabled = false; blkChk.disabled = false; }
  }
  typeSel.addEventListener("change", syncSections);
  blSel.addEventListener("change", syncBlanket);
  syncSections();

  const err = el("div", "error-msg"); err.style.display = "none"; card.appendChild(err);
  const sendBtn = el("button", "btn-primary"); sendBtn.type = "button";
  sendBtn.textContent = "إرسال الطلب 📨"; sendBtn.style.width = "100%";
  card.appendChild(sendBtn);
  body.appendChild(card);

  sendBtn.addEventListener("click", async () => {
    err.style.display = "none";
    const fail = (msg) => { err.textContent = msg; err.style.display = "block"; };
    if (!ccSel.value) return fail("اختر مركز التكلفة");
    if (!vSel.value) return fail("اختر المورد / المقاول");
    if (!descI.value.trim()) return fail("الوصف مطلوب");
    const val = parseFloat(valI.value);
    if (!(val > 0)) return fail("أدخل قيمة تقديرية صحيحة");
    if (blkChk.checked && (!catSel.value || !fromI.value || !toI.value)) return fail("أكمل بيانات المظلة (الفئة والصلاحية)");
    sendBtn.disabled = true; sendBtn.textContent = "جارٍ الإرسال…";
    try {
      const r = await sbRpc("request_submit", {
        p_pin: user.pin, p_client_ref: clientRef, p_type: typeSel.value,
        p_cost_center_id: Number(ccSel.value), p_vendor_id: Number(vSel.value),
        p_description: descI.value.trim(), p_value: val,
        p_blanket_id: blSel.value ? Number(blSel.value) : null,
        p_is_blanket: blkChk.checked,
        p_blanket_category: blkChk.checked ? catSel.value : "",
        p_blanket_rate_ref: blkChk.checked ? rateI.value.trim() : "",
        p_blanket_valid_from: blkChk.checked ? fromI.value : null,
        p_blanket_valid_to: blkChk.checked ? toI.value : null,
      });
      if (!r || !r.success) {
        sendBtn.disabled = false; sendBtn.textContent = "إرسال الطلب 📨";
        const msgs = { "ceiling exceeded": `تجاوز سقف المظلة — المتبقي ${pipeKD(r && r.remaining)}`,
                       "blanket not active": "المظلة غير نشطة", "vendor does not match blanket": "المورد لا يطابق مظلة السحب",
                       "blanket outside validity window": "المظلة خارج فترة الصلاحية" };
        return fail(msgs[r && r.error] || "تعذّر إرسال الطلب — راجع البيانات");
      }
      body.innerHTML = "";
      const ok = el("div", "card"); ok.style.textAlign = "center";
      ok.innerHTML = `<div style="font-size:2.4rem">${r.auto ? "⚡" : "✅"}</div>
        <div class="req-client" style="margin:.4rem 0">${r.reqNo}</div>` +
        (r.auto ? `<div class="req-line">اعتماد تلقائي — رقم الالتزام <b>${r.commitmentNo}</b></div>`
                : `<div class="req-line">أُرسل للمكتب الرئيسي للاعتماد</div>`);
      const again = el("button", "btn-primary"); again.type = "button"; again.textContent = "طلب جديد ➕";
      again.style.cssText = "width:100%;margin-top:1rem";
      again.addEventListener("click", () => pipeTabNewRequest(body, user));
      ok.appendChild(again);
      body.appendChild(ok);
    } catch {
      sendBtn.disabled = false; sendBtn.textContent = "إرسال الطلب 📨";
      fail("حدث خطأ — حاول مجدداً");
    }
  });
}

// ── Tab: head-office approval queue ──
async function pipeTabQueue(body, user) {
  body.innerHTML = "";
  const info = el("div", "info-box"); info.textContent = "جارٍ التحميل…"; body.appendChild(info);
  let rows = [];
  try { rows = await dbPipeQueue(); } catch {}
  body.innerHTML = "";
  const pending = rows.filter(r => r.status === "قيد المراجعة");
  const decided = rows.filter(r => r.status !== "قيد المراجعة").slice(0, 30);

  const hPend = el("div", "prog-day-head today");
  hPend.textContent = `بانتظار قرارك (${pending.length})`;
  body.appendChild(hPend);
  if (!pending.length) {
    const e = el("div", "info-box"); e.textContent = "لا توجد طلبات بانتظار الاعتماد."; body.appendChild(e);
  } else pending.forEach(r => body.appendChild(pipeReqCard(r, (c) => {
    const noteI = textarea("ملاحظة (اختياري — مطلوبة عند الرفض)");
    noteI.style.cssText = "margin-top:.6rem;min-height:44px;";
    c.appendChild(noteI);
    const acts = el("div", "prog-actions");
    const okB = el("button", "btn-primary"); okB.type = "button"; okB.textContent = "اعتماد ✓";
    const noB = el("button", "btn-secondary"); noB.type = "button"; noB.textContent = "رفض ✕";
    noB.style.color = "var(--red)";
    const decide = async (decision) => {
      if (decision === "reject" && !noteI.value.trim()) {
        noteI.style.borderColor = "var(--red)"; noteI.placeholder = "اذكر سبب الرفض"; return;
      }
      okB.disabled = noB.disabled = true;
      try {
        await sbRpc("request_decide", { p_pin: user.pin, p_id: r.id, p_decision: decision, p_note: noteI.value.trim() });
      } catch {}
      pipeTabQueue(body, user);
    };
    okB.addEventListener("click", () => decide("approve"));
    noB.addEventListener("click", () => decide("reject"));
    acts.appendChild(okB); acts.appendChild(noB); c.appendChild(acts);
  })));

  if (decided.length) {
    const hLog = el("div", "prog-day-head"); hLog.textContent = "قرارات سابقة";
    body.appendChild(hLog);
    decided.forEach(r => body.appendChild(pipeReqCard(r)));
  }
}

// Optional supplier invoice rides along: exact dupes are refused by the
// DB constraint; a same-amount invoice within 30 days comes back as
// nearDuplicate and needs the explicit override button.
async function pipeTabGRN(body, user) {
  body.innerHTML = "";
  const info = el("div", "info-box"); info.textContent = "جارٍ التحميل…"; body.appendChild(info);
  let lpos = [], recent = [];
  try {
    [lpos, recent] = await Promise.all([
      sbGet(`commitments?ctype=eq.LPO&status=${sbEq("نشط")}&select=*,vendors(name),cost_centers(code,name_ar,name_en)&order=created_at.desc`),

    ]);
  } catch {
    body.innerHTML = `<div class="error-msg" style="display:block">تعذّر تحميل البيانات — تحقق من الاتصال</div>`; return;
  }
  body.innerHTML = "";

  const card = el("div", "card");
  card.appendChild(sectionTitle("استلام بضاعة (GRN)"));
  if (!lpos.length) {
    const e = el("div", "info-box"); e.textContent = "لا توجد أوامر شراء (LPO) نشطة — الاستلام يكون دائماً مقابل التزام."; card.appendChild(e);
  } else {
    const clientRef = (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`);

// ── Tab: SpectroNova export (0016) — file adapter. A batch freezes all

async function pipeTabExport(body, user) {
  body.innerHTML = "";
  const info = el("div", "info-box"); info.textContent = "جارٍ التحميل…"; body.appendChild(info);

    [pending, batches] = await Promise.all([

      sbGet("export_batches?order=created_at.desc&limit=15"),
    ]);

      rows = await sbGet(`export_rows?batch_id=in.(${batches.map(b => b.id).join(",")})&order=id`);
    }
  } catch {
    body.innerHTML = `<div class="error-msg" style="display:block">تعذّر تحميل البيانات — تحقق من الاتصال</div>`; return;
  }

  const mkB = el("button", "btn-primary"); mkB.type = "button";
  mkB.textContent = "إنشاء دفعة تصدير 📤"; mkB.style.width = "100%";
  mkB.disabled = !pending.length;

      err.textContent = (r && r.error === "nothing to export") ? "لا توجد حركات للتصدير" : "تعذّر إنشاء الدفعة";
      err.style.display = "block";
    } catch { err.textContent = "حدث خطأ — حاول مجدداً"; err.style.display = "block"; }

  });
  card.appendChild(mkB);
  const hint = el("div", "field-hint"); hint.style.marginTop = ".6rem";
  hint.textContent = "ملف CSV لكل دفعة (المسار الحالي) — الإرسال عبر واجهة SpectroNova يُفعَّل بنفس الدفعات عند وصول وثائق الـ API.";
  card.appendChild(hint);
  body.appendChild(card);

  if (!batches.length) {
    const e = el("div", "info-box"); e.textContent = "لا توجد دفعات تصدير بعد."; body.appendChild(e); return;
  }
  const h = el("div", "prog-day-head"); h.textContent = "الدفعات"; body.appendChild(h);
  const CSV_COLS = [["date", "التاريخ"], ["contactId", "ContactID"], ["vendor", "المورد"],
                    ["costCenter", "مركز التكلفة"], ["glAccount", "حساب GL"], ["amount", "المبلغ"],
                    ["commitmentRef", "الالتزام"], ["sourceId", "المصدر"], ["refNo", "المرجع"]];
  batches.forEach(b => {
    const bRows = rows.filter(r => r.batch_id === b.id);
    const acked = bRows.filter(r => r.acked).length;
    const c = el("div", "card req-card");
    const top = el("div", "prog-top");
    const no = el("div", "req-client"); no.textContent = b.batch_no;
    const chip = el("span", "plant-chip");
    chip.textContent = `${acked}/${bRows.length} مُرحَّل`;
    chip.style.background = acked === bRows.length && bRows.length ? "rgba(0,166,81,.12)" : "var(--surface-2)";
    chip.style.color = acked === bRows.length && bRows.length ? "var(--green)" : "var(--text-2)";
    top.appendChild(no); top.appendChild(chip);
    c.appendChild(top);
    const l1 = el("div", "req-line");
    l1.textContent = `أنشأها ${b.created_by || "—"} · ${fmtKW(b.created_at)}`;
    c.appendChild(l1);
    const dlB = el("button", "btn-secondary"); dlB.type = "button";
    dlB.textContent = "تنزيل CSV ⬇️"; dlB.style.cssText = "width:auto;margin:.5rem 0";
    dlB.addEventListener("click", () => {
      const esc = (v) => `"${String(v == null ? "" : v).replace(/"/g, '""')}"`;
      // UTF-8 BOM so Excel opens the Arabic columns correctly
      const csv = "﻿" + CSV_COLS.map(([, ar]) => esc(ar)).join(",") + "\n" +
        bRows.map(r => CSV_COLS.map(([k]) => esc(r.payload[k])).join(",")).join("\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
      a.download = `spectronova-${b.batch_no}.csv`;

    c.appendChild(dlB);
    bRows.forEach(r => {
      const row = el("div", "req-line");
