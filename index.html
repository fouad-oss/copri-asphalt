// ── MILLING MODULE (client) ─────────────────────────────
// Engineer portal + public report view. PM/Marco portals are wired as
// stubs for now (built in the next phase). All functions prefixed
// renderMilling* / milling* so the module can be extracted later.
// ════════════════════════════════════════════════════════
const MILL_STATUS = {
  pending:  "بانتظار الموافقة", rejected: "مرفوض", review: "مراجعة",
  approved: "معتمد", scheduled: "مجدول", progress: "قيد التنفيذ", complete: "مكتمل",
};

// Flatten asphalt projects for milling dropdowns.
function millingAllProjects() {
  const out = [];
  Object.values(CONFIG.companies).forEach(c => {
    if (!c.isCopri) return;   // milling is for Copri projects only
    Object.entries(c.projects).forEach(([name, p]) =>
      out.push({ name, sites: p.sites || [], namedStreets: p.namedStreets || null, locationType: p.locationType || "block_street" }));
  });
  return out;
}
function millingProjectByName(name) { return millingAllProjects().find(p => p.name === name) || null; }
function millingDepthByLabel(label) { return (CONFIG.millingDepths || []).find(d => d.label === label) || null; }

// PM / Marco sessions (mirror the engineer session helpers; used next phase).
function getPMSession()      { try { return JSON.parse(sessionStorage.getItem("pm_session")    || "null"); } catch { return null; } }
function setPMSession(name)  { sessionStorage.setItem("pm_session",    JSON.stringify({ name, ts: Date.now() })); }
function getMarcoSession()   { try { return JSON.parse(sessionStorage.getItem("marco_session") || "null"); } catch { return null; } }
function setMarcoSession(n)  { sessionStorage.setItem("marco_session", JSON.stringify({ name: n, ts: Date.now() })); }

// GET helper for milling reads (script returns JSON; readable, unlike the
// no-cors POST). Returns the parsed object, or {} on failure.
async function millingGet(params) {
  try {
    const qs = Object.entries(params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join("&");
    const res = await fetch(`${CONFIG.scriptUrl}?${qs}`);
    return await res.json();
  } catch { return {}; }
}

// Client-side unique id — the no-cors POST can't read a server-assigned id.
function millingNewProgramId() {
  return `MILL-${new Date().getFullYear()}-${Date.now().toString(36).slice(-5).toUpperCase()}`;
}

function millingStatusColors(status) {
  if (status === MILL_STATUS.rejected) return ["#fdecea", "#D32F2F"];
  if (status === MILL_STATUS.pending || status === MILL_STATUS.review) return ["rgba(230,81,0,.10)", "#E65100"];
  return ["var(--green-light)", "var(--green-dark)"];   // approved / scheduled / progress / complete
}
function millingStatusBadge(status) {
  const [bg, fg] = millingStatusColors(status);
  const b = el("span"); b.textContent = status || "—";
  b.style.cssText = `display:inline-block;font-size:.7rem;font-weight:700;padding:.25rem .6rem;border-radius:999px;background:${bg};color:${fg};`;
  return b;
}
function millingPriorityBadge(priority) {
  const map = { "عادي": ["var(--surface-2)", "var(--text-2)"], "عاجل": ["rgba(230,81,0,.10)", "#E65100"], "حرج": ["#fdecea", "#D32F2F"] };
  const [bg, fg] = map[priority] || map["عادي"];
  const b = el("span"); b.textContent = priority || "—";
  b.style.cssText = `display:inline-block;font-size:.68rem;font-weight:700;padding:.2rem .55rem;border-radius:999px;background:${bg};color:${fg};`;
  return b;
}
function millingActionLabel(a) {
  return ({ submitted: "تم التقديم", rejected: "مرفوض", revised: "تمت المراجعة",
            approved: "تمت الموافقة", scheduled: "تمت الجدولة", started: "بدء التنفيذ",
            completed: "اكتمل" })[a] || a;
}
function millingRoleLabel(r) {
  return ({ engineer: "مهندس", pm: "مدير المشروع", marco: "ماركو" })[r] || r;
}

// A program details block (label/value rows), reused by cards and the report.
function millingDetails(prog) {
  const wrap = el("div");
  wrap.appendChild(fieldRow("المشروع", prog.project));
  wrap.appendChild(fieldRow("رقم أمر العمل", prog.workOrder));
  wrap.appendChild(fieldRow("الموقع", prog.site));
  const _mp = millingProjectByName(prog.project);
  if (_mp && _mp.locationType === "km_range") {
    const km = [prog.block, prog.street].filter(Boolean).join(" — ");
    if (km) wrap.appendChild(fieldRow("النطاق (كم)", km));
  } else {
    const locParts = [prog.block ? `ق ${prog.block}` : "", prog.street ? `ش ${prog.street}` : ""].filter(Boolean).join(" / ");
    if (locParts) wrap.appendChild(fieldRow("القطعة / الشارع", locParts));
  }
  wrap.appendChild(fieldRow("سماكة القشط", prog.depth));
  wrap.appendChild(fieldRow("المساحة المطلوب قشطها (م²)", prog.area));
  if (prog.machines) wrap.appendChild(fieldRow("عدد ماكينات القشط", prog.machines));
  if (prog.priority) wrap.appendChild(fieldRow("الأولوية", prog.priority));
  wrap.appendChild(fieldRow("التاريخ المطلوب", prog.requestedDate));
  wrap.appendChild(fieldRow("اسم المهندس", prog.engineer));
  if (prog.engNotes) wrap.appendChild(fieldRow("ملاحظات", prog.engNotes));
  return wrap;
}

// Audit trail timeline.
function millingTimeline(audit) {
  const wrap = el("div"); wrap.style.cssText = "margin-top:.6rem;";
  (audit || []).forEach(ev => {
    const row = el("div"); row.style.cssText = "border-right:3px solid var(--green);padding:.3rem .7rem;margin-bottom:.5rem;background:var(--surface-2);border-radius:4px;";
    const top = el("div"); top.style.cssText = "font-weight:700;font-size:.82rem;";
    top.textContent = `${millingActionLabel(ev.action)} — ${ev.by || ""} (${millingRoleLabel(ev.role)})`;
    const ts = el("div"); ts.style.cssText = "font-size:.7rem;color:var(--text-3);";
    ts.textContent = (ev.ts || "").replace("T", " ").slice(0, 16);
    row.appendChild(top); row.appendChild(ts);
    if (ev.note) { const n = el("div"); n.style.cssText = "font-size:.78rem;color:var(--text-2);margin-top:.2rem;"; n.textContent = `« ${ev.note} »`; row.appendChild(n); }
    wrap.appendChild(row);
  });
  return wrap;
}

// ── Engineer home — my programs + new submission ──────────────────
async function renderMillingEngineerHome(engName) {
  setEngineerSession(engName);
  const main = renderShell("برنامج القشط — المهندس"); main.innerHTML = "";

  const head = el("div", "card");
  const hr = el("div"); hr.style.cssText = "display:flex;justify-content:space-between;align-items:center;";
  const hi = el("div"); hi.innerHTML = `<div style="font-weight:700">${engName}</div><div style="font-size:.75rem;color:var(--text-3)">بوابة برامج القشط</div>`;
  const out = el("button", "btn-secondary"); out.type = "button"; out.textContent = "خروج"; out.style.width = "auto";
  out.addEventListener("click", () => { clearEngineerSession(); location.href = location.href.split("?")[0] + "?millingRole=engineer"; });
  hr.appendChild(hi); hr.appendChild(out); head.appendChild(hr);
  main.appendChild(head);

  const tabs = el("div", "history-tabs");
  const tMine = el("button", "history-tab active"); tMine.type = "button"; tMine.textContent = "برامجي";
  const tNew  = el("button", "history-tab");        tNew.type  = "button"; tNew.textContent  = "برنامج جديد";
  tabs.appendChild(tMine); tabs.appendChild(tNew); main.appendChild(tabs);

  const body = el("div"); main.appendChild(body);

  let activeTab = "mine";
  async function showMine() {
    activeTab = "mine";
    tMine.classList.add("active"); tNew.classList.remove("active");
    body.innerHTML = "";
    const info = el("div", "info-box"); info.textContent = "جارٍ تحميل برامجك…"; body.appendChild(info);
    const data = await millingGet({ millingByEngineer: engName });
    if (activeTab !== "mine") return;   // user switched tabs while loading
    body.innerHTML = "";
    const progs = (data.programs || []).sort((a, b) => String(b.submittedAt).localeCompare(String(a.submittedAt)));
    if (!progs.length) { const e = el("div", "info-box"); e.textContent = "لا توجد برامج بعد — ابدأ ببرنامج جديد."; body.appendChild(e); return; }
    progs.forEach(prog => body.appendChild(millingProgramCard(prog, engName, showMine)));
  }
  function showNew() {
    activeTab = "new";
    tNew.classList.add("active"); tMine.classList.remove("active");
    body.innerHTML = "";
    // Re-render the whole home on return — the success screen clears #main-content,
    // which would detach the `body` that showMine writes into.
    body.appendChild(renderMillingProgramForm(engName, null, () => renderMillingEngineerHome(engName)));
  }
  tMine.addEventListener("click", showMine);
  tNew.addEventListener("click", showNew);
  showMine();
}

// A single program card in the engineer's list.
function millingProgramCard(prog, engName, onChange) {
  const card = el("div", "card");
  const top = el("div"); top.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;";
  const id = el("div"); id.style.cssText = "font-weight:700;font-size:.9rem;"; id.textContent = prog.programId;
  top.appendChild(id); top.appendChild(millingStatusBadge(prog.status)); card.appendChild(top);

  const prow = el("div"); prow.style.cssText = "margin-bottom:.4rem;"; prow.appendChild(millingPriorityBadge(prog.priority)); card.appendChild(prow);
  card.appendChild(millingDetails(prog));

  if (prog.status === MILL_STATUS.rejected && prog.pmNote) {
    const rej = el("div"); rej.style.cssText = "margin-top:.5rem;padding:.5rem .7rem;background:#fdecea;border-radius:6px;color:#D32F2F;font-size:.8rem;";
    rej.innerHTML = `<strong>سبب الرفض:</strong> ${prog.pmNote}`; card.appendChild(rej);
  }

  const actions = el("div"); actions.style.cssText = "display:flex;gap:.5rem;margin-top:.7rem;";
  const view = el("a", "btn-secondary"); view.textContent = "عرض / طباعة"; view.style.cssText = "width:auto;text-decoration:none;text-align:center;";

// ── Submission / revision form ────────────────────────────────────
function renderMillingProgramForm(engName, existing, onDone) {
  const card = el("div", "card");
  card.appendChild(sectionTitle(existing ? "تعديل برنامج القشط" : "برنامج قشط جديد"));

  if (existing && existing.status === MILL_STATUS.rejected && existing.pmNote) {
    const rej = el("div"); rej.style.cssText = "margin-bottom:.8rem;padding:.6rem .8rem;background:#fdecea;border-radius:6px;color:#D32F2F;font-size:.82rem;";
    rej.innerHTML = `<strong>ملاحظة الرفض من مدير المشروع:</strong><br>${existing.pmNote}`; card.appendChild(rej);
  }

  // Project (drives the site list)
  const { group: gProj, input: projInput } = fieldGroup("المشروع", select(millingAllProjects().map(p => p.name), "اختر المشروع"), true);
  card.appendChild(gProj);

  // Site (rebuilt when project changes)
  const siteWrap = el("div");
  let siteInput = null;
  function buildSite() {
    siteWrap.innerHTML = "";
    const proj = millingProjectByName(projInput.value);
    const { group, input: s } = fieldGroup("الموقع", select((proj && proj.sites) || [], "اختر الموقع"), true);
    siteInput = s; siteWrap.appendChild(group);
    if (existing && existing.site) siteInput.value = existing.site;
  }
  buildSite();
  projInput.addEventListener("change", () => { buildSite(); buildMillingLoc(); refreshMillingWO(); });
  card.appendChild(siteWrap);

  // Location — block + street, or a named street picked from the site's list
  // (same named streets as the asphalt module). Toggle appears only for sites
  // that have named streets defined.
  const locWrap = el("div");
  let locMode = "blocks";                 // "blocks" | "named"
  let getMillingLoc = () => ({ block: "", street: "" });
  function millingNamed() {
    const proj = millingProjectByName(projInput.value);
    return (proj && proj.namedStreets && siteInput && proj.namedStreets[siteInput.value]) || [];
  }
  function buildMillingLoc() {
    locWrap.innerHTML = "";
    const projLt = millingProjectByName(projInput.value);
    if (projLt && projLt.locationType === "km_range") {
      const r = el("div", "field-row-2");
      const { group: gF, input: kmFrom } = fieldGroup("من الكيلومتر", input("text", "مثال: 12.5", "decimal"), false);
      const { group: gT, input: kmTo }   = fieldGroup("إلى الكيلومتر", input("text", "مثال: 14.0", "decimal"), false);
      r.appendChild(gF); r.appendChild(gT); locWrap.appendChild(r);
      kmFrom.addEventListener("input", refreshMillingWO);
      kmTo.addEventListener("input", refreshMillingWO);
      getMillingLoc = () => ({ block: kmFrom.value.trim(), street: kmTo.value.trim() });
      return;
    }
    const named = millingNamed();
    if (!named.length) locMode = "blocks";
    if (named.length) {
      const toggle = el("div", "history-tabs"); toggle.style.marginBottom = ".6rem";
      const tB = el("button", "history-tab" + (locMode === "blocks" ? " active" : "")); tB.type = "button"; tB.textContent = "قطعة وشارع";
      const tN = el("button", "history-tab" + (locMode === "named"  ? " active" : "")); tN.type = "button"; tN.textContent = "اسم الشارع";
      toggle.appendChild(tB); toggle.appendChild(tN); locWrap.appendChild(toggle);
      tB.addEventListener("click", () => { if (locMode === "blocks") return; locMode = "blocks"; buildMillingLoc(); refreshMillingWO(); });
      tN.addEventListener("click", () => { if (locMode === "named")  return; locMode = "named";  buildMillingLoc(); refreshMillingWO(); });
    }
    if (locMode === "named") {
      const { group, input: s } = fieldGroup("اسم الشارع / الجادة", select(named, "اختر الشارع"), false);
      locWrap.appendChild(group);
      s.addEventListener("change", refreshMillingWO);
      getMillingLoc = () => ({ block: "", street: s.value.trim() });
    } else {
      const r = el("div", "field-row-2");
      const { group: gB, input: b }  = fieldGroup("القطعة", input("text", "رقم القطعة", "numeric"), false);
      const { group: gS, input: st } = fieldGroup("الشارع / الجادة", input("text", "اختياري"), false);
      r.appendChild(gB); r.appendChild(gS); locWrap.appendChild(r);
      b.addEventListener("input", refreshMillingWO);
      st.addEventListener("input", refreshMillingWO);
      getMillingLoc = () => ({ block: b.value.trim(), street: st.value.trim() });
    }
  }
  card.appendChild(locWrap);

  // Work order — picker of active contract orders, filtered by the chosen site.
  function refreshMillingWO() {}   // no-op — WO field removed (returns as locked auto-fill later)
  siteWrap.addEventListener("change", () => { buildMillingLoc(); refreshMillingWO(); });
  buildMillingLoc();
  refreshMillingWO();

  const { group: gDepth, input: depthInput } = fieldGroup("سماكة القشط", select((CONFIG.millingDepths || []).map(d => d.label), "اختر السماكة"), true);
  card.appendChild(gDepth);

  const row2 = el("div", "field-row-2");
  const { group: gArea, input: areaInput } = fieldGroup("المساحة المطلوب قشطها (م²)", input("number", "0", "decimal"), true);
  areaInput.step = "0.01";
  const { group: gDate, input: dateInput } = fieldGroup("التاريخ المطلوب", input("date", ""), true);
  row2.appendChild(gArea); row2.appendChild(gDate); card.appendChild(row2);

  const row3 = el("div", "field-row-2");
  const { group: gMach, input: machInput } = fieldGroup("عدد ماكينات القشط المطلوبة", input("number", "1", "numeric"), true);
  machInput.min = "1"; machInput.step = "1";
  const { group: gPrio, input: prioInput } = fieldGroup("الأولوية", select(CONFIG.millingPriorities || [], "اختر الأولوية"), true);
  row3.appendChild(gMach); row3.appendChild(gPrio); card.appendChild(row3);

  const { group: gNotes, input: notesInput } = fieldGroup("ملاحظات", textarea("قيود، صعوبات وصول، إلخ..."), false);
  card.appendChild(gNotes);

  // Engineer (locked)
  const { group: gEng, input: engInput } = fieldGroup("اسم المهندس", input("text", ""), true);
  engInput.value = engName; engInput.readOnly = true; engInput.style.background = "var(--surface-2)";
  card.appendChild(gEng);

  // Prefill on edit
  if (existing) {
    projInput.value = existing.project || ""; buildSite();
    if (existing.site) siteInput.value = existing.site;
    locMode = (existing.street && millingNamed().indexOf(existing.street) >= 0) ? "named" : "blocks";
    buildMillingLoc();
    if (locMode === "named") {
      const sel = locWrap.querySelector("select"); if (sel) sel.value = existing.street || "";
    } else {
      const ins = locWrap.querySelectorAll("input");
      if (ins[0]) ins[0].value = existing.block || "";
      if (ins[1]) ins[1].value = existing.street || "";
    }
    depthInput.value = existing.depth || "";
    areaInput.value = existing.area || ""; machInput.value = existing.machines || "";
    dateInput.value = existing.requestedDate || "";
    prioInput.value = existing.priority || ""; notesInput.value = existing.engNotes || "";
  }

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none"; card.appendChild(errDiv);
  const btn = el("button", "btn-primary"); btn.type = "button"; btn.textContent = existing ? "إعادة التقديم" : "تقديم البرنامج"; card.appendChild(btn);

  btn.addEventListener("click", async () => {
    const depth = millingDepthByLabel(depthInput.value);
    const loc = getMillingLoc();
    const data = {
      project: projInput.value,
      workOrder: "",
      site: siteInput ? siteInput.value : "",
      block: loc.block, street: loc.street,
      depth: depthInput.value, itemCode: depth ? depth.code : "",
      area: areaInput.value.trim(), machines: machInput.value.trim(),
      requestedDate: dateInput.value, priority: prioInput.value,
      engineerName: engName, notes: notesInput.value.trim(),
    };
    const required = ["project", "site", "depth", "area", "machines", "requestedDate", "priority"];
    if (required.some(k => !data[k])) { errDiv.textContent = "يرجى تعبئة جميع الحقول المطلوبة"; errDiv.style.display = "block"; return; }
    errDiv.style.display = "none"; btn.disabled = true; btn.textContent = "جارٍ الإرسال…";

    const programId = existing ? existing.programId : millingNewProgramId();
    const type = existing ? "reviseMillingProgram" : "submitMillingProgram";
    try {
      await postToScript({ type, programId, ...data });
      renderMillingSubmitSuccess(programId, !!existing, () => (onDone ? onDone() : renderMillingEngineerHome(engName)));
    } catch {
      btn.disabled = false; btn.textContent = existing ? "إعادة التقديم" : "تقديم البرنامج";
      errDiv.textContent = "حدث خطأ، يرجى المحاولة مجدداً"; errDiv.style.display = "block";
    }
  });

  return card;
}

// Post a status change, then refresh (the no-cors POST can't be read, so wait
// briefly for the write to commit before re-fetching).
async function millingAct_(payload, btns, onChange) {
  (btns || []).forEach(b => { b.disabled = true; });
  try { await postToScript(payload); await new Promise(r => setTimeout(r, 1100)); } catch {}
  onChange();
}

// ── PM portal — approve / reject programs for the PM's projects ────
async function renderMillingPMHome(pmName) {
  setPMSession(pmName);
  const main = renderShell("برنامج القشط — مدير المشروع"); main.innerHTML = "";
  const pm = (CONFIG.projectManagers || []).find(x => x.name === pmName);
  const myProjects = (pm && pm.projects) || [];

  const head = el("div", "card");
  const hr = el("div"); hr.style.cssText = "display:flex;justify-content:space-between;align-items:center;";
  const hi = el("div"); hi.innerHTML = `<div style="font-weight:700">${pmName}</div><div style="font-size:.75rem;color:var(--text-3)">اعتماد برامج القشط</div>`;
  const out = el("button", "btn-secondary"); out.type = "button"; out.textContent = "خروج"; out.style.width = "auto";
  out.addEventListener("click", () => { sessionStorage.removeItem("pm_session"); location.href = location.href.split("?")[0] + "?millingRole=pm"; });
  hr.appendChild(hi); hr.appendChild(out); head.appendChild(hr); main.appendChild(head);

  const tabs = el("div", "history-tabs");
  const tPend = el("button", "history-tab active"); tPend.type = "button"; tPend.textContent = "بانتظار الموافقة";
  const tLog  = el("button", "history-tab"); tLog.type = "button"; tLog.textContent = "السجل";
  tabs.appendChild(tPend); tabs.appendChild(tLog); main.appendChild(tabs);
  const body = el("div"); main.appendChild(body);

  let active = "pending";
  async function showPending() {
    active = "pending"; tPend.classList.add("active"); tLog.classList.remove("active");
    body.innerHTML = ""; const info = el("div", "info-box"); info.textContent = "جارٍ التحميل…"; body.appendChild(info);
    const data = await millingGet({ millingPMQueue: pmName });
    if (active !== "pending") return;
    body.innerHTML = "";
    const progs = (data.programs || []).filter(p => myProjects.indexOf(p.project) >= 0)
      .sort((a, b) => String(a.submittedAt).localeCompare(String(b.submittedAt)));
    if (!progs.length) { const e = el("div", "info-box"); e.textContent = "لا توجد برامج بانتظار موافقتك."; body.appendChild(e); return; }
    progs.forEach(p => body.appendChild(millingPMCard(p, pmName, showPending)));
  }
  async function showLog() {
    active = "log"; tLog.classList.add("active"); tPend.classList.remove("active");
    body.innerHTML = ""; const info = el("div", "info-box"); info.textContent = "جارٍ التحميل…"; body.appendChild(info);
    const data = await millingGet({ millingDecided: 1 });
    if (active !== "log") return;
    body.innerHTML = "";
    const progs = (data.programs || []).filter(p => myProjects.indexOf(p.project) >= 0)
      .sort((a, b) => String(b.pmDecidedAt || b.submittedAt).localeCompare(String(a.pmDecidedAt || a.submittedAt)));
    if (!progs.length) { const e = el("div", "info-box"); e.textContent = "لا توجد برامج في السجل."; body.appendChild(e); return; }
    progs.forEach(p => {
      const card = el("div", "card");
      const top = el("div"); top.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;";
      const id = el("div"); id.style.cssText = "font-weight:700;font-size:.9rem;"; id.textContent = p.programId;
      top.appendChild(id); top.appendChild(millingStatusBadge(p.status)); card.appendChild(top);
      card.appendChild(millingDetails(p));
      if (p.pmNote) { const n = el("div"); n.style.cssText = "margin-top:.5rem;font-size:.8rem;color:var(--text-2);"; n.innerHTML = `<strong>ملاحظة:</strong> ${p.pmNote}`; card.appendChild(n); }
      const view = el("a", "btn-secondary"); view.textContent = "عرض / طباعة"; view.style.cssText = "width:auto;text-decoration:none;text-align:center;margin-top:.6rem;display:inline-block;";
      view.href = `${location.href.split("?")[0]}?millingReport=${encodeURIComponent(p.programId)}`; view.target = "_blank"; card.appendChild(view);
      body.appendChild(card);
    });
  }
  tPend.addEventListener("click", showPending);
  tLog.addEventListener("click", showLog);
  showPending();
}
function millingPMCard(prog, pmName, onChange) {
  const card = el("div", "card");
  const top = el("div"); top.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;";
  const id = el("div"); id.style.cssText = "font-weight:700;font-size:.9rem;"; id.textContent = prog.programId;
  top.appendChild(id); top.appendChild(millingStatusBadge(prog.status)); card.appendChild(top);
  const prow = el("div"); prow.style.cssText = "margin-bottom:.4rem;"; prow.appendChild(millingPriorityBadge(prog.priority)); card.appendChild(prow);
  card.appendChild(millingDetails(prog));

  const actions = el("div"); actions.style.cssText = "display:flex;gap:.5rem;margin-top:.7rem;";
  const approve = el("button", "btn-primary"); approve.type = "button"; approve.style.width = "auto"; approve.textContent = "موافقة ✓";
  const reject  = el("button"); reject.type = "button"; reject.textContent = "رفض ✕";
  reject.style.cssText = "width:auto;padding:.6rem 1rem;border-radius:var(--radius-sm);background:#fdecea;color:#D32F2F;border:1.5px solid #D32F2F;font-weight:700;font-family:inherit;cursor:pointer;";
  actions.appendChild(approve); actions.appendChild(reject); card.appendChild(actions);

  approve.addEventListener("click", () => {
    millingAct_({ type: "updateMillingStatus", programId: prog.programId, decision: "approve", by: pmName, role: "pm" }, [approve, reject], onChange);
  });
  reject.addEventListener("click", () => {
    actions.style.display = "none";
    const box = el("div"); box.style.cssText = "margin-top:.6rem;";
    const { group, input: noteI } = fieldGroup("سبب الرفض (إلزامي)", textarea("اكتب سبب الرفض ليتمكن المهندس من التعديل…"), true);
    box.appendChild(group);
    const err = el("div", "error-msg"); err.style.display = "none"; box.appendChild(err);
    const rowB = el("div"); rowB.style.cssText = "display:flex;gap:.5rem;";
    const confirm = el("button"); confirm.type = "button"; confirm.textContent = "تأكيد الرفض";
    confirm.style.cssText = "width:auto;padding:.6rem 1rem;border-radius:var(--radius-sm);background:#D32F2F;color:#fff;border:none;font-weight:700;font-family:inherit;cursor:pointer;";
    const cancel = el("button", "btn-secondary"); cancel.type = "button"; cancel.textContent = "إلغاء"; cancel.style.width = "auto";
    rowB.appendChild(confirm); rowB.appendChild(cancel); box.appendChild(rowB); card.appendChild(box);
    cancel.addEventListener("click", () => { box.remove(); actions.style.display = "flex"; });
    confirm.addEventListener("click", () => {
      const note = noteI.value.trim();
      if (!note) { err.textContent = "سبب الرفض إلزامي"; err.style.display = "block"; return; }
      millingAct_({ type: "updateMillingStatus", programId: prog.programId, decision: "reject", by: pmName, role: "pm", note }, [confirm, cancel], onChange);
    });
  });
  return card;
}

// MATERIALS RECEIPT MODULE (client) ───────────────────────
// Site engineer/foreman receives materials on site and records them (simple
// one-and-done, like a dispatch). Portal: ?matRole=receiver. All functions
// prefixed renderMaterial* / material* / mat* so the module stays separable.
// ════════════════════════════════════════════════════════
function getMatSession()     { try { return JSON.parse(sessionStorage.getItem("mat_session") || "null"); } catch { return null; } }
function setMatSession(name)  { sessionStorage.setItem("mat_session", JSON.stringify({ name, ts: Date.now() })); }
function clearMatSession()    { sessionStorage.removeItem("mat_session"); }

function matReceiverByName(name) { return (CONFIG.materialReceivers || []).find(r => r.name === name) || null; }
function matCatByName(cat)       { return (CONFIG.materialCatalog || []).find(c => c.category === cat) || null; }

// GET helper for materials reads (JSON, unlike the no-cors POST).
async function matGet(params) {
  try {
    const qs = Object.entries(params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join("&");
    const res = await fetch(`${CONFIG.scriptUrl}?${qs}`);
    return await res.json();
  } catch { return {}; }
}
// Client-side unique id — the no-cors POST can't read a server-assigned id.
function matNewReceiptId() {
  return `MAT-${new Date().getFullYear()}-${Date.now().toString(36).slice(-5).toUpperCase()}`;
}

// Compress a captured/selected image to a JPEG data-URL (max 1280px, q0.7) so
// the base64 payload rides comfortably inside the no-cors POST body.
function matCompressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const max = 1280;
        let { width: w, height: h } = img;
        if (w > max || h > max) { const s = Math.min(max / w, max / h); w = Math.round(w * s); h = Math.round(h * s); }
        const canvas = el("canvas"); canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.7));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── New receipt form ──
function renderMaterialReceiptForm(name, onDone) {
  const card = el("div", "card");
  card.appendChild(sectionTitle("استلام مواد جديد"));

  // Project (Copri only) → drives the site list. Reuses the asphalt/milling projects.
  const { group: gProj, input: projInput } = fieldGroup("المشروع", select(millingAllProjects().map(p => p.name), "اختر المشروع"), true);
  card.appendChild(gProj);

  // Site (rebuilt when project changes)
  const siteWrap = el("div"); let siteInput = null;
  function buildSite() {
    siteWrap.innerHTML = "";
    const proj = millingProjectByName(projInput.value);
    const { group, input: s } = fieldGroup("الموقع", select((proj && proj.sites) || [], "اختر الموقع"), true);
    siteInput = s; siteWrap.appendChild(group);
    siteInput.addEventListener("change", () => { buildMatLoc(); refreshMatWO(); });
  }
  buildSite();
  projInput.addEventListener("change", () => { buildSite(); buildMatLoc(); refreshMatWO(); });
  card.appendChild(siteWrap);

  // Location — block+street, a named street picked from the site's list, or a
  // km range (highways). Same rules/toggle as the asphalt & milling modules.
  const locWrap = el("div");
  let locMode = "blocks";                 // "blocks" | "named"
  let getMatLoc = () => ({ block: "", street: "" });
  function matNamed() {
    const proj = millingProjectByName(projInput.value);
    return (proj && proj.namedStreets && siteInput && proj.namedStreets[siteInput.value]) || [];
  }
  function buildMatLoc() {
    locWrap.innerHTML = "";
    const projLt = millingProjectByName(projInput.value);
    if (projLt && projLt.locationType === "km_range") {
      const r = el("div", "field-row-2");
      const { group: gF, input: kmFrom } = fieldGroup("من الكيلومتر", input("text", "مثال: 12.5", "decimal"), false);
      const { group: gT, input: kmTo }   = fieldGroup("إلى الكيلومتر", input("text", "مثال: 14.0", "decimal"), false);
      r.appendChild(gF); r.appendChild(gT); locWrap.appendChild(r);
      kmFrom.addEventListener("input", refreshMatWO);
      kmTo.addEventListener("input", refreshMatWO);
      getMatLoc = () => ({ block: kmFrom.value.trim(), street: kmTo.value.trim() });
      return;
    }
    const named = matNamed();
    if (!named.length) locMode = "blocks";
    if (named.length) {
      const toggle = el("div", "history-tabs"); toggle.style.marginBottom = ".6rem";
      const tB = el("button", "history-tab" + (locMode === "blocks" ? " active" : "")); tB.type = "button"; tB.textContent = "قطعة وشارع";
      const tN = el("button", "history-tab" + (locMode === "named"  ? " active" : "")); tN.type = "button"; tN.textContent = "اسم الشارع";
      toggle.appendChild(tB); toggle.appendChild(tN); locWrap.appendChild(toggle);
      tB.addEventListener("click", () => { if (locMode === "blocks") return; locMode = "blocks"; buildMatLoc(); refreshMatWO(); });
      tN.addEventListener("click", () => { if (locMode === "named")  return; locMode = "named";  buildMatLoc(); refreshMatWO(); });
    }
    if (locMode === "named") {
      const { group, input: s } = fieldGroup("اسم الشارع / الجادة", select(named, "اختر الشارع"), false);
      locWrap.appendChild(group);
      s.addEventListener("change", refreshMatWO);
      getMatLoc = () => ({ block: "", street: s.value.trim() });
    } else {
      const r = el("div", "field-row-2");
      const { group: gB, input: b }  = fieldGroup("القطعة", input("text", "رقم القطعة", "numeric"), false);
      const { group: gS, input: st } = fieldGroup("الشارع / الجادة", input("text", "اختياري"), false);
      r.appendChild(gB); r.appendChild(gS); locWrap.appendChild(r);
      b.addEventListener("input", refreshMatWO);
      st.addEventListener("input", refreshMatWO);
      getMatLoc = () => ({ block: b.value.trim(), street: st.value.trim() });
    }
  }
  card.appendChild(locWrap);

  // Work order — picker of active contract orders, filtered by the chosen site.
  function refreshMatWO() {}   // no-op — WO field removed (returns as locked auto-fill later)
  buildMatLoc();
  refreshMatWO();

  // General material (category) → drives the detailed material dropdown + unit.
  const { group: gCat, input: catInput } = fieldGroup("المادة (فئة عامة)", select((CONFIG.materialCatalog || []).map(c => c.category), "اختر الفئة"), true);
  card.appendChild(gCat);

  // Detailed material (rebuilt when category changes)
  const matWrap = el("div"); let matInput = null;
  function buildMat() {
    matWrap.innerHTML = "";
    const cat = matCatByName(catInput.value);
    const { group, input: m } = fieldGroup("المادة (تفصيلي)", select((cat && cat.items) || [], "اختر المادة"), true);
    matInput = m; matWrap.appendChild(group);
  }
  buildMat();
  card.appendChild(matWrap);

  // Quantity + unit (unit auto-set from the category, read-only)
  const qtyRow = el("div", "field-row-2");
  const { group: gQty, input: qtyInput } = fieldGroup("الكمية", input("number", "0", "decimal"), true); qtyInput.step = "0.01"; qtyInput.min = "0";
  const { group: gUnit, input: unitInput } = fieldGroup("الوحدة", input("text", "—"), false);
  unitInput.readOnly = true; unitInput.style.background = "var(--surface-2)";
  qtyRow.appendChild(gQty); qtyRow.appendChild(gUnit); card.appendChild(qtyRow);

  // Rate + amount (amount = quantity × rate, read-only)
  const rateRow = el("div", "field-row-2");
  const { group: gRate, input: rateInput } = fieldGroup("السعر (د.ك)", input("number", "0.000", "decimal"), false); rateInput.step = "0.001"; rateInput.min = "0";
  const { group: gAmt, input: amtInput } = fieldGroup("القيمة (د.ك)", input("text", "—"), false);
  amtInput.readOnly = true; amtInput.style.background = "var(--surface-2)"; amtInput.style.fontWeight = "700";
  rateRow.appendChild(gRate); rateRow.appendChild(gAmt); card.appendChild(rateRow);

  function refreshUnit() { const cat = matCatByName(catInput.value); unitInput.value = cat ? cat.unit : ""; }
  function refreshAmount() {
    const q = parseFloat(qtyInput.value), r = parseFloat(rateInput.value);
    amtInput.value = (isFinite(q) && isFinite(r)) ? (q * r).toFixed(3) : "";
  }
  catInput.addEventListener("change", () => { buildMat(); refreshUnit(); });
  qtyInput.addEventListener("input", refreshAmount);
  rateInput.addEventListener("input", refreshAmount);

  // Supplier + subcontractor
  const { group: gSup, input: supInput } = fieldGroup("المورد", select(CONFIG.materialSuppliers || [], "اختر المورد"), true);
  card.appendChild(gSup);
  const { group: gSub, input: subInput } = fieldGroup("المقاول من الباطن", select(CONFIG.materialSubcontractors || [], "اختر المقاول"), true);
  card.appendChild(gSub);

  // Photo of the paper receipt (required). capture=environment opens the camera on mobile.
  const { group: gPhoto, input: photoInput } = fieldGroup("صورة الإيصال الورقي", input("file"), true, "التقط أو أرفق صورة سند الاستلام");
  photoInput.accept = "image/*"; photoInput.setAttribute("capture", "environment");
  card.appendChild(gPhoto);
  const photoPreview = el("img"); photoPreview.style.cssText = "display:none;max-width:100%;border-radius:8px;margin-top:.4rem;";
  card.appendChild(photoPreview);
  let photoData = "";
  photoInput.addEventListener("change", async () => {
    const f = photoInput.files && photoInput.files[0];
    if (!f) { photoData = ""; photoPreview.style.display = "none"; return; }
    try { photoData = await matCompressImage(f); photoPreview.src = photoData; photoPreview.style.display = "block"; }
    catch { photoData = ""; photoPreview.style.display = "none"; }
  });

  // Remarks
  const { group: gRem, input: remInput } = fieldGroup("ملاحظات", textarea("اختياري..."), false);
  card.appendChild(gRem);

  // Receiver (locked)
  const { group: gRec, input: recInput } = fieldGroup("اسم المستلم", input("text", ""), true);
  recInput.value = name; recInput.readOnly = true; recInput.style.background = "var(--surface-2)";
  card.appendChild(gRec);

  refreshUnit();

  const errDiv = el("div", "error-msg"); errDiv.style.display = "none"; card.appendChild(errDiv);
  const btn = el("button", "btn-primary"); btn.type = "button"; btn.textContent = "تسجيل الاستلام"; card.appendChild(btn);

  btn.addEventListener("click", async () => {
    const loc = getMatLoc();
    const data = {
      project: projInput.value, site: siteInput ? siteInput.value : "",
      workOrder: "",
      block: loc.block, street: loc.street,
      category: catInput.value, material: matInput ? matInput.value : "",
      quantity: qtyInput.value.trim(), unit: unitInput.value,
      rate: rateInput.value.trim(), amount: amtInput.value,
      supplier: supInput.value, subcontractor: subInput.value,
      receiverName: name, remarks: remInput.value.trim(),
    };
    const required = ["project", "site", "category", "material", "quantity", "supplier", "subcontractor"];
    if (required.some(k => !data[k])) { errDiv.textContent = "يرجى تعبئة جميع الحقول المطلوبة"; errDiv.style.display = "block"; return; }
    if (!photoData) { errDiv.textContent = "يرجى إرفاق صورة الإيصال"; errDiv.style.display = "block"; return; }
    errDiv.style.display = "none"; btn.disabled = true; btn.textContent = "جارٍ الإرسال…";

    const receiptId = matNewReceiptId();
    try {
      await postToScript({ type: "submitMaterialReceipt", receiptId, ...data, photoData, timestamp: timestamp() });
      renderMaterialReceiptSuccess(receiptId, () => (onDone ? onDone() : renderMaterialReceiverHome(name)));
    } catch {
      btn.disabled = false; btn.textContent = "تسجيل الاستلام";
      errDiv.textContent = "حدث خطأ، يرجى المحاولة مجدداً"; errDiv.style.display = "block";
    }
  });

  return card;
}

function renderMaterialReceiptSuccess(receiptId, backFn) {
  const main = document.getElementById("main-content"); if (!main) return;
  main.innerHTML = "";
  const s = el("div", "success-screen");
  const icon = el("div", "success-icon ok"); icon.textContent = "✓"; s.appendChild(icon);
  const h = el("h2"); h.textContent = "تم تسجيل الاستلام"; s.appendChild(h);
  const p = el("p"); p.innerHTML = `رقم الاستلام: <strong>${receiptId}</strong>`; s.appendChild(p);
  const back = el("button", "btn-primary"); back.type = "button"; back.textContent = "عودة"; back.style.width = "100%";
  back.addEventListener("click", () => backFn && backFn()); s.appendChild(back);
  main.appendChild(s);
}

// ════════════════════════════════════════════════════════
// REFERENCE DATA — live-read, staff-editable (Ref — * Sheet tabs)
// Overlays the Sheet onto the built-in CONFIG defaults. Cached in localStorage
// and applied synchronously for an instant load; a background fetch refreshes
// the cache for the next open. Any failure falls back to cache, then defaults —
// so the app never breaks. Backend: setupReferenceTabs() / ?ref=1 in Code.gs.
// ════════════════════════════════════════════════════════
const REF_CACHE_KEY = "copri_ref_cache_v1";
const REF_VER_KEY   = "copri_ref_ver_v1";
let _lastRefVer = localStorage.getItem(REF_VER_KEY) || "";

// True when it's safe to swap the screen out from under the user. Never
// re-render while they're typing into a form field (would wipe half-typed input).
function _refSafeToRerender() {
  const el = document.activeElement;
  if (!el) return true;
  const tag = (el.tagName || "").toLowerCase();
  return !(tag === "input" || tag === "select" || tag === "textarea");
}

function _refProjectCtx(projectName) {
  for (const cn in (CONFIG.companies || {})) {
    const c = CONFIG.companies[cn];
    if (c.projects && c.projects[projectName]) return { companyName: cn, company: c, project: c.projects[projectName] };
  }
  return null;
}
function _refUpsertPin(list, name, pin) {
  const f = (list || []).find(x => x.name === name);
  if (f) f.pin = pin; else list.push({ name, pin });
}
function _refBool(v) { return /^(1|true|نعم|yes|y)$/i.test(String(v || "").trim()); }
function _refCopriProjectNames() {
  const out = [];
  for (const cn in (CONFIG.companies || {})) {
    const c = CONFIG.companies[cn]; if (!c.isCopri) continue;
    for (const pn in (c.projects || {})) out.push(pn);
  }
  return out;
}

// Rebuild/overlay CONFIG from the aggregated reference payload (per-unit files).
// Datasets present in the sheet replace their baked default; absent → default kept.
function applyReferenceData(ref) {
  if (!ref) return;

  // Settings / thresholds / branding.
  const s = ref.settings || {};
  if (s.tempDropWarning !== undefined && s.tempDropWarning !== "") CONFIG.tempDropWarning = Number(s.tempDropWarning);
  if (s.weightShortage  !== undefined && s.weightShortage  !== "") CONFIG.weightShortage  = Number(s.weightShortage);
  if (s.projectName)   CONFIG.projectName   = s.projectName;
  if (s.projectNameEn) CONFIG.projectNameEn = s.projectNameEn;
  if (s.footerText)    CONFIG.footerText    = s.footerText;

  // Companies/projects — rebuilt from Clients + Client Projects + Project Info.
  if ((ref.clients || []).length) {
    const companies = {};
    (ref.clients || []).forEach(c => { if (c.company) companies[c.company] = { isCopri: _refBool(c.isCopri), projects: {} }; });
    (ref.clientProjects || []).forEach(r => {
      if (!r.company || !r.project) return;
      companies[r.company] = companies[r.company] || { isCopri: false, projects: {} };
      companies[r.company].projects[r.project] = { contract: r.contract || "", locationType: r.locationType || "block_street", allowNamedStreet: _refBool(r.allowNamedStreet), sites: [], namedStreets: {} };
    });
    (ref.projectInfo || []).forEach(pi => {
      if (!pi.company || !pi.project) return;
      companies[pi.company] = companies[pi.company] || { isCopri: true, projects: {} };
      const p = companies[pi.company].projects[pi.project] = companies[pi.company].projects[pi.project] || { sites: [], namedStreets: {} };
      if (pi.contract) p.contract = pi.contract;
      p.locationType = pi.locationType || p.locationType || "block_street";
      p.allowNamedStreet = _refBool(pi.allowNamedStreet);
    });
    CONFIG.companies = companies;
  }
  // Sites & named streets into their projects.
  (ref.sites || []).forEach(r => { const ctx = _refProjectCtx(r.project); if (ctx && r.site) { ctx.project.sites = ctx.project.sites || []; if (!ctx.project.sites.includes(r.site)) ctx.project.sites.push(r.site); } });
  (ref.streets || []).forEach(r => {
    const ctx = _refProjectCtx(r.project); if (!ctx || !r.site || !r.street) return;
    const p = ctx.project; p.namedStreets = p.namedStreets || {};
    p.namedStreets[r.site] = p.namedStreets[r.site] || [];
    if (!p.namedStreets[r.site].includes(r.street)) p.namedStreets[r.site].push(r.street);
    p.allowNamedStreet = true;
  });

  // Staff → asphalt engineers (per project) + material receivers + milling staff.
  if ((ref.staff || []).length) {
    const receivers = [], milling = [];
    (ref.staff || []).forEach(r => {
      if (!r.name) return;
      const fn = String(r.function || "").toLowerCase(), pin = String(r.pin || "");
      const asph = /asphalt|أسفلت/.test(fn) || /both|كلا/.test(fn);
      const civ  = /civil|مدني/.test(fn)   || /both|كلا/.test(fn);
      if (asph) {
        const ctx = _refProjectCtx(r.project);
        if (ctx) { const e = ctx.project.engineers = ctx.project.engineers || []; const f = e.find(x => x.name === r.name);
          if (f) { f.pin = pin; if (r.phone) f.phone = cleanPhone(r.phone); } else e.push({ name: r.name, pin, phone: cleanPhone(r.phone) }); }
      }
      if (civ) _refUpsertPin(receivers, r.name, pin);
      if (_refBool(r.milling)) _refUpsertPin(milling, r.name, pin);
    });
    if (receivers.length) CONFIG.materialReceivers = receivers;
    CONFIG.millingStaff = milling;   // reserved for milling-login wiring
  }

  // Clerks (Plant file).
  if ((ref.clerks || []).length) CONFIG.clerks = ref.clerks.filter(r => r.name).map(r => ({ name: r.name, pin: String(r.pin || "") }));

  // Work orders (active only) → contractWorkOrders.
  const wos = (ref.workOrders || []).filter(r => r.wo && (!r.status || /جاري|active/i.test(r.status)));
  if (wos.length) CONFIG.contractWorkOrders = wos.map(r => ({
    wo: String(r.wo), project: r.project || "", site: r.site || "", block: r.block || "", street: r.street || "",
    discipline: r.discipline || "", label: r.description || [r.site, r.block ? `قطعة ${r.block}` : "", r.discipline].filter(Boolean).join(" "),
  }));

  // Drivers (Copri + contractor; still editable at dispatch).
  const drv = (ref.drivers || []).filter(r => r.name);
  if (drv.length) CONFIG.copriDrivers = drv.map(r => ({ name: r.name, phone: cleanPhone(r.phone), truck: r.plate || "", company: r.company || "", copri: _refBool(r.copri) }));

  // Simple pick-lists.
  if ((ref.mixTypes || []).length)         CONFIG.mixTypes = ref.mixTypes;
  if ((ref.plants || []).length)           CONFIG.plants = ref.plants;
  if ((ref.transporters || []).length)     CONFIG.naqelOptions = ref.transporters;
  if ((ref.rejectionReasons || []).length) CONFIG.rejectionReasons = ref.rejectionReasons;
  if ((ref.suppliers || []).length)        CONFIG.materialSuppliers = ref.suppliers;
  if ((ref.subcontractors || []).length)   CONFIG.materialSubcontractors = ref.subcontractors;

  // Materials catalog (Category → items + unit).
  if ((ref.catalog || []).length) {
    const cats = {};
    ref.catalog.forEach(r => { if (!r.category || !r.item) return; const c = cats[r.category] = cats[r.category] || { category: r.category, unit: r.unit || "", items: [] }; c.items.push(r.item); if (r.unit && !c.unit) c.unit = r.unit; });
    const list = Object.keys(cats).map(k => cats[k]); if (list.length) CONFIG.materialCatalog = list;
  }

  // Milling machines / priorities / managers.
  if ((ref.machines || []).length)   CONFIG.millingMachines = ref.machines.map(r => ({ id: r.id, name: r.name, width: Number(r.width) || 1 }));
  if ((ref.priorities || []).length) CONFIG.millingPriorities = ref.priorities;
  if ((ref.managers || []).length) {
    CONFIG.projectManagers = [];
    ref.managers.forEach(r => {
      if (!r.name || !r.pin) return;
      const role = String(r.role || "").toLowerCase(), pin = String(r.pin);
      const projs = (r.projects || "").split(",").map(x => x.trim()).filter(Boolean);
      if (/marco|ماركو/.test(role)) CONFIG.marco = { name: r.name, pin };
      else CONFIG.projectManagers.push({ name: r.name, pin, projects: projs });
    });
  }
}

// Fetch the reference JSON with a timeout; cache on success.
async function fetchReference(timeoutMs, fresh) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeoutMs || 20000);
  try {
    const res = await fetch(`${CONFIG.scriptUrl}?ref=1${fresh ? "&nocache=1" : ""}`, { signal: ctrl.signal });
    const data = await res.json();
    if (data && (data.streets || data.workOrders || data.settings)) localStorage.setItem(REF_CACHE_KEY, JSON.stringify(data));
    return data;
  } finally { clearTimeout(t); }
}

// Cheap probe: has any reference file changed since we last applied? Returns the
// server version string, or null on failure. Does NOT pull the full payload.
async function fetchRefVersion(timeoutMs) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeoutMs || 8000);
  try {
    const res = await fetch(`${CONFIG.scriptUrl}?refver=1`, { signal: ctrl.signal });
    const d = await res.json();
    return d && d.version != null ? String(d.version) : null;
  } catch (e) { return null; } finally { clearTimeout(t); }
}

// Seamless auto-update: probe the server version; only on a real change pull the
// full reference, apply it, and re-render the current screen — but only when it's
// safe (not mid-form). Silent no-op on any failure. `force` skips the version check.
async function syncReferenceIfChanged(opts) {
  opts = opts || {};
  const ver = await fetchRefVersion(8000);
  if (ver == null) return;                        // network failure — keep current
  if (!opts.force && ver === _lastRefVer) return; // nothing changed — cheap exit
  const fresh = await fetchReference(20000, true); // full pull, bypass backend cache
  if (!fresh) return;
  applyReferenceData(fresh);
  _lastRefVer = ver;
  try { localStorage.setItem(REF_VER_KEY, ver); } catch (e) {}
  if (_refSafeToRerender()) runRouter();          // re-render only if not mid-typing
}

// Manual refresh (🔄 in the header, on every portal): pull the latest reference
// data now, apply it, and re-render the current screen — so staff see edits
// without the double-reopen. Spins the icon while it fetches.
async function refreshReferenceData(btn) {
  if (btn) { btn.disabled = true; btn.classList.add("spin"); }
  try {
    const r = await fetchReference(25000, true);
    if (r) applyReferenceData(r);
    // Record the version we just applied so the background poll doesn't re-pull.
    const v = await fetchRefVersion(8000);
    if (v != null) { _lastRefVer = v; try { localStorage.setItem(REF_VER_KEY, v); } catch (e) {} }
  } catch (e) { /* keep current data */ }
  if (btn) { btn.disabled = false; btn.classList.remove("spin"); }
  runRouter();   // re-render the active screen with the fresh data
}

// ── Router — runs after the cached reference overlay ──
function runRouter() {
const _mparams = new URLSearchParams(window.location.search);
const millingReport = _mparams.get("millingReport");
const millingRole   = _mparams.get("millingRole");
const matRole       = _mparams.get("matRole");
const note = getNoteFromURL();

if (millingReport) {
  renderMillingReportView(millingReport);                 // public, no PIN
} else if (millingRole === "engineer") {
  const session = getEngineerSession();
  if (session) renderMillingEngineerHome(session.name);
  else renderPINScreen(name => renderMillingEngineerHome(name));
} else if (millingRole === "pm") {
  const pmSession = getPMSession();
  if (pmSession) renderMillingPMHome(pmSession.name);
  else renderMillingPMPINScreen(name => renderMillingPMHome(name));
} else if (millingRole === "marco") {
  const marcoSession = getMarcoSession();
  if (marcoSession) renderMillingMarcoHome(marcoSession.name);
  else renderMillingMarcoPINScreen(name => renderMillingMarcoHome(name));
} else if (matRole === "receiver") {
  const matSession = getMatSession();
  if (matSession) renderMaterialReceiverHome(matSession.name);
  else renderMaterialPINScreen(name => renderMaterialReceiverHome(name));
} else if (note) {
  const session = getEngineerSession();
  if (session) renderReceipt(note, session.name);
  else renderPINScreen(name => renderReceipt(note, name));
} else {
  const isEngineerRole = _mparams.get("role") === "engineer";
  if (isEngineerRole) {
    const session = getEngineerSession();
    if (session) renderEngineerHome(session.name);
    else renderPINScreen(name => renderEngineerHome(name));
  } else {
    const clerkSession = getClerkSession();
    if (clerkSession) renderCompanySelect();
    else renderClerkPINScreen(renderCompanySelect);
  }
}
}

// ── Boot: apply cached reference instantly, route, then refresh in background ──
try {
  const _cachedRef = JSON.parse(localStorage.getItem(REF_CACHE_KEY) || "null");
  if (_cachedRef) applyReferenceData(_cachedRef);
} catch (e) { /* keep baked defaults */ }
runRouter();

// Seamless reference updates — no 🔄 button needed.
// 1) On boot, check for changes and apply (covers "opened once, still stale").
syncReferenceIfChanged();

// 2) When the user returns to the tab (common — PWA left open all day), re-check.
document.addEventListener("visibilitychange", function () {
  if (document.visibilityState === "visible") syncReferenceIfChanged();
});

// 3) Gentle background poll while open + visible. Each tick runs only the cheap
//    version probe; the full pull fires solely on a real change. Skips while
//    hidden to save quota/battery.
setInterval(function () {
  if (document.visibilityState === "visible") syncReferenceIfChanged();
}, 60000);

</script>
</body>
